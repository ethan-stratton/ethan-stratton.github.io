---
layout: default
---
{% assign posts = site.posts | sort: 'date' | reverse %}
{% for post in posts %}
<article class="post">
  <div class="post-date">{{ post.date | date: "%B %-d, %Y" }}</div>
  <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
  <div class="post-content">
    {{ post.content }}
  </div>
  {% if post.tags.size > 0 %}
    {% for tag in post.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
  {% endif %}
</article>
{% endfor %}
