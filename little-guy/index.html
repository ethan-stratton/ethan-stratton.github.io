<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>little guy</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: monospace; }
canvas { cursor: default; }
#book-overlay {
  display: none;
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: #1a1a1a;
  border: 1px solid #444;
  padding: 30px 40px;
  max-width: 500px;
  color: #8a8;
  font-family: monospace;
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
  z-index: 10;
  border-radius: 4px;
}
#book-overlay .close {
  position: absolute; top: 8px; right: 12px;
  color: #666; cursor: pointer; font-size: 16px;
}
#book-overlay .close:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="book-overlay"><span class="close" onclick="closeBook()">×</span><pre id="book-text"></pre></div>
<script>
// --- Canvas setup ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;
canvas.width = W; canvas.height = H;

// --- Physics ---
const GRAVITY = 0.4;
const GROUND_Y = H - 60;
const BOUNCE = 0.4;       // bounciness on ground hit
const AIR_DRAG = 0.995;   // very slight air resistance
const GROUND_FRIC = 0.88; // friction when grounded

// --- Throw tracking ---
const mouseHistory = []; // {x, y, t} — last N mouse positions for velocity calc
const MOUSE_HIST_LEN = 6;

// --- Game state ---
const state = {
  learnedMove: false,
  learnedJump: false,
  learnedSpeak: false,
  bookPageUnlocked: 1,
  wordsLearned: [],
  dragCount: 0,
};

// --- Bodies (physics objects) ---
class Body {
  constructor(x, y, w, h, opts = {}) {
    this.x = x; this.y = y; this.w = w; this.h = h;
    this.vx = 0; this.vy = 0;
    this.static = opts.static || false;
    this.draggable = opts.draggable !== undefined ? opts.draggable : !this.static;
    this.color = opts.color || '#555';
    this.label = opts.label || null;
    this.type = opts.type || 'box';
    this.grounded = false;
    this.mass = opts.mass || 1;
    this.rotation = 0;    // visual rotation (radians)
    this.rotV = 0;        // rotational velocity
  }
  get left() { return this.x; }
  get right() { return this.x + this.w; }
  get top() { return this.y; }
  get bottom() { return this.y + this.h; }
  get cx() { return this.x + this.w / 2; }
  get cy() { return this.y + this.h / 2; }
}

// --- World objects ---
const ground = new Body(0, GROUND_Y, W, 60, { static: true, color: '#1e1e2e' });

const platforms = [
  ground,
  new Body(250, GROUND_Y - 40, 80, 12, { static: true, color: '#2a2a3e' }),
];

const book = new Body(180, GROUND_Y - 18, 22, 18, { color: '#6b5b3a', type: 'book', draggable: true });

const wordBlocks = [
  new Body(500, GROUND_Y - 16, 40, 16, { color: '#3a4a5a', type: 'word', label: 'HERE', draggable: true }),
  new Body(560, GROUND_Y - 16, 32, 16, { color: '#3a4a5a', type: 'word', label: 'GO', draggable: true }),
  new Body(610, GROUND_Y - 16, 32, 16, { color: '#3a4a5a', type: 'word', label: 'NO', draggable: true }),
  new Body(660, GROUND_Y - 16, 36, 16, { color: '#3a4a5a', type: 'word', label: 'WHY', draggable: true }),
];

const dynamicBodies = [book, ...wordBlocks];

// --- Character ---
const guy = {
  x: 100, y: GROUND_Y,
  vx: 0, vy: 0,
  w: 16, h: 34,
  headR: 8,
  bodyR: 7,
  grounded: false,
  // State
  inert: true,
  // Expression
  symbols: [],
  currentSpeech: '',
  speechFade: 0,
  // Look direction & barks
  lookTarget: null,    // {x, y} world position he's looking at
  lookTimer: 0,
  headTilt: 0,         // -1 to 1, current head tilt (negative = drooped/sigh)
  headTiltTarget: 0,
  eyeDir: 0,           // -1 left, 0 center, 1 right (computed from lookTarget)
  eyeY: 0,             // vertical eye offset
  // Bark system
  barkQueue: [],       // [{action, duration, lookAt}]
  barkTimer: 0,
  currentBark: null,
  // AI
  wanderTarget: null,
  wanderTimer: 60,
  idleTime: 0,         // frames spent idle (triggers barks)
};

// --- Drawn platforms ---
const drawnPlatforms = [];

// --- Mouse ---
const mouse = { x: 0, y: 0, down: false };
let dragging = null;
let dragOffset = { x: 0, y: 0 };
let draggingGuy = false;
let drawMode = false;
let drawStart = null;
let lastClickTime = 0;
let lastClickTarget = null;

// --- Book pages ---
const bookPages = [
  `// version 0.1
// He's in there. All the code is running.
// He just doesn't know what he can do yet.
//
// Try moving him. Click and drag.
// He won't like it. That's okay.`,

  `// jump_height: 8
// He can jump. But he has to learn
// what "up" means first.
// Lift him onto something higher.
// He'll figure it out.`,

  `// talk: true (dormant)
// He has a voice. He just needs words.
// The blocks have labels. Bring them to him.
// Start with something simple.`,

  `// He's getting smarter. Watch.
// Give him a path and he'll try to take it.
// You don't have to carry him everywhere.
//
// You can draw platforms too —
// click and drag on empty space.`,

  `// I don't know if this is right.
// I just wanted to see what would happen.
// Maybe that's enough.
// I hope it's enough.`,
];

// ============================================================
// THROW VELOCITY — track mouse movement for release momentum
// ============================================================
function recordMouse() {
  mouseHistory.push({ x: mouse.x, y: mouse.y, t: performance.now() });
  if (mouseHistory.length > MOUSE_HIST_LEN) mouseHistory.shift();
}

function getThrowVelocity() {
  if (mouseHistory.length < 2) return { vx: 0, vy: 0 };
  const oldest = mouseHistory[0];
  const newest = mouseHistory[mouseHistory.length - 1];
  const dt = (newest.t - oldest.t) / 1000; // seconds
  if (dt < 0.001) return { vx: 0, vy: 0 };
  let vx = (newest.x - oldest.x) / dt / 60; // convert to per-frame
  let vy = (newest.y - oldest.y) / dt / 60;
  // Clamp max throw speed
  const maxV = 18;
  const mag = Math.sqrt(vx * vx + vy * vy);
  if (mag > maxV) { vx *= maxV / mag; vy *= maxV / mag; }
  return { vx, vy };
}

// ============================================================
// BARK / TELL SYSTEM
// ============================================================
// Barks are little autonomous behaviors: look at something, sigh, glance around
function queueBark(bark) {
  guy.barkQueue.push(bark);
}

function updateBarks() {
  if (guy.inert || draggingGuy) return;

  // Process current bark
  if (guy.currentBark) {
    guy.barkTimer--;
    if (guy.barkTimer <= 0) {
      guy.currentBark = null;
      guy.lookTarget = null;
      guy.headTiltTarget = 0;
    }
    return;
  }

  // Dequeue next bark
  if (guy.barkQueue.length > 0) {
    const b = guy.barkQueue.shift();
    guy.currentBark = b;
    guy.barkTimer = b.duration || 60;
    if (b.lookAt) guy.lookTarget = b.lookAt;
    if (b.headTilt !== undefined) guy.headTiltTarget = b.headTilt;
    if (b.symbol) addSymbol(b.symbol);
    if (b.speech) showSpeech(b.speech);
    return;
  }

  // Auto-generate barks when idle
  guy.idleTime++;

  if (guy.idleTime > 180 && guy.idleTime % 200 === 0) {
    // Occasionally look at nearby objects of interest
    const interests = findInterestingThings();
    if (interests.length > 0) {
      const target = interests[Math.random() * interests.length | 0];
      queueBark({ lookAt: { x: target.cx, y: target.cy }, duration: 80 + Math.random() * 60 | 0, symbol: '?' });
    } else {
      // Nothing interesting — look around, then sigh
      queueBark({ lookAt: { x: guy.x + (Math.random() > 0.5 ? 200 : -200), y: guy.y - 40 }, duration: 40 });
      queueBark({ lookAt: { x: guy.x + (Math.random() > 0.5 ? -150 : 150), y: guy.y - 20 }, duration: 40 });
      queueBark({ headTilt: -0.4, duration: 80, symbol: '...' }); // sigh / head drop
    }
  }
}

function findInterestingThings() {
  const things = [];
  // Book
  const bookDist = Math.abs(book.cx - guy.x);
  if (bookDist < 300) things.push(book);
  // Word blocks
  for (const wb of wordBlocks) {
    if (Math.abs(wb.cx - guy.x) < 250) things.push(wb);
  }
  return things;
}

// ============================================================
// INPUT
// ============================================================
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
  recordMouse();

  if (draggingGuy) {
    guy.x = mouse.x - dragOffset.x;
    guy.y = mouse.y - dragOffset.y;
    guy.vx = 0; guy.vy = 0;
  } else if (dragging) {
    dragging.x = mouse.x - dragOffset.x;
    dragging.y = mouse.y - dragOffset.y;
    dragging.vx = 0; dragging.vy = 0;
  }
});

canvas.addEventListener('mousedown', e => {
  mouse.down = true;
  mouseHistory.length = 0; // reset throw tracking
  recordMouse();
  const now = Date.now();

  // Double-click book
  if (now - lastClickTime < 350 && lastClickTarget === 'book') {
    openBook();
    return;
  }

  // Click on guy
  const gx = guy.x, gy = guy.y;
  const guyHit = mouse.x >= gx - 12 && mouse.x <= gx + 12 && mouse.y >= gy - 36 && mouse.y <= gy + 2;
  if (guyHit) {
    draggingGuy = true;
    dragOffset.x = mouse.x - guy.x;
    dragOffset.y = mouse.y - guy.y;
    state.dragCount++;
    if (guy.inert) {
      addSymbol('!');
      setTimeout(() => addSymbol('?'), 200);
    } else {
      addSymbol('!');
      guy.idleTime = 0;
      // Interrupt any bark
      guy.currentBark = null;
      guy.barkQueue.length = 0;
    }
    lastClickTime = now;
    lastClickTarget = 'guy';
    return;
  }

  // Click on bodies
  for (const b of dynamicBodies) {
    if (b.draggable && mouse.x >= b.x && mouse.x <= b.right && mouse.y >= b.y && mouse.y <= b.bottom) {
      dragging = b;
      dragOffset.x = mouse.x - b.x;
      dragOffset.y = mouse.y - b.y;
      lastClickTime = now;
      lastClickTarget = b.type;
      return;
    }
  }

  // Start drawing platform
  drawMode = true;
  drawStart = { x: mouse.x, y: mouse.y };
  lastClickTime = now;
  lastClickTarget = null;
});

canvas.addEventListener('mouseup', e => {
  mouse.down = false;
  const throwVel = getThrowVelocity();

  if (draggingGuy) {
    draggingGuy = false;
    // Apply throw velocity
    guy.vx = throwVel.vx;
    guy.vy = throwVel.vy;

    // Clamp so he doesn't escape the world too fast
    guy.vx = Math.max(-15, Math.min(15, guy.vx));
    guy.vy = Math.max(-15, Math.min(15, guy.vy));

    if (guy.inert && state.dragCount >= 1) {
      guy.inert = false;
      state.learnedMove = true;
      state.bookPageUnlocked = Math.max(state.bookPageUnlocked, 2);
      setTimeout(() => {
        addSymbol('...');
        setTimeout(() => { guy.wanderTimer = 10; }, 800);
      }, 500);
    }

    if (!state.learnedJump && guy.y < GROUND_Y - 20) {
      state.learnedJump = true;
      state.bookPageUnlocked = Math.max(state.bookPageUnlocked, 2);
      addSymbol('!!');
    }

    // If thrown hard, react
    const speed = Math.sqrt(throwVel.vx ** 2 + throwVel.vy ** 2);
    if (speed > 6 && !guy.inert) {
      addSymbol('!!!');
      queueBark({ headTilt: -0.3, duration: 40 });
    }
  }

  if (dragging) {
    // Apply throw to object
    dragging.vx = throwVel.vx;
    dragging.vy = throwVel.vy;
    dragging.rotV = throwVel.vx * 0.05; // spin proportional to horizontal throw

    // Check proximity to guy
    if (dragging.type === 'word' && dragging.label) {
      const dist = Math.abs(dragging.cx - guy.x);
      if (dist < 60 && !state.wordsLearned.includes(dragging.label)) {
        learnWord(dragging.label);
      }
    }
    if (dragging.type === 'book') {
      const dist = Math.abs(dragging.cx - guy.x);
      if (dist < 50) {
        if (state.learnedSpeak) {
          showSpeech("...");
          setTimeout(() => showSpeech("MADE... ME?"), 1500);
        } else {
          addSymbol('?');
          setTimeout(() => addSymbol('...'), 400);
        }
      }
    }
    dragging = null;
  }

  if (drawMode && drawStart) {
    const dx = mouse.x - drawStart.x;
    const dy = mouse.y - drawStart.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len > 20 && state.bookPageUnlocked >= 4) {
      drawnPlatforms.push(new Body(
        Math.min(drawStart.x, mouse.x),
        Math.min(drawStart.y, mouse.y),
        Math.abs(dx),
        Math.max(Math.abs(dy), 8),
        { static: true, color: 'rgba(80,110,140,0.4)' }
      ));
    }
    drawMode = false;
    drawStart = null;
  }
});

// --- Book overlay ---
function openBook() {
  const text = bookPages.slice(0, state.bookPageUnlocked).join('\n\n---\n\n');
  document.getElementById('book-text').textContent = text;
  document.getElementById('book-overlay').style.display = 'block';
}
function closeBook() {
  document.getElementById('book-overlay').style.display = 'none';
}

// --- Expression system ---
function addSymbol(sym) {
  guy.symbols.push({ text: sym, life: 90, y: 0, x: (Math.random() - 0.5) * 10 });
}

function showSpeech(text) {
  guy.currentSpeech = text;
  guy.speechFade = 120 + text.length * 3;
}

function learnWord(word) {
  state.wordsLearned.push(word);
  if (!state.learnedSpeak) {
    state.learnedSpeak = true;
    state.bookPageUnlocked = Math.max(state.bookPageUnlocked, 3);
  }
  // He looks at the block, then says the word
  queueBark({ lookAt: { x: guy.x, y: guy.y - 10 }, duration: 30 });
  setTimeout(() => showSpeech(word), 400);
  setTimeout(() => showSpeech(word + "..."), 1400);

  if (state.wordsLearned.length >= 2) state.bookPageUnlocked = Math.max(state.bookPageUnlocked, 4);
  if (state.wordsLearned.length >= 3) state.bookPageUnlocked = Math.max(state.bookPageUnlocked, 5);
}

// ============================================================
// PHYSICS
// ============================================================
function resolveBody(body) {
  if (body.static) return;

  body.vy += GRAVITY;
  body.vx *= body.grounded ? GROUND_FRIC : AIR_DRAG;
  body.x += body.vx;
  body.y += body.vy;

  // Rotation (visual)
  body.rotation += body.rotV;
  if (body.grounded) body.rotV *= 0.85; // slow spin on ground
  else body.rotV *= 0.99;

  body.grounded = false;

  // Collide with static platforms + drawn platforms
  const allPlats = [...platforms, ...drawnPlatforms];
  for (const p of allPlats) {
    if (body === p) continue;
    if (body.right > p.left && body.left < p.right) {
      // Top
      if (body.bottom >= p.top && body.bottom <= p.top + 16 && body.vy >= 0) {
        body.y = p.top - body.h;
        body.vy = body.vy > 2 ? -body.vy * BOUNCE : 0;
        body.grounded = true;
        // Spin from impact
        if (Math.abs(body.vx) > 0.5) body.rotV = body.vx * 0.03;
      }
    }
  }

  // Ground
  if (body.bottom >= GROUND_Y) {
    body.y = GROUND_Y - body.h;
    if (body.vy > 2) {
      body.vy = -body.vy * BOUNCE;
      body.rotV = body.vx * 0.03;
    } else {
      body.vy = 0;
    }
    body.grounded = true;
  }

  // Walls — bounce off
  if (body.x < 0) { body.x = 0; body.vx = Math.abs(body.vx) * BOUNCE; body.rotV *= -0.5; }
  if (body.right > W) { body.x = W - body.w; body.vx = -Math.abs(body.vx) * BOUNCE; body.rotV *= -0.5; }

  // Settle rotation when nearly stopped
  if (body.grounded && Math.abs(body.vx) < 0.3) {
    body.rotation *= 0.9; // ease back to upright
    body.rotV *= 0.8;
  }
}

function resolveGuy() {
  if (draggingGuy) return;

  guy.vy += GRAVITY;
  guy.vx *= guy.grounded ? GROUND_FRIC : AIR_DRAG;
  guy.x += guy.vx;
  guy.y += guy.vy;
  guy.grounded = false;

  const allPlats = [...platforms, ...drawnPlatforms];
  const halfW = guy.w / 2;

  for (const p of allPlats) {
    if (guy.x + halfW > p.x && guy.x - halfW < p.right) {
      if (guy.y >= p.y && guy.y <= p.y + 16 && guy.vy >= 0) {
        guy.y = p.y;
        if (guy.vy > 4) {
          // Hard landing — bounce a little, react
          guy.vy = -guy.vy * 0.25;
          if (!guy.inert) addSymbol('!');
        } else {
          guy.vy = 0;
        }
        guy.grounded = true;
      }
    }
  }

  // Ground
  if (guy.y >= GROUND_Y) {
    if (guy.vy > 4) {
      guy.vy = -guy.vy * 0.25;
      if (!guy.inert) addSymbol('!');
    } else {
      guy.vy = 0;
    }
    guy.y = GROUND_Y;
    guy.grounded = true;
  }

  // Walls — bounce
  if (guy.x < 20) { guy.x = 20; guy.vx = Math.abs(guy.vx) * 0.4; if (!guy.inert) addSymbol('!'); }
  if (guy.x > W - 20) { guy.x = W - 20; guy.vx = -Math.abs(guy.vx) * 0.4; if (!guy.inert) addSymbol('!'); }
}

// ============================================================
// GUY AI
// ============================================================
function updateGuyAI() {
  if (guy.inert || draggingGuy) return;

  // If moving fast (thrown), don't wander — just react
  const speed = Math.sqrt(guy.vx ** 2 + guy.vy ** 2);
  if (speed > 2) {
    guy.idleTime = 0;
    guy.wanderTarget = null;
    return;
  }

  guy.wanderTimer--;
  if (guy.wanderTimer <= 0) {
    if (Math.random() < 0.4) {
      guy.wanderTarget = null;
      guy.wanderTimer = 80 + Math.random() * 120 | 0;
    } else {
      guy.wanderTarget = 40 + Math.random() * (W - 80);
      guy.wanderTimer = 100 + Math.random() * 150 | 0;
      guy.idleTime = 0;
    }
  }

  if (guy.wanderTarget !== null) {
    const dx = guy.wanderTarget - guy.x;
    if (Math.abs(dx) > 8) {
      guy.vx += (dx > 0 ? 0.15 : -0.15);
      if (state.learnedJump && guy.grounded && Math.abs(guy.vx) < 0.3 && Math.abs(dx) > 15) {
        guy.vy = -7;
      }
    } else {
      guy.wanderTarget = null;
    }
    guy.idleTime = 0;
  }
}

// ============================================================
// LOOK DIRECTION
// ============================================================
function updateLook() {
  // Smooth head tilt toward target
  guy.headTilt += (guy.headTiltTarget - guy.headTilt) * 0.08;

  if (guy.lookTarget) {
    const dx = guy.lookTarget.x - guy.x;
    const dy = guy.lookTarget.y - (guy.y - 26); // head position
    guy.eyeDir += ((dx > 5 ? 1 : dx < -5 ? -1 : 0) - guy.eyeDir) * 0.12;
    guy.eyeY += (Math.max(-2, Math.min(2, dy * 0.02)) - guy.eyeY) * 0.1;
  } else if (!guy.inert) {
    // Default: look in movement direction
    const targetDir = guy.vx > 0.3 ? 1 : guy.vx < -0.3 ? -1 : 0;
    guy.eyeDir += (targetDir - guy.eyeDir) * 0.06;
    guy.eyeY += (0 - guy.eyeY) * 0.05;
  }

  // Reset tilt when no bark active
  if (!guy.currentBark) {
    guy.headTiltTarget = 0;
  }
}

// ============================================================
// UPDATE
// ============================================================
function update() {
  resolveGuy();

  for (const b of dynamicBodies) {
    if (b !== dragging) resolveBody(b);
  }

  // Check proximity: word blocks landing near guy
  for (const wb of wordBlocks) {
    if (wb.type === 'word' && wb.label && !state.wordsLearned.includes(wb.label)) {
      const dist = Math.abs(wb.cx - guy.x);
      if (dist < 50 && wb.grounded && !guy.inert) {
        learnWord(wb.label);
      }
    }
  }

  updateGuyAI();
  updateBarks();
  updateLook();

  // Update symbols
  for (let i = guy.symbols.length - 1; i >= 0; i--) {
    guy.symbols[i].life--;
    guy.symbols[i].y -= 0.6;
    if (guy.symbols[i].life <= 0) guy.symbols.splice(i, 1);
  }

  if (guy.speechFade > 0) guy.speechFade--;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, W, H);

  // Ground
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.strokeStyle = '#2a2a3e';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(W, GROUND_Y); ctx.stroke();

  // Static platforms
  for (const p of platforms) {
    if (p === ground) continue;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.w, p.h);
  }

  // Drawn platforms
  for (const p of drawnPlatforms) {
    ctx.fillStyle = 'rgba(80,110,140,0.3)';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.strokeStyle = 'rgba(80,110,140,0.5)';
    ctx.lineWidth = 1;
    ctx.strokeRect(p.x, p.y, p.w, p.h);
  }

  // Draw preview
  if (drawMode && drawStart && state.bookPageUnlocked >= 4) {
    ctx.strokeStyle = 'rgba(80,110,140,0.3)';
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(
      Math.min(drawStart.x, mouse.x), Math.min(drawStart.y, mouse.y),
      Math.abs(mouse.x - drawStart.x), Math.max(Math.abs(mouse.y - drawStart.y), 8)
    );
    ctx.setLineDash([]);
  }

  // Dynamic bodies
  for (const b of dynamicBodies) {
    ctx.save();
    ctx.translate(b.cx, b.cy);
    ctx.rotate(b.rotation);

    if (b.type === 'book') {
      ctx.fillStyle = b.color;
      ctx.fillRect(-b.w / 2, -b.h / 2, b.w, b.h);
      ctx.strokeStyle = '#8a7a5a';
      ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(-b.w / 2 + 4, -b.h / 2 + 4 + i * 5);
        ctx.lineTo(b.w / 2 - 4, -b.h / 2 + 4 + i * 5);
        ctx.stroke();
      }
    } else {
      ctx.fillStyle = b.color;
      ctx.fillRect(-b.w / 2, -b.h / 2, b.w, b.h);
      if (b.label) {
        ctx.fillStyle = '#aabbcc';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(b.label, 0, 3);
      }
    }
    ctx.restore();
  }

  // Character
  drawCharacter();

  // Symbols
  for (const s of guy.symbols) {
    const alpha = Math.min(1, s.life / 20);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = 'bold 14px monospace';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(s.text, guy.x + (s.x || 0), guy.y - guy.h - 10 + s.y);
    ctx.restore();
  }

  // Speech bubble
  if (guy.currentSpeech && guy.speechFade > 0) {
    const alpha = Math.min(1, guy.speechFade / 20);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = '13px monospace';
    const tw = ctx.measureText(guy.currentSpeech).width;
    const bx = guy.x - tw / 2 - 10;
    const by = guy.y - guy.h - 40;
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(bx, by, tw + 20, 24, 4); ctx.fill(); }
    else ctx.fillRect(bx, by, tw + 20, 24);
    ctx.fillStyle = '#ddd';
    ctx.textAlign = 'center';
    ctx.fillText(guy.currentSpeech, guy.x, by + 16);
    ctx.restore();
  }

  // Hint
  if (guy.inert && state.dragCount === 0) {
    ctx.save();
    ctx.globalAlpha = 0.3 + 0.1 * Math.sin(Date.now() / 1000);
    ctx.font = '11px monospace';
    ctx.fillStyle = '#666';
    ctx.textAlign = 'center';
    ctx.fillText('double-click the book', book.cx, book.y - 8);
    ctx.restore();
  }
}

function drawCharacter() {
  const x = guy.x;
  const footY = guy.y;
  const bodyY = footY - 12;
  const headY = footY - 26;

  // Legs — slight animation when moving
  const legAnim = guy.grounded ? Math.sin(Date.now() / 120) * Math.min(3, Math.abs(guy.vx) * 2) : 0;
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - 4, bodyY + 5);
  ctx.lineTo(x - 5 - legAnim, footY);
  ctx.moveTo(x + 4, bodyY + 5);
  ctx.lineTo(x + 5 + legAnim, footY);
  ctx.stroke();

  // Arms — slight swing
  const armAnim = Math.sin(Date.now() / 140) * Math.min(4, Math.abs(guy.vx) * 2);
  ctx.beginPath();
  ctx.moveTo(x - guy.bodyR, bodyY);
  ctx.lineTo(x - guy.bodyR - 4 - armAnim, bodyY + 10);
  ctx.moveTo(x + guy.bodyR, bodyY);
  ctx.lineTo(x + guy.bodyR + 4 + armAnim, bodyY + 10);
  ctx.stroke();

  // Body
  ctx.fillStyle = guy.inert ? '#777' : '#bbb';
  ctx.beginPath();
  ctx.arc(x, bodyY, guy.bodyR, 0, Math.PI * 2);
  ctx.fill();

  // Head (with tilt)
  ctx.save();
  ctx.translate(x, headY);
  ctx.rotate(guy.headTilt * 0.3); // convert tilt to radians range

  ctx.fillStyle = guy.inert ? '#888' : '#ccc';
  ctx.beginPath();
  ctx.arc(0, 0, guy.headR, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  if (!guy.inert) {
    const ex = guy.eyeDir * 2.5;
    const ey = guy.eyeY;
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(-3 + ex, -1 + ey, 1.5, 0, Math.PI * 2);
    ctx.arc(3 + ex, -1 + ey, 1.5, 0, Math.PI * 2);
    ctx.fill();
  } else {
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-5, 0); ctx.lineTo(-2, 0);
    ctx.moveTo(2, 0); ctx.lineTo(5, 0);
    ctx.stroke();
  }
  ctx.restore();
}

// --- Loop ---
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
