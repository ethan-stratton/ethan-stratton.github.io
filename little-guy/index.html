<script>
// ============================================================
// CANVAS
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;
canvas.width = W; canvas.height = H;

// ============================================================
// CONSTANTS
// ============================================================
const GRAVITY = 0.4;
const BOUNCE = 0.4;
const AIR_DRAG = 0.995;
const GROUND_FRIC = 0.88;
const MOUSE_HIST_LEN = 6;

// ============================================================
// AUDIO ENGINE (Web Audio API — synthesized, no files)
// ============================================================
let audioCtx = null;
let masterGain = null;
let ambientOsc = null;
let ambientGain = null;
let ambientActive = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.3;
  masterGain.connect(audioCtx.destination);
}

// Speech blip — pitch varies per character, Undertale-style
function playSpeechBlip(char, index) {
  if (!audioCtx) return;
  const baseFreq = 280 + (char.charCodeAt(0) % 20) * 12;
  const freq = baseFreq + Math.sin(index * 0.7) * 30;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 0.08);
}

// Impact thud
function playImpact(intensity) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(80 + intensity * 20, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(Math.min(0.15, intensity * 0.03), audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(); osc.stop(audioCtx.currentTime + 0.15);
}

// Symbol pop (! ? ...)
function playSymbol(sym) {
  if (!audioCtx) return;
  const freq = sym === '!' ? 600 : sym === '?' ? 450 : sym === '!!!' ? 700 : 350;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  osc.connect(gain); gain.connect(masterGain);
  osc.start(); osc.stop(audioCtx.currentTime + 0.12);
}

// Book discovery tone — low warm chord
function playBookTone() {
  if (!audioCtx) return;
  [130.8, 164.8, 196.0].forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0.04, audioCtx.currentTime + i * 0.1);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5 + i * 0.1);
    osc.connect(gain); gain.connect(masterGain);
    osc.start(audioCtx.currentTime + i * 0.1);
    osc.stop(audioCtx.currentTime + 1.5 + i * 0.1);
  });
}

// Ambient drone — starts after waking
function startAmbient(scene) {
  if (!audioCtx || ambientActive) return;
  ambientActive = true;
  ambientOsc = audioCtx.createOscillator();
  ambientGain = audioCtx.createGain();
  ambientOsc.type = 'sine';
  ambientOsc.frequency.value = 55; // low A
  ambientGain.gain.setValueAtTime(0, audioCtx.currentTime);
  ambientGain.gain.linearRampToValueAtTime(0.025, audioCtx.currentTime + 3);
  ambientOsc.connect(ambientGain);
  ambientGain.connect(masterGain);
  ambientOsc.start();
  // Add a very subtle second oscillator slightly detuned
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = 55.3;
  osc2.connect(ambientGain);
  osc2.start();
}

function setAmbientTone(freq, vol) {
  if (!ambientOsc || !ambientGain) return;
  ambientOsc.frequency.linearRampToValueAtTime(freq, audioCtx.currentTime + 2);
  ambientGain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 2);
}

// ============================================================
// WORD COMBINATION ENGINE
// ============================================================
// Grammar templates — he assembles novel phrases from his vocabulary
const wordTemplates = [
  // 2-word
  { pattern: ['question', 'noun'], make: (q, n) => q + '... ' + n + '?' },
  { pattern: ['noun', 'verb'], make: (n, v) => n + '... ' + v + '.' },
  { pattern: ['feeling', 'question'], make: (f, q) => f + '... ' + q + '?' },
  // 3-word
  { pattern: ['question', 'verb', 'noun'], make: (q, v, n) => q + '... ' + v + '... ' + n + '?' },
  { pattern: ['noun', 'verb', 'adverb'], make: (n, v, a) => n + '... ' + v + '... ' + a + '.' },
];

const wordCategories = {
  'HERE':  'adverb', 'GO': 'verb', 'NO': 'negation', 'WHY': 'question',
  'HELP':  'verb', 'WHAT': 'question', 'WHO': 'question', 'MADE': 'verb',
  'ME':    'noun', 'FEEL': 'feeling', 'REAL': 'adjective', 'THINK': 'feeling',
};

function generatePhrase() {
  const words = state.wordsLearned;
  if (words.length < 2) return null;

  // Categorize available words
  const byCategory = {};
  for (const w of words) {
    const cat = wordCategories[w] || 'noun';
    if (!byCategory[cat]) byCategory[cat] = [];
    byCategory[cat].push(w);
  }

  // Try templates
  const shuffled = wordTemplates.filter(t => {
    return t.pattern.every(cat => byCategory[cat] && byCategory[cat].length > 0);
  });
  if (shuffled.length === 0) {
    // Fallback: just pair two random words
    const a = words[Math.random() * words.length | 0];
    const b = words[Math.random() * words.length | 0];
    if (a === b) return a + '...';
    return a + '... ' + b + (Math.random() > 0.5 ? '?' : '.');
  }

  const template = shuffled[Math.random() * shuffled.length | 0];
  const chosen = template.pattern.map(cat => {
    const opts = byCategory[cat];
    return opts[Math.random() * opts.length | 0];
  });
  return template.make(...chosen);
}

// ============================================================
// GLOBAL STATE
// ============================================================
const state = {
  scene: 0,
  learnedMove: false,
  learnedJump: false,
  learnedSpeak: false,
  wordsLearned: [],
  dragCount: 0,
  bookPagesUnlocked: 1,
  thrownHard: 0,
  gentlePlaces: 0,
  totalInteractions: 0,
  sceneTriggered: {},
  transitioning: false,
  transitionAlpha: 0,
  transitionTarget: -1,
  frameCount: 0,
  sceneFrames: 0,
  // Fading drawn platforms (for edge scene)
  fadingPlatforms: [], // {x,y,w,h,life}
};

// ============================================================
// BODY CLASS
// ============================================================
class Body {
  constructor(x, y, w, h, opts = {}) {
    this.x = x; this.y = y; this.w = w; this.h = h;
    this.vx = 0; this.vy = 0;
    this.isStatic = opts.isStatic || false;
    this.draggable = opts.draggable !== undefined ? opts.draggable : !this.isStatic;
    this.color = opts.color || '#555';
    this.label = opts.label || null;
    this.type = opts.type || 'box';
    this.grounded = false;
    this.rotation = 0;
    this.rotV = 0;
    this.id = opts.id || null;
    this.visible = opts.visible !== undefined ? opts.visible : true;
    this.solid = opts.solid !== undefined ? opts.solid : true;
  }
  get left() { return this.x; }
  get right() { return this.x + this.w; }
  get top() { return this.y; }
  get bottom() { return this.y + this.h; }
  get cx() { return this.x + this.w / 2; }
  get cy() { return this.y + this.h / 2; }
}

// ============================================================
// SCENE DATA
// ============================================================
const GROUND_Y_DEFAULT = H - 60;

function makeGround(gy) {
  return new Body(0, gy || GROUND_Y_DEFAULT, W, 60, { isStatic: true, color: '#1e1e2e' });
}

  // ── SCENE 0: INERT ──

// ============================================================
// SCENE MANAGEMENT
// ============================================================
let currentPlatforms = [];
let currentBodies = [];
let currentGroundY = GROUND_Y_DEFAULT;
let currentScene = null;
let drawnPlatforms = [];

function loadScene(idx) {
  const s = scenes[idx];
  if (!s) return;
  
  state.scene = idx;
  state.sceneFrames = 0;
  currentScene = s;
  currentGroundY = s.groundY || GROUND_Y_DEFAULT;
  
  currentPlatforms = [makeGround(currentGroundY)];
  if (s.platforms) {
    for (const pf of s.platforms) currentPlatforms.push(typeof pf === 'function' ? pf() : pf);
  }
  
  currentBodies = [];
  if (s.bodies) {
    for (const bf of s.bodies) currentBodies.push(typeof bf === 'function' ? bf() : bf);
  }
  
  drawnPlatforms = [];
  state.fadingPlatforms = [];
  
  if (s.guyStart) { guy.x = s.guyStart.x; guy.y = s.guyStart.y; }
  guy.vx = 0; guy.vy = 0;
  guy.wanderTarget = null;
  guy.wanderTimer = 60;
  guy.sitting = false;
  guy.avoidX = null;
  guy.avoidDir = 0;
  guy.barkQueue = [];
  guy.currentBark = null;
  guy.idleTime = 0;
  guy.eyesClosed = false;
  
  if (s.bookPage && idx > 0) state.bookPagesUnlocked = idx + 1;
  
  // Ambient tone
  if (s.ambientFreq && ambientActive) setAmbientTone(s.ambientFreq, s.ambientVol || 0.02);
  
  // Tab title
  updateTabTitle();
}

function transitionTo(idx) {
  if (state.transitioning) return;
  state.transitioning = true;
  state.transitionTarget = idx;
  state.transitionAlpha = 0;
}

function updateTransition() {
  if (!state.transitioning) return;
  if (state.transitionTarget >= 0 && state.transitionAlpha < 1) {
    state.transitionAlpha += 0.02;
    if (state.transitionAlpha >= 1) { state.transitionAlpha = 1; loadScene(state.transitionTarget); state.transitionTarget = -1; }
  } else if (state.transitionTarget < 0) {
    state.transitionAlpha -= 0.02;
    if (state.transitionAlpha <= 0) { state.transitionAlpha = 0; state.transitioning = false; }
  }
}

function hasFired(scene, triggerId) { return !!state.sceneTriggered[scene + '_' + triggerId]; }
function findBody(id) { return currentBodies.find(b => b.id === id); }

// ============================================================
// TAB TITLE
// ============================================================
function updateTabTitle() {
  const s = state.scene;
  if (guy.inert) { document.title = 'little guy'; return; }
  if (guy.sitting) { document.title = 'little guy is sitting'; return; }
  if (state.wordsLearned.length > 0) {
    const last = state.wordsLearned[state.wordsLearned.length - 1];
    document.title = 'little guy learned ' + last;
    return;
  }
  if (state.learnedJump) { document.title = 'little guy is jumping'; return; }
  if (state.learnedMove) { document.title = 'little guy is walking'; return; }
  document.title = 'little guy';
}

// ============================================================
// MOUSE & INPUT
// ============================================================
const mouse = { x: 0, y: 0, down: false };
const mouseHistory = [];
let dragging = null;
let dragOffset = { x: 0, y: 0 };
let draggingGuy = false;
let drawMode = false;
let drawStart = null;
let lastClickTime = 0;
let lastClickTarget = null;

function recordMouse() {
  mouseHistory.push({ x: mouse.x, y: mouse.y, t: performance.now() });
  if (mouseHistory.length > MOUSE_HIST_LEN) mouseHistory.shift();
}

function getThrowVelocity() {
  if (mouseHistory.length < 2) return { vx: 0, vy: 0 };
  const oldest = mouseHistory[0];
  const newest = mouseHistory[mouseHistory.length - 1];
  const dt = (newest.t - oldest.t) / 1000;
  if (dt < 0.001) return { vx: 0, vy: 0 };
  let vx = (newest.x - oldest.x) / dt / 60;
  let vy = (newest.y - oldest.y) / dt / 60;
  const maxV = 18;
  const mag = Math.sqrt(vx * vx + vy * vy);
  if (mag > maxV) { vx *= maxV / mag; vy *= maxV / mag; }
  return { vx, vy };
}

// First interaction unlocks audio
canvas.addEventListener('click', () => { initAudio(); }, { once: true });

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
  recordMouse();
  if (draggingGuy) { guy.x = mouse.x - dragOffset.x; guy.y = mouse.y - dragOffset.y; guy.vx = 0; guy.vy = 0; }
  else if (dragging) { dragging.x = mouse.x - dragOffset.x; dragging.y = mouse.y - dragOffset.y; dragging.vx = 0; dragging.vy = 0; }
});

canvas.addEventListener('mousedown', e => {
  if (state.transitioning) return;
  initAudio();
  mouse.down = true;
  mouseHistory.length = 0;
  recordMouse();
  const now = Date.now();

  if (now - lastClickTime < 350 && lastClickTarget === 'book') { openBook(); return; }

  // Click guy — larger hitbox
  if (mouse.x >= guy.x - 14 && mouse.x <= guy.x + 14 && mouse.y >= guy.y - 38 && mouse.y <= guy.y + 2) {
    draggingGuy = true;
    dragOffset.x = mouse.x - guy.x;
    dragOffset.y = mouse.y - guy.y;
    state.dragCount++;
    state.totalInteractions++;
    if (guy.inert) { addSymbol('!'); setTimeout(() => addSymbol('?'), 200); }
    else {
      addSymbol('!');
      guy.idleTime = 0;
      guy.currentBark = null;
      guy.barkQueue.length = 0;
      // Near the pit and being dragged toward it — extra panic
      if (state.scene === 4 && hasFired(4, 'near_edge') && !hasFired(4, 'fell_in')) {
        addSymbol('!!!');
        if (state.learnedSpeak && state.wordsLearned.includes('NO')) showSpeech('NO!');
      }
    }
    lastClickTime = now; lastClickTarget = 'guy';
    return;
  }

  for (const b of currentBodies) {
    if (b.draggable && b.visible && mouse.x >= b.x && mouse.x <= b.right && mouse.y >= b.y && mouse.y <= b.bottom) {
      dragging = b;
      dragOffset.x = mouse.x - b.x;
      dragOffset.y = mouse.y - b.y;
      lastClickTime = now; lastClickTarget = b.type;
      return;
    }
  }

  drawMode = true;
  drawStart = { x: mouse.x, y: mouse.y };
  lastClickTime = now; lastClickTarget = null;
});

canvas.addEventListener('mouseup', e => {
  mouse.down = false;
  const throwVel = getThrowVelocity();

  if (draggingGuy) {
    draggingGuy = false;
    guy.vx = Math.max(-15, Math.min(15, throwVel.vx));
    guy.vy = Math.max(-15, Math.min(15, throwVel.vy));

    const speed = Math.sqrt(throwVel.vx ** 2 + throwVel.vy ** 2);
    if (speed > 6) {
      state.thrownHard++;
      if (!guy.inert) { addSymbol('!!!'); queueBark({ headTilt: -0.3, duration: 40 }); }
      playImpact(speed);
    } else {
      state.gentlePlaces++;
    }

    if (guy.inert && state.dragCount >= 1) {
      guy.inert = false;
      state.learnedMove = true;
      setTimeout(() => { addSymbol('...'); setTimeout(() => { guy.wanderTimer = 10; }, 800); }, 500);
    }
    if (!state.learnedJump && guy.y < currentGroundY - 20) {
      state.learnedJump = true;
      addSymbol('!!');
    }
    updateTabTitle();
  }

  if (dragging) {
    dragging.vx = throwVel.vx;
    dragging.vy = throwVel.vy;
    dragging.rotV = throwVel.vx * 0.05;

    if (dragging.type === 'word' && dragging.label) {
      if (Math.abs(dragging.cx - guy.x) < 60 && !state.wordsLearned.includes(dragging.label)) learnWord(dragging.label);
    }
    if (dragging.type === 'book') {
      if (Math.abs(dragging.cx - guy.x) < 50) {
        if (state.learnedSpeak) { showSpeech('...'); setTimeout(() => showSpeech('MADE... ME?'), 1500); }
        else { addSymbol('?'); setTimeout(() => addSymbol('...'), 400); }
      }
    }
    dragging = null;
  }

  if (drawMode && drawStart) {
    const dx = mouse.x - drawStart.x;
    const dy = mouse.y - drawStart.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len > 20 && state.bookPagesUnlocked >= 4) {
      const px = Math.max(0, Math.min(W, Math.min(drawStart.x, mouse.x)));
      const py = Math.max(0, Math.min(currentGroundY - 4, Math.min(drawStart.y, mouse.y)));
      const pw = Math.min(W - px, Math.abs(dx));
      const ph = Math.max(Math.abs(dy), 8);
      if (pw > 5) {
        if (currentScene && currentScene.drawingFails) {
          // Platform fizzles — appears then fades
          state.fadingPlatforms.push({ x: px, y: py, w: pw, h: ph, life: 60 });
        } else {
          drawnPlatforms.push(new Body(px, py, pw, ph, { isStatic: true, color: 'rgba(80,110,140,0.4)' }));
        }
      }
    }
    drawMode = false;
    drawStart = null;
  }
});

function getAllBookPages() {
  const pages = [];
  for (let i = 0; i <= state.scene && i < scenes.length; i++) {
    if (scenes[i].bookPage) pages.push(scenes[i].bookPage);
  }
  return pages;
}
function openBook() {
  const pages = getAllBookPages();
  document.getElementById('book-text').textContent = pages.join('\n\n─────────────────────────────\n\n');
  document.getElementById('book-overlay').style.display = 'block';
}
function closeBook() {
  document.getElementById('book-overlay').style.display = 'none';

// ============================================================
// EXPRESSION
// ============================================================
function addSymbol(sym) {
  guy.symbols.push({ text: sym, life: 90, y: 0, x: (Math.random() - 0.5) * 10 });
  playSymbol(sym);
}

function showSpeech(text) {
  guy.speechFullText = text;
  guy.speechDisplayed = '';
  guy.speechCharTimer = 0;
  guy.speechBlipIndex = 0;
  guy.currentSpeech = text; // for measurement
  guy.speechFade = 160 + text.length * 5;
  updateTabTitle();
}

function updateSpeechTyping() {
  if (guy.speechDisplayed.length < guy.speechFullText.length && guy.speechFade > 0) {
    guy.speechCharTimer++;
    if (guy.speechCharTimer >= 3) { // 3 frames per character
      guy.speechCharTimer = 0;
      const nextChar = guy.speechFullText[guy.speechDisplayed.length];
      guy.speechDisplayed += nextChar;
      if (nextChar !== ' ' && nextChar !== '.') {
        playSpeechBlip(nextChar, guy.speechBlipIndex++);
      }
    }
  }
}

function learnWord(word) {
  if (state.wordsLearned.includes(word)) return;
  state.wordsLearned.push(word);
  if (!state.learnedSpeak) state.learnedSpeak = true;
  queueBark({ lookAt: { x: guy.x, y: guy.y - 10 }, duration: 30 });
  setTimeout(() => showSpeech(word), 400);
  setTimeout(() => showSpeech(word + '...'), 1400);
  updateTabTitle();
}

function queueBark(bark) { guy.barkQueue.push(bark); }

// ============================================================
// BARK SYSTEM
// ============================================================
function updateBarks() {
  if (guy.inert || draggingGuy) return;
  
  // Eyes close timer
  if (guy.eyesCloseTimer > 0) {
    guy.eyesCloseTimer--;
    guy.eyesClosed = true;
    if (guy.eyesCloseTimer <= 0) guy.eyesClosed = false;
  }

  if (guy.sitting) return; // no barks when sitting (monologue handles it)

  if (guy.currentBark) {
    guy.barkTimer--;
    if (guy.currentBark.eyesClosed && guy.barkTimer < 20) {
      guy.eyesCloseTimer = 20;
    }
    if (guy.barkTimer <= 0) { guy.currentBark = null; guy.lookTarget = null; guy.headTiltTarget = 0; }
    return;
  }

  if (guy.barkQueue.length > 0) {
    const b = guy.barkQueue.shift();
    guy.currentBark = b;
    guy.barkTimer = b.duration || 60;
    if (b.lookAt) guy.lookTarget = b.lookAt;
    if (b.headTilt !== undefined) guy.headTiltTarget = b.headTilt;
    if (b.symbol) addSymbol(b.symbol);
    if (b.speech) showSpeech(b.speech);
    if (b.eyesClosed) guy.eyesCloseTimer = b.duration;
    return;
  }

  guy.idleTime++;
  if (guy.idleTime > 200 && guy.idleTime % 220 === 0) {
    const interests = [];
    for (const b of currentBodies) {
      if (b.visible && Math.abs(b.cx - guy.x) < 300) interests.push(b);
    }
    if (interests.length > 0) {
      const t = interests[Math.random() * interests.length | 0];
      queueBark({ lookAt: { x: t.cx, y: t.cy }, duration: 80 + Math.random() * 60 | 0, symbol: '?' });
    } else {
      queueBark({ lookAt: { x: guy.x + (Math.random() > 0.5 ? 200 : -200), y: guy.y - 40 }, duration: 40 });
      queueBark({ lookAt: { x: guy.x + (Math.random() > 0.5 ? -150 : 150), y: guy.y - 20 }, duration: 40 });
      // Sigh with eyes closed
      queueBark({ headTilt: -0.4, duration: 80, symbol: '...', eyesClosed: true });
    }

    // Auto-generate novel speech during idle (scenes 5+)
    if (state.scene >= 5 && state.wordsLearned.length >= 3 && Math.random() < 0.3) {
      const phrase = generatePhrase();
      if (phrase) {
        queueBark({ duration: 60 });
        setTimeout(() => showSpeech(phrase), 500);
      }
    }
  }
}

// ============================================================
// PHYSICS
// ============================================================
function resolveBody(body) {
  if (body.isStatic) return;
  body.vy += GRAVITY;
  body.vx *= body.grounded ? GROUND_FRIC : AIR_DRAG;
  body.x += body.vx; body.y += body.vy;
  body.rotation += body.rotV;
  if (body.grounded) body.rotV *= 0.85; else body.rotV *= 0.99;
  body.grounded = false;

  const allPlats = [...currentPlatforms, ...drawnPlatforms];
  for (const p of allPlats) {
    if (body === p || !p.solid) continue;
    if (body.right > p.left && body.left < p.right) {
      if (body.bottom >= p.top && body.bottom <= p.top + 16 && body.vy >= 0) {
        body.y = p.top - body.h;
        if (body.vy > 2) { body.vy = -body.vy * BOUNCE; playImpact(body.vy); }
        else body.vy = 0;
        body.grounded = true;
        if (Math.abs(body.vx) > 0.5) body.rotV = body.vx * 0.03;
      }
    }
  }
  if (body.bottom >= currentGroundY) {
    body.y = currentGroundY - body.h;
    if (body.vy > 2) { body.vy = -body.vy * BOUNCE; playImpact(body.vy); }
    else body.vy = 0;
    body.grounded = true;
  }
  if (body.x < 0) { body.x = 0; body.vx = Math.abs(body.vx) * BOUNCE; body.rotV *= -0.5; }
  if (body.right > W) { body.x = W - body.w; body.vx = -Math.abs(body.vx) * BOUNCE; body.rotV *= -0.5; }
  if (body.grounded && Math.abs(body.vx) < 0.3) { body.rotation *= 0.9; body.rotV *= 0.8; }
}

function resolveGuy() {
  if (draggingGuy) return;
  guy.vy += GRAVITY;
  guy.vx *= guy.grounded ? GROUND_FRIC : AIR_DRAG;
  guy.x += guy.vx; guy.y += guy.vy;
  guy.grounded = false;

  const allPlats = [...currentPlatforms, ...drawnPlatforms];
  const hw = guy.w / 2;
  for (const p of allPlats) {
    if (!p.solid) continue;
    if (guy.x + hw > p.x && guy.x - hw < p.right) {
      if (guy.y >= p.y && guy.y <= p.y + 16 && guy.vy >= 0) {
        guy.y = p.y;
        if (guy.vy > 4) {
          guy.vy = -guy.vy * 0.25;
          if (!guy.inert) { addSymbol('!'); playImpact(4); }
        } else guy.vy = 0;
        guy.grounded = true;
      }
    }
  }
  if (guy.y >= currentGroundY && !currentScene?.customGround) {
    if (guy.vy > 4) {
      guy.vy = -guy.vy * 0.25;
      if (!guy.inert) { addSymbol('!'); playImpact(4); }
    } else guy.vy = 0;
    guy.y = currentGroundY;
    guy.grounded = true;
  }
  if (guy.y > H + 50) { guy.y = H - 20; guy.vy = 0; guy.grounded = true; }
  if (guy.x < 20) { guy.x = 20; guy.vx = Math.abs(guy.vx) * 0.4; }
  if (guy.x > W - 20) { guy.x = W - 20; guy.vx = -Math.abs(guy.vx) * 0.4; }
}

// ============================================================
// GUY AI
// ============================================================
function updateGuyAI() {
  if (guy.inert || draggingGuy || guy.sitting) return;
  const speed = Math.sqrt(guy.vx ** 2 + guy.vy ** 2);
  if (speed > 2) { guy.idleTime = 0; guy.wanderTarget = null; return; }

  // Energy decreases through scenes — slower movement later
  guy.energy = Math.max(0.4, 1.0 - state.scene * 0.07);

  // Pit avoidance — actively flee
  if (guy.avoidX !== null && guy.grounded) {
    if (guy.x > guy.avoidX - 40) {
      guy.vx -= 0.3;
      guy.wanderTarget = null;
      return;
    }
  }

  guy.wanderTimer--;
  if (guy.wanderTimer <= 0) {
    if (Math.random() < 0.4) {
      guy.wanderTarget = null;
      guy.wanderTimer = (80 + Math.random() * 120 | 0) / guy.energy;
    } else {
      let target = 40 + Math.random() * (W - 80);
      if (guy.avoidX !== null && target > guy.avoidX - 30) target = guy.avoidX - 80;
      guy.wanderTarget = target;
      guy.wanderTimer = (100 + Math.random() * 150 | 0) / guy.energy;
      guy.idleTime = 0;
    }
  }

  if (guy.wanderTarget !== null) {
    const dx = guy.wanderTarget - guy.x;
    if (Math.abs(dx) > 8) {
      guy.vx += (dx > 0 ? 0.15 : -0.15) * guy.energy;
      if (state.learnedJump && guy.grounded && Math.abs(guy.vx) < 0.3 && Math.abs(dx) > 15) guy.vy = -7;
    } else {
      guy.wanderTarget = null;
    }
    guy.idleTime = 0;
  }
}

// ============================================================
// LOOK
// ============================================================
function updateLook() {
  guy.headTilt += (guy.headTiltTarget - guy.headTilt) * 0.08;
  if (guy.lookTarget) {
    const dx = guy.lookTarget.x - guy.x;
    const dy = guy.lookTarget.y - (guy.y - 26);
    guy.eyeDir += ((dx > 5 ? 1 : dx < -5 ? -1 : 0) - guy.eyeDir) * 0.12;
    guy.eyeY += (Math.max(-2, Math.min(2, dy * 0.02)) - guy.eyeY) * 0.1;
  } else if (!guy.inert) {
    const td = guy.vx > 0.3 ? 1 : guy.vx < -0.3 ? -1 : 0;
    guy.eyeDir += (td - guy.eyeDir) * 0.06;
    guy.eyeY += (0 - guy.eyeY) * 0.05;
  }
  if (!guy.currentBark) guy.headTiltTarget = 0;
}

// ============================================================
// TRIGGERS
// ============================================================
const triggerDelays = {};

function updateTriggers() {
  if (!currentScene || !currentScene.triggers) return;
  for (const t of currentScene.triggers) {
    const key = state.scene + '_' + t.id;
    if (t.once && state.sceneTriggered[key]) continue;
    if (t.condition()) {
      if (t.delay && !triggerDelays[key]) { triggerDelays[key] = t.delay; continue; }
      if (triggerDelays[key]) { triggerDelays[key]--; if (triggerDelays[key] > 0) continue; delete triggerDelays[key]; }
      state.sceneTriggered[key] = true;
      t.action();
    }
  }
}

// ============================================================
// WORD BLOCK PROXIMITY
// ============================================================
function checkWordProximity() {
  if (guy.inert) return;
  for (const b of currentBodies) {
    if (b.type === 'word' && b.label && !state.wordsLearned.includes(b.label)) {
      if (Math.abs(b.cx - guy.x) < 50 && b.grounded) learnWord(b.label);
    }
  }
}

// ============================================================
// UPDATE
// ============================================================
function update() {
  state.frameCount++;
  state.sceneFrames++;
  
  updateTransition();
  if (state.transitioning && state.transitionAlpha >= 1) return;
  
  resolveGuy();
  for (const b of currentBodies) { if (b !== dragging && b.visible) resolveBody(b); }
  
  updateGuyAI();
  updateBarks();
  updateLook();
  updateTriggers();
  checkWordProximity();
  updateSpeechTyping();
  
  // Symbols
  for (let i = guy.symbols.length - 1; i >= 0; i--) {
    guy.symbols[i].life--;
    guy.symbols[i].y -= 0.6;
    if (guy.symbols[i].life <= 0) guy.symbols.splice(i, 1);
  }
  if (guy.speechFade > 0) guy.speechFade--;
  
  // Fading platforms
  for (let i = state.fadingPlatforms.length - 1; i >= 0; i--) {
    state.fadingPlatforms[i].life--;
    if (state.fadingPlatforms[i].life <= 0) state.fadingPlatforms.splice(i, 1);
  }
}

// ============================================================
// RENDER
// ============================================================
function render() {
  const s = currentScene || scenes[0];
  
  ctx.fillStyle = s.bgColor || '#0f0f1a';
  ctx.fillRect(0, 0, W, H);
  
  if (!s.customGround) {
    ctx.fillStyle = s.groundColor || '#1a1a2a';
    ctx.fillRect(0, currentGroundY, W, H - currentGroundY);
    ctx.strokeStyle = '#2a2a3e'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, currentGroundY); ctx.lineTo(W, currentGroundY); ctx.stroke();
  }
  
  for (const p of currentPlatforms) {
    if (p.y === currentGroundY && p.w === W) continue;
    ctx.fillStyle = p.color || '#2a2a3e';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.strokeStyle = '#3a3a4e'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.right, p.y); ctx.stroke();
  }
  
  // Drawn platforms
  for (const p of drawnPlatforms) {
    ctx.fillStyle = 'rgba(80,110,140,0.3)';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.strokeStyle = 'rgba(80,110,140,0.5)'; ctx.lineWidth = 1;
    ctx.strokeRect(p.x, p.y, p.w, p.h);
  }
  
  // Fading platforms (edge scene)
  for (const fp of state.fadingPlatforms) {
    const alpha = fp.life / 60;
    ctx.fillStyle = `rgba(80,110,140,${alpha * 0.3})`;
    ctx.fillRect(fp.x, fp.y, fp.w, fp.h);
    ctx.strokeStyle = `rgba(80,110,140,${alpha * 0.5})`;
    ctx.lineWidth = 1;
    ctx.strokeRect(fp.x, fp.y, fp.w, fp.h);
  }
  
  // Draw preview
  if (drawMode && drawStart && state.bookPagesUnlocked >= 4) {
    ctx.strokeStyle = currentScene?.drawingFails ? 'rgba(140,80,80,0.3)' : 'rgba(80,110,140,0.3)';
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(Math.min(drawStart.x, mouse.x), Math.min(drawStart.y, mouse.y),
      Math.abs(mouse.x - drawStart.x), Math.max(Math.abs(mouse.y - drawStart.y), 8));
    ctx.setLineDash([]);
  }
  
  // Scene-specific rendering
  if (state.scene === 4) renderPitScene();
  if (state.scene === 7) renderEdgeScene();
  
  // Bodies
  for (const b of currentBodies) {
    if (!b.visible) continue;
    ctx.save();
    ctx.translate(b.cx, b.cy);
    ctx.rotate(b.rotation);
    
    if (b.type === 'book') {
      ctx.fillStyle = b.color;
      ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h);
      ctx.strokeStyle = '#8a7a5a'; ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath(); ctx.moveTo(-b.w/2 + 4, -b.h/2 + 4 + i * 5);
        ctx.lineTo(b.w/2 - 4, -b.h/2 + 4 + i * 5); ctx.stroke();
      }
    } else if (b.type === 'key') {
      ctx.fillStyle = b.color;
      ctx.beginPath(); ctx.arc(0, -4, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(-2, 0, 4, 12);
      ctx.fillRect(-4, 8, 8, 3);
    } else if (b.type === 'door') {
      ctx.fillStyle = b.color;
      ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h);
      ctx.fillStyle = '#887766';
      ctx.beginPath(); ctx.arc(b.w/2 - 8, 0, 3, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = b.color;
      ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h);
    }
    
    if (b.label) {
      ctx.fillStyle = '#aabbcc'; ctx.font = '9px monospace'; ctx.textAlign = 'center';
      ctx.fillText(b.label, 0, 3); ctx.textAlign = 'left';
    }
    ctx.restore();
  }
  
  // Character
  drawCharacter();
  
  // Symbols
  for (const sym of guy.symbols) {
    const alpha = Math.min(1, sym.life / 20);
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.font = 'bold 14px monospace'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
    ctx.fillText(sym.text, guy.x + (sym.x || 0), guy.y - guy.h - 10 + sym.y);
    ctx.restore();
  }
  
  // Speech — typed out character by character
  if (guy.speechDisplayed && guy.speechFade > 0) {
    const alpha = Math.min(1, guy.speechFade / 20);
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.font = '13px monospace';
    const tw = ctx.measureText(guy.speechDisplayed).width;
    const fullTw = ctx.measureText(guy.speechFullText).width;
    const bx = Math.max(5, Math.min(W - fullTw - 25, guy.x - fullTw / 2 - 10));
    const by = Math.max(5, guy.y - guy.h - 45);
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(bx, by, fullTw + 20, 26, 5); ctx.fill(); }
    else ctx.fillRect(bx, by, fullTw + 20, 26);
    ctx.fillStyle = '#ddd';
    ctx.fillText(guy.speechDisplayed, bx + 10, by + 17);
    ctx.restore();
  }
  
  // Hint
  if (currentScene && currentScene.hint) {
    const h = currentScene.hint();
    if (h) {
      ctx.save();
      ctx.globalAlpha = 0.3 + 0.1 * Math.sin(Date.now() / 1000);
      ctx.font = '11px monospace'; ctx.fillStyle = '#666'; ctx.textAlign = 'center';
      ctx.fillText(h.text, h.x, h.y);
      ctx.restore();
    }
  }
  
  if (state.scene > 0) {
    ctx.save(); ctx.globalAlpha = 0.15;
    ctx.font = '10px monospace'; ctx.fillStyle = '#888';
    ctx.fillText((state.scene + 1) + '/9', 10, H - 8);
    ctx.restore();
  }
  
  if (state.transitioning || state.transitionAlpha > 0) {
    ctx.fillStyle = `rgba(0,0,0,${state.transitionAlpha})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function renderPitScene() {
  ctx.fillStyle = '#050508';
  ctx.fillRect(300, GROUND_Y_DEFAULT, 150, H - GROUND_Y_DEFAULT);
  if (hasFired(4, 'landed_other_side')) {
    const grd = ctx.createRadialGradient(600, GROUND_Y_DEFAULT + 40, 10, 600, GROUND_Y_DEFAULT + 40, 200);
    grd.addColorStop(0, 'rgba(60,50,30,0.15)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);
  }
  ctx.fillStyle = '#141420';
  ctx.fillRect(0, GROUND_Y_DEFAULT, 300, H - GROUND_Y_DEFAULT);
  ctx.fillStyle = '#1e1e2e';
  ctx.fillRect(450, GROUND_Y_DEFAULT + 60, 350, H - GROUND_Y_DEFAULT - 60);
  ctx.strokeStyle = '#2a2a3e'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, GROUND_Y_DEFAULT); ctx.lineTo(300, GROUND_Y_DEFAULT); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(450, GROUND_Y_DEFAULT + 60); ctx.lineTo(W, GROUND_Y_DEFAULT + 60); ctx.stroke();
}

function renderEdgeScene() {
  if (state.sceneTriggered['7_exit_ready']) {
    ctx.save();
    ctx.globalAlpha = 0.3 + 0.15 * Math.sin(Date.now() / 800);
    ctx.fillStyle = '#334';
    ctx.fillRect(385, currentGroundY - 2, 30, 6);
    ctx.restore();
  }
}

function drawCharacter() {
  const x = guy.x;
  const footY = guy.y;
  const bodyY = guy.sitting ? footY - 8 : footY - 12;
  const headY = guy.sitting ? footY - 20 : footY - 26;
  
  ctx.strokeStyle = '#999'; ctx.lineWidth = 2;
  if (guy.sitting) {
    ctx.beginPath();
    ctx.moveTo(x - 4, bodyY + 4); ctx.lineTo(x - 8, footY);
    ctx.moveTo(x + 4, bodyY + 4); ctx.lineTo(x + 8, footY);
    ctx.stroke();
  } else {
    const legAnim = guy.grounded ? Math.sin(Date.now() / 120) * Math.min(3, Math.abs(guy.vx) * 2) : 0;
    ctx.beginPath();
    ctx.moveTo(x - 4, bodyY + 5); ctx.lineTo(x - 5 - legAnim, footY);
    ctx.moveTo(x + 4, bodyY + 5); ctx.lineTo(x + 5 + legAnim, footY);
    ctx.stroke();
  }
  
  const armAnim = guy.sitting ? 0 : Math.sin(Date.now() / 140) * Math.min(4, Math.abs(guy.vx) * 2);
  ctx.beginPath();
  ctx.moveTo(x - guy.bodyR, bodyY); ctx.lineTo(x - guy.bodyR - 4 - armAnim, bodyY + 10);
  ctx.moveTo(x + guy.bodyR, bodyY); ctx.lineTo(x + guy.bodyR + 4 + armAnim, bodyY + 10);
  ctx.stroke();
  
  ctx.fillStyle = guy.inert ? '#777' : '#bbb';
  ctx.beginPath(); ctx.arc(x, bodyY, guy.bodyR, 0, Math.PI * 2); ctx.fill();
  
  ctx.save();
  ctx.translate(x, headY);
  ctx.rotate(guy.headTilt * 0.3);
  ctx.fillStyle = guy.inert ? '#888' : '#ccc';
  ctx.beginPath(); ctx.arc(0, 0, guy.headR, 0, Math.PI * 2); ctx.fill();
  
  if (!guy.inert) {
    if (guy.eyesClosed) {
      // Closed eyes — horizontal lines (like when inert, but thinner)
      ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(-5, -1); ctx.lineTo(-1, -1);
      ctx.moveTo(1, -1); ctx.lineTo(5, -1);
      ctx.stroke();
    } else {
      const ex = guy.eyeDir * 2.5;
      const ey = guy.eyeY;
      ctx.fillStyle = '#333';
      ctx.beginPath();
      ctx.arc(-3 + ex, -1 + ey, 1.5, 0, Math.PI * 2);
      ctx.arc(3 + ex, -1 + ey, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-5, 0); ctx.lineTo(-2, 0);
    ctx.moveTo(2, 0); ctx.lineTo(5, 0);
    ctx.stroke();
  }
  ctx.restore();
}

// ============================================================
// LOOP
// ============================================================
loadScene(0);

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
