<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>little guy</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: monospace; }
canvas { cursor: default; }
#book-overlay {
  display: none;
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: #1a1a1a;
  border: 1px solid #444;
  padding: 30px 40px;
  max-width: 500px;
  color: #8a8;
  font-family: monospace;
  font-size: 13px;
  line-height: 1.7;
  white-space: pre-wrap;
  z-index: 10;
  border-radius: 4px;
}
#book-overlay .close {
  position: absolute; top: 8px; right: 12px;
  color: #666; cursor: pointer; font-size: 16px;
}
#book-overlay .close:hover { color: #aaa; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="book-overlay"><span class="close" onclick="closeBook()">×</span><pre id="book-text"></pre></div>
<script>
// --- Canvas setup ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 500;
canvas.width = W; canvas.height = H;

// --- Physics ---
const GRAVITY = 0.4;
const GROUND_Y = H - 60;

// --- Game state ---
const state = {
  learnedMove: false,
  learnedJump: false,
  learnedSpeak: false,
  bookPageUnlocked: 1,
  wordsLearned: [],
  dragCount: 0,
};

// --- Bodies (physics objects) ---
class Body {
  constructor(x, y, w, h, opts = {}) {
    this.x = x; this.y = y; this.w = w; this.h = h;
    this.vx = 0; this.vy = 0;
    this.static = opts.static || false;
    this.draggable = opts.draggable !== undefined ? opts.draggable : !this.static;
    this.color = opts.color || '#555';
    this.label = opts.label || null;
    this.type = opts.type || 'box';
    this.grounded = false;
  }
  get left() { return this.x; }
  get right() { return this.x + this.w; }
  get top() { return this.y; }
  get bottom() { return this.y + this.h; }
  get cx() { return this.x + this.w / 2; }
  get cy() { return this.y + this.h / 2; }
}

// --- World objects ---
const ground = new Body(0, GROUND_Y, W, 60, { static: true, color: '#1e1e2e' });

const platforms = [
  ground,
  new Body(250, GROUND_Y - 40, 80, 12, { static: true, color: '#2a2a3e' }), // small step for puzzle 2
];

const book = new Body(180, GROUND_Y - 20, 22, 18, { color: '#6b5b3a', type: 'book', draggable: true });

// Word blocks
const wordBlocks = [
  new Body(500, GROUND_Y - 16, 40, 16, { color: '#3a4a5a', type: 'word', label: 'HERE', draggable: true }),
  new Body(560, GROUND_Y - 16, 32, 16, { color: '#3a4a5a', type: 'word', label: 'GO', draggable: true }),
  new Body(610, GROUND_Y - 16, 32, 16, { color: '#3a4a5a', type: 'word', label: 'NO', draggable: true }),
  new Body(660, GROUND_Y - 16, 36, 16, { color: '#3a4a5a', type: 'word', label: 'WHY', draggable: true }),
];

const dynamicBodies = [book, ...wordBlocks];

// --- Character ---
const guy = {
  x: 100, y: GROUND_Y,
  vx: 0, vy: 0,
  w: 16, h: 34, // collision box
  headR: 8,
  bodyR: 7,
  grounded: false,
  // State
  inert: true,
  moving: false,
  // Expression
  symbols: [], // floating symbols above head
  speech: [],  // speech bubbles
  speechTimer: 0,
  currentSpeech: '',
  speechFade: 0,
  // AI
  wanderTarget: null,
  wanderTimer: 0,
};

// --- Drawn platforms ---
const drawnPlatforms = [];

// --- Mouse ---
const mouse = { x: 0, y: 0, down: false };
let dragging = null; // object being dragged
let dragOffset = { x: 0, y: 0 };
let draggingGuy = false;
let drawMode = false;
let drawStart = null;
let lastClickTime = 0;
let lastClickTarget = null;

// --- Book pages ---
const bookPages = [
  `// version 0.1
// He's in there. All the code is running.
// He just doesn't know what he can do yet.
//
// Try moving him. Click and drag.
// He won't like it. That's okay.`,

  `// jump_height: 8
// He can jump. But he has to learn
// what "up" means first.
// Lift him onto something higher.
// He'll figure it out.`,

  `// talk: true (dormant)
// He has a voice. He just needs words.
// The blocks have labels. Bring them to him.
// Start with something simple.`,

  `// He's getting smarter. Watch.
// Give him a path and he'll try to take it.
// You don't have to carry him everywhere.
//
// You can draw platforms too —
// click and drag on empty space.`,

  `// I don't know if this is right.
// I just wanted to see what would happen.
// Maybe that's enough.
// I hope it's enough.`,
];

// --- Input ---
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = e.clientX - r.left;
  mouse.y = e.clientY - r.top;
  
  if (draggingGuy) {
    guy.x = mouse.x - dragOffset.x;
    guy.y = mouse.y - dragOffset.y;
    guy.vx = 0; guy.vy = 0;
  } else if (dragging) {
    dragging.x = mouse.x - dragOffset.x;
    dragging.y = mouse.y - dragOffset.y;
    dragging.vx = 0; dragging.vy = 0;
  }
});

canvas.addEventListener('mousedown', e => {
  mouse.down = true;
  const now = Date.now();
  
  // Check double-click on book
  if (now - lastClickTime < 350 && lastClickTarget === 'book') {
    openBook();
    return;
  }
  
  // Check click on guy
  const guyBounds = { x: guy.x - guy.w/2, y: guy.y - guy.h, w: guy.w, h: guy.h };
  if (mouse.x >= guyBounds.x && mouse.x <= guyBounds.x + guyBounds.w &&
      mouse.y >= guyBounds.y && mouse.y <= guyBounds.y + guyBounds.h) {
    draggingGuy = true;
    dragOffset.x = mouse.x - guy.x;
    dragOffset.y = mouse.y - guy.y;
    
    state.dragCount++;
    if (guy.inert) {
      addSymbol('!');
      addSymbol('?');
    } else {
      addSymbol('!');
    }
    
    lastClickTime = now;
    lastClickTarget = 'guy';
    return;
  }
  
  // Check click on bodies
  for (const b of dynamicBodies) {
    if (b.draggable && mouse.x >= b.x && mouse.x <= b.right && mouse.y >= b.y && mouse.y <= b.bottom) {
      dragging = b;
      dragOffset.x = mouse.x - b.x;
      dragOffset.y = mouse.y - b.y;
      
      lastClickTime = now;
      lastClickTarget = b.type;
      return;
    }
  }
  
  // Start drawing platform
  drawMode = true;
  drawStart = { x: mouse.x, y: mouse.y };
  lastClickTime = now;
  lastClickTarget = null;
});

canvas.addEventListener('mouseup', e => {
  mouse.down = false;
  
  if (draggingGuy) {
    draggingGuy = false;
    guy.vy = 0;
    
    // If was inert and dragged enough, learn to move
    if (guy.inert && state.dragCount >= 1) {
      guy.inert = false;
      state.learnedMove = true;
      setTimeout(() => {
        addSymbol('...');
        // He tries moving on his own after a beat
        setTimeout(() => { guy.wanderTimer = 10; }, 800);
      }, 500);
    }
    
    // If placed on the step (high platform), learn to jump
    if (!state.learnedJump && guy.y < GROUND_Y - 20) {
      state.learnedJump = true;
      state.bookPageUnlocked = Math.max(state.bookPageUnlocked, 2);
      addSymbol('!!');
    }
  }
  
  if (dragging) {
    // Check if word block brought near guy
    if (dragging.type === 'word' && dragging.label) {
      const dist = Math.abs(dragging.cx - guy.x);
      if (dist < 60 && !state.wordsLearned.includes(dragging.label)) {
        learnWord(dragging.label);
      }
    }
    // Check if book brought near guy
    if (dragging.type === 'book') {
      const dist = Math.abs(dragging.cx - guy.x);
      if (dist < 50) {
        // Character examines the book
        if (state.learnedSpeak) {
          showSpeech("...");
          setTimeout(() => showSpeech("MADE... ME?"), 1500);
        } else {
          addSymbol('?');
          addSymbol('...');
        }
      }
    }
    dragging = null;
  }
  
  if (drawMode && drawStart) {
    const dx = mouse.x - drawStart.x;
    const dy = mouse.y - drawStart.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len > 20 && state.bookPageUnlocked >= 4) {
      drawnPlatforms.push(new Body(
        Math.min(drawStart.x, mouse.x),
        Math.min(drawStart.y, mouse.y),
        Math.abs(dx),
        Math.max(Math.abs(dy), 8),
        { static: true, color: 'rgba(80,110,140,0.4)' }
      ));
    }
    drawMode = false;
    drawStart = null;
  }
});

// --- Book overlay ---
function openBook() {
  const text = bookPages.slice(0, state.bookPageUnlocked).join('\n\n---\n\n');
  document.getElementById('book-text').textContent = text;
  document.getElementById('book-overlay').style.display = 'block';
}
function closeBook() {
  document.getElementById('book-overlay').style.display = 'none';
}

// --- Expression system ---
function addSymbol(sym) {
  guy.symbols.push({ text: sym, life: 80, y: 0 });
}

function showSpeech(text) {
  guy.currentSpeech = text;
  guy.speechFade = 120 + text.length * 3;
}

function learnWord(word) {
  state.wordsLearned.push(word);
  if (!state.learnedSpeak) {
    state.learnedSpeak = true;
    state.bookPageUnlocked = Math.max(state.bookPageUnlocked, 3);
  }
  // He says the word
  setTimeout(() => showSpeech(word), 300);
  setTimeout(() => showSpeech(word + "..."), 1200);
  
  // Unlock more book pages based on progress
  if (state.wordsLearned.length >= 2) {
    state.bookPageUnlocked = Math.max(state.bookPageUnlocked, 4);
  }
  if (state.wordsLearned.length >= 3) {
    state.bookPageUnlocked = Math.max(state.bookPageUnlocked, 5);
  }
}

// --- Collision resolution ---
function resolveBody(body, allPlatforms) {
  if (body.static) return;
  
  body.vy += GRAVITY;
  body.x += body.vx;
  body.y += body.vy;
  body.vx *= 0.9;
  body.grounded = false;
  
  for (const p of allPlatforms) {
    if (body === p) continue;
    // Simple top-collision
    if (body.right > p.left && body.left < p.right) {
      if (body.bottom >= p.top && body.bottom <= p.top + 20 && body.vy >= 0) {
        body.y = p.top - body.h;
        body.vy = 0;
        body.grounded = true;
      }
    }
  }
  
  // Screen bounds
  body.x = Math.max(0, Math.min(W - body.w, body.x));
  if (body.bottom > GROUND_Y) {
    body.y = GROUND_Y - body.h;
    body.vy = 0;
    body.grounded = true;
  }
}

function resolveGuy() {
  if (draggingGuy) return;
  
  guy.vy += GRAVITY;
  guy.vx *= 0.85;
  guy.x += guy.vx;
  guy.y += guy.vy;
  guy.grounded = false;
  
  const allPlats = [...platforms, ...drawnPlatforms];
  const halfW = guy.w / 2;
  
  for (const p of allPlats) {
    if (guy.x + halfW > p.x && guy.x - halfW < p.right) {
      if (guy.y >= p.y && guy.y <= p.y + 16 && guy.vy >= 0) {
        guy.y = p.y;
        guy.vy = 0;
        guy.grounded = true;
      }
    }
  }
  
  // Ground
  if (guy.y >= GROUND_Y) {
    guy.y = GROUND_Y;
    guy.vy = 0;
    guy.grounded = true;
  }
  
  // Walls
  guy.x = Math.max(20, Math.min(W - 20, guy.x));
}

// --- Guy AI ---
function updateGuyAI() {
  if (guy.inert || draggingGuy) return;
  
  guy.wanderTimer--;
  if (guy.wanderTimer <= 0) {
    if (Math.random() < 0.35) {
      guy.wanderTarget = null;
      guy.wanderTimer = 60 + Math.random() * 100 | 0;
    } else {
      guy.wanderTarget = 40 + Math.random() * (W - 80);
      guy.wanderTimer = 100 + Math.random() * 150 | 0;
    }
  }
  
  if (guy.wanderTarget !== null) {
    const dx = guy.wanderTarget - guy.x;
    if (Math.abs(dx) > 8) {
      guy.vx += (dx > 0 ? 0.15 : -0.15);
      // Jump if stuck and can jump
      if (state.learnedJump && guy.grounded && Math.abs(guy.vx) < 0.3 && Math.abs(dx) > 15) {
        guy.vy = -7;
      }
    } else {
      guy.wanderTarget = null;
    }
  }
}

// --- Update ---
function update() {
  resolveGuy();
  
  for (const b of dynamicBodies) {
    if (b !== dragging) {
      resolveBody(b, [...platforms, ...drawnPlatforms]);
    }
  }
  
  updateGuyAI();
  
  // Update symbols
  for (let i = guy.symbols.length - 1; i >= 0; i--) {
    guy.symbols[i].life--;
    guy.symbols[i].y -= 0.5;
    if (guy.symbols[i].life <= 0) guy.symbols.splice(i, 1);
  }
  
  // Speech timer
  if (guy.speechFade > 0) guy.speechFade--;
}

// --- Render ---
function render() {
  // Background
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, W, H);
  
  // Ground
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.strokeStyle = '#2a2a3e';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();
  
  // Static platforms
  for (const p of platforms) {
    if (p === ground) continue;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.w, p.h);
  }
  
  // Drawn platforms
  for (const p of drawnPlatforms) {
    ctx.fillStyle = 'rgba(80,110,140,0.3)';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.strokeStyle = 'rgba(80,110,140,0.5)';
    ctx.lineWidth = 1;
    ctx.strokeRect(p.x, p.y, p.w, p.h);
  }
  
  // Draw preview
  if (drawMode && drawStart && state.bookPageUnlocked >= 4) {
    ctx.strokeStyle = 'rgba(80,110,140,0.3)';
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(
      Math.min(drawStart.x, mouse.x),
      Math.min(drawStart.y, mouse.y),
      Math.abs(mouse.x - drawStart.x),
      Math.max(Math.abs(mouse.y - drawStart.y), 8)
    );
    ctx.setLineDash([]);
  }
  
  // Dynamic bodies (book, word blocks)
  for (const b of dynamicBodies) {
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    
    if (b.type === 'book') {
      // Book detail — little lines
      ctx.strokeStyle = '#8a7a5a';
      ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(b.x + 4, b.y + 4 + i * 5);
        ctx.lineTo(b.x + b.w - 4, b.y + 4 + i * 5);
        ctx.stroke();
      }
    }
    
    if (b.label) {
      ctx.fillStyle = '#aabbcc';
      ctx.font = '9px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(b.label, b.cx, b.cy + 3);
      ctx.textAlign = 'left';
    }
  }
  
  // Character
  drawCharacter();
  
  // Symbols above head
  for (const s of guy.symbols) {
    const alpha = Math.min(1, s.life / 20);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = '14px monospace';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(s.text, guy.x, guy.y - guy.h - 10 + s.y);
    ctx.textAlign = 'left';
    ctx.restore();
  }
  
  // Speech bubble
  if (guy.currentSpeech && guy.speechFade > 0) {
    const alpha = Math.min(1, guy.speechFade / 20);
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = '13px monospace';
    const tw = ctx.measureText(guy.currentSpeech).width;
    const bx = guy.x - tw/2 - 10;
    const by = guy.y - guy.h - 35;
    
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    if (ctx.roundRect) {
      ctx.beginPath();
      ctx.roundRect(bx, by, tw + 20, 24, 4);
      ctx.fill();
    } else {
      ctx.fillRect(bx, by, tw + 20, 24);
    }
    
    ctx.fillStyle = '#ddd';
    ctx.textAlign = 'center';
    ctx.fillText(guy.currentSpeech, guy.x, by + 16);
    ctx.textAlign = 'left';
    ctx.restore();
  }
  
  // Hint text (only at very start)
  if (guy.inert && state.dragCount === 0) {
    ctx.save();
    ctx.globalAlpha = 0.3 + 0.1 * Math.sin(Date.now() / 1000);
    ctx.font = '11px monospace';
    ctx.fillStyle = '#666';
    ctx.textAlign = 'center';
    ctx.fillText('double-click the book', book.cx, book.y - 8);
    ctx.textAlign = 'left';
    ctx.restore();
  }
}

function drawCharacter() {
  const x = guy.x;
  const footY = guy.y;
  const bodyY = footY - 12;
  const headY = footY - 26;
  
  // Legs
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - 4, bodyY + 5);
  ctx.lineTo(x - 5, footY);
  ctx.moveTo(x + 4, bodyY + 5);
  ctx.lineTo(x + 5, footY);
  ctx.stroke();
  
  // Body
  ctx.fillStyle = guy.inert ? '#777' : '#bbb';
  ctx.beginPath();
  ctx.arc(x, bodyY, guy.bodyR, 0, Math.PI * 2);
  ctx.fill();
  
  // Head
  ctx.fillStyle = guy.inert ? '#888' : '#ccc';
  ctx.beginPath();
  ctx.arc(x, headY, guy.headR, 0, Math.PI * 2);
  ctx.fill();
  
  // Eyes (fixed forward — he can't see the player)
  if (!guy.inert) {
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(x - 3, headY - 1, 1.5, 0, Math.PI * 2);
    ctx.arc(x + 3, headY - 1, 1.5, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Closed/dormant eyes — just lines
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x - 5, headY);
    ctx.lineTo(x - 2, headY);
    ctx.moveTo(x + 2, headY);
    ctx.lineTo(x + 5, headY);
    ctx.stroke();
  }
}

// --- Loop ---
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
