---
layout: default
---
<article class="post">
  <div class="post-date">{{ page.date | date: "%B %-d, %Y" }}</div>
  <h2>{{ page.title }}</h2>
  <div class="post-content">
    {{ content }}
  </div>
  {% if page.tags.size > 0 %}
    {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
  {% endif %}
</article>
