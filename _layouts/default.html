<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title and page.layout == 'post' %}{{ page.title }} — strattao{% else %}strattao{% endif %}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #c8c0b8;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    min-height: 100vh;
  }

  canvas#starfield {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 80px 24px 40px;
    border-bottom: 1px solid rgba(184, 156, 255, 0.08);
  }

  header h1 {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: 2.8rem;
    color: #e8e0d8;
    letter-spacing: 0.08em;
    text-shadow: 0 0 30px rgba(180, 140, 255, 0.3);
  }

  header h1 a { color: inherit; text-decoration: none; }
  header h1 a:hover { text-shadow: 0 0 40px rgba(180, 140, 255, 0.5); }

  header .subtitle {
    font-size: 0.9rem;
    color: #706860;
    letter-spacing: 0.04em;
    margin-top: 8px;
  }

  .page {
    position: relative;
    z-index: 1;
    display: flex;
    max-width: 1060px;
    margin: 0 auto;
    padding: 48px 24px 80px;
    gap: 48px;
  }

  .main { flex: 1; min-width: 0; }

  /* ── Post styles ── */
  .post {
    margin-bottom: 56px;
    padding-bottom: 56px;
    border-bottom: 1px solid rgba(184, 156, 255, 0.06);
  }
  .post:last-child { border-bottom: none; }

  .post-date {
    font-size: 0.75rem;
    color: #585050;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .post h2, .post-content h2 {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: 1.5rem;
    color: #e0d8f0;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
    text-shadow: 0 0 20px rgba(168, 152, 200, 0.2);
  }

  .post h2 a {
    color: inherit;
    text-decoration: none;
    transition: text-shadow 0.3s;
  }
  .post h2 a:hover {
    text-shadow: 0 0 16px rgba(184, 156, 255, 0.5);
  }

  .post-content h3 {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: 1.1rem;
    color: #c0b8d8;
    margin: 28px 0 12px;
  }

  .post-content p {
    font-size: 0.92rem;
    line-height: 1.75;
    color: #a8a098;
    margin-bottom: 14px;
  }

  .post-content ul, .post-content ol {
    margin: 8px 0 16px 20px;
    font-size: 0.9rem;
    line-height: 1.7;
    color: #a8a098;
  }

  .post-content img {
    width: 100%;
    border-radius: 6px;
    margin: 16px 0;
    border: 1px solid rgba(184, 156, 255, 0.1);
  }

  .post-content a {
    color: #b89cff;
    text-decoration: none;
    transition: color 0.3s, text-shadow 0.3s;
  }
  .post-content a:hover {
    color: #dcc8ff;
    text-shadow: 0 0 12px rgba(184, 156, 255, 0.6), 0 0 30px rgba(184, 156, 255, 0.3);
  }

  .post-content blockquote {
    border-left: 2px solid rgba(184, 156, 255, 0.2);
    padding-left: 16px;
    margin: 16px 0;
    color: #888078;
    font-style: italic;
  }

  .post-content code {
    background: rgba(184, 156, 255, 0.08);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 0.85em;
  }

  .post-content pre {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(184, 156, 255, 0.1);
    border-radius: 6px;
    padding: 16px;
    overflow-x: auto;
    margin: 16px 0;
  }

  .post-content pre code {
    background: none;
    padding: 0;
  }

  .tag {
    display: inline-block;
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #706068;
    border: 1px solid rgba(184, 156, 255, 0.15);
    border-radius: 4px;
    padding: 2px 8px;
    margin-right: 6px;
  }

  /* ── Sidebar ── */
  .sidebar { width: 220px; flex-shrink: 0; }

  .sidebar h2 {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: 0.9rem;
    color: #a898c8;
    letter-spacing: 0.08em;
    margin-bottom: 20px;
    text-shadow: 0 0 16px rgba(168, 152, 200, 0.2);
  }

  .sidebar-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .sidebar-tile {
    aspect-ratio: 1;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid rgba(184, 156, 255, 0.1);
    transition: border-color 0.4s, box-shadow 0.4s, transform 0.3s;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.03);
    text-decoration: none;
  }

  .sidebar-tile:hover {
    border-color: rgba(184, 156, 255, 0.4);
    box-shadow: 0 0 16px rgba(184, 156, 255, 0.12);
    transform: scale(1.03);
  }

  .tile-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    color: #a898c8;
    text-align: center;
    letter-spacing: 0.06em;
    padding: 8px 4px;
    line-height: 1.3;
    position: relative;
    z-index: 1;
  }

  .tile-canvas {
    width: 100%; height: 100%;
    position: absolute;
    top: 0; left: 0;
  }

  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    color: #403838;
    font-size: 0.75rem;
    padding: 40px 0;
    letter-spacing: 0.04em;
    border-top: 1px solid rgba(184, 156, 255, 0.06);
  }

  @media (max-width: 768px) {
    .page { flex-direction: column-reverse; padding: 32px 16px 60px; gap: 40px; }
    .sidebar { width: 100%; }
    .sidebar-grid { grid-template-columns: repeat(3, 1fr); }
    header h1 { font-size: 2rem; }
    header { padding: 48px 16px 32px; }
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<header>
  <h1><a href="/">strattao</a></h1>
  <p class="subtitle">games · experiments · writing</p>
</header>

<div class="page">
  <main class="main">
    {{ content }}
  </main>

  <aside class="sidebar">
    <h2>Projects</h2>
    <div class="sidebar-grid">
      <a href="https://e-man-games.itch.io/little-guy" target="_blank" rel="noopener" class="sidebar-tile" title="Little Guy">
        <canvas class="tile-canvas" data-tile="littleguy"></canvas>

        <div class="tile-label">EB Backgrounds</div>
      </a>
      <a href="/lab/easing/" class="sidebar-tile" title="Easing Functions">
        <canvas class="tile-canvas" data-tile="easing"></canvas>
        <div class="tile-label">Easing</div>
      </a>
      <a href="/lab/debanding/" class="sidebar-tile" title="IGN Debanding">
        <canvas class="tile-canvas" data-tile="debanding"></canvas>
        <div class="tile-label">Debanding</div>

      <a href="/lab/dof/" class="sidebar-tile" title="Depth of Field">

      <a href="/lab/rat-park/" class="sidebar-tile" title="Rat Park">
        <canvas class="tile-canvas" data-tile="ratpark"></canvas>
        <div class="tile-label">Rat Park</div>
      </a>
      <a href="/lab/snake-td/" class="sidebar-tile" title="Snake TD">
        <canvas class="tile-canvas" data-tile="snaketd"></canvas>

      </a>
      <a href="/lab/the-mark/" class="sidebar-tile" title="The Mark">

      </a>
      <a href="/lab/title-of-liberty/" class="sidebar-tile" title="Title of Liberty">
        <canvas class="tile-canvas" data-tile="liberty"></canvas>

      <a href="/lab/liquid/" class="sidebar-tile" title="Liquid Noise — Scrolling Noise Layers">
        <canvas class="tile-canvas" data-tile="liquid"></canvas>
        <div class="tile-label">Liquid Noise</div>
      </a>
      <a href="/lab/terrain/" class="sidebar-tile" title="Alien Terrain — Isometric Perlin Landscapes">
        <canvas class="tile-canvas" data-tile="terrain"></canvas>

      <a href="/lab/matrimony/" class="sidebar-tile" title="Matrimony Beyond Space and Time">
        <canvas class="tile-canvas" data-tile="matrimony"></canvas>

      <a href="/lab/combat/" class="sidebar-tile" title="Wait Combat — Helen's Mysterious Castle Combat Demo">
        <canvas class="tile-canvas" data-tile="combat"></canvas>

      </a>
      <div class="sidebar-tile" title="Iron & Ether — In Development">
        <canvas class="tile-canvas" data-tile="ironether"></canvas>
        <div class="tile-label">Iron & Ether</div>
      </div>
      <a href="/lab/exchequer/" class="sidebar-tile" title="Exchequer — Life RPG">
        <canvas class="tile-canvas" data-tile="exchequer"></canvas>
        <div class="tile-label">Exchequer</div>
      </a>
    </div>
  </aside>
</div>

<footer>built by hand</footer>

<script>
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let w, h, stars;
  const STAR_COUNT = 260;
  const LAYERS = [
    { speed: 0.15, sizeMin: 0.4, sizeMax: 1.0, alpha: 0.35 },
    { speed: 0.35, sizeMin: 0.6, sizeMax: 1.4, alpha: 0.55 },
    { speed: 0.7,  sizeMin: 1.0, sizeMax: 2.0, alpha: 0.8 },
  ];
  function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  function createStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
      const layer = LAYERS[Math.floor(Math.random() * LAYERS.length)];
      stars.push({
        x: Math.random() * w, y: Math.random() * h,
        size: layer.sizeMin + Math.random() * (layer.sizeMax - layer.sizeMin),
        speed: layer.speed + (Math.random() - 0.5) * 0.05,
        alpha: layer.alpha * (0.6 + Math.random() * 0.4),
        twinkleSpeed: 0.005 + Math.random() * 0.02,
        twinkleOffset: Math.random() * Math.PI * 2,
        hue: 240 + Math.random() * 40, sat: Math.random() * 30,
      });
    }
  }
  let time = 0;
  function draw() {
    ctx.clearRect(0, 0, w, h); time++;
    for (const s of stars) {
      s.y -= s.speed;
      if (s.y < -4) { s.y = h + 4; s.x = Math.random() * w; }
      const twinkle = 0.5 + 0.5 * Math.sin(time * s.twinkleSpeed + s.twinkleOffset);
      const a = s.alpha * (0.4 + 0.6 * twinkle);
      ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${s.hue}, ${s.sat}%, 88%, ${a})`; ctx.fill();
      if (s.size > 1.2) {
        ctx.beginPath(); ctx.arc(s.x, s.y, s.size * 3, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${s.hue}, ${s.sat}%, 80%, ${a * 0.1})`; ctx.fill();
      }
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', () => { resize(); createStars(); });
  resize(); createStars(); draw();
})();

(function() {
  const tiles = document.querySelectorAll('.tile-canvas');
  let time = 0;
  tiles.forEach(c => { c.width = 200; c.height = 200; });
  function drawTiles() {
    time += 0.02;
    tiles.forEach(c => {
      const ctx = c.getContext('2d');
      const w = c.width, h = c.height, type = c.dataset.tile;
      ctx.clearRect(0, 0, w, h);
      if (type === 'littleguy') {
        ctx.fillStyle = 'rgba(10,10,20,0.9)'; ctx.fillRect(0, 0, w, h);
        const gx = w/2 + Math.sin(time * 0.7) * 30, gy = h/2 + Math.cos(time * 0.5) * 20;
        ctx.beginPath(); ctx.arc(gx, gy, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#e0d8f0'; ctx.fill();
        ctx.beginPath(); ctx.arc(gx, gy, 16, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(184,156,255,0.12)'; ctx.fill();
      } else if (type === 'earthbound') {
        const imgData = ctx.createImageData(w, h);
        for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
          const v = Math.sin(x*0.05+time)+Math.sin(y*0.04-time*0.7)+Math.sin((x+y)*0.03+time*0.5);
          const t = (v+3)/6; const i = (y*w+x)*4;
          imgData.data[i]=40+t*100; imgData.data[i+1]=20+t*40; imgData.data[i+2]=80+t*140; imgData.data[i+3]=255;
        }
        ctx.putImageData(imgData, 0, 0);
      } else if (type === 'sandbox') {
        ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, 0, w, h);
        for (let i = 0; i < 3; i++) {
          const cx = w/2+Math.sin(time+i*2.1)*40, cy = h/2+Math.cos(time*0.8+i*1.7)*40;
          const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60);
          grad.addColorStop(0, `hsla(${(time*30+i*120)%360}, 60%, 50%, 0.3)`);
          grad.addColorStop(1, 'transparent');
          ctx.fillStyle = grad; ctx.fillRect(0, 0, w, h);
        }
      } else if (type === 'easing') {
        // Mini easing curve
        ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = 'rgba(184,156,255,0.15)'; ctx.lineWidth = 1;
        ctx.setLineDash([2,2]);
        ctx.beginPath(); ctx.moveTo(20,h-20); ctx.lineTo(w-20,20); ctx.stroke();
        ctx.setLineDash([]);
        ctx.strokeStyle = '#b89cff'; ctx.lineWidth = 2; ctx.beginPath();
        for (let i = 0; i <= 160; i++) {
          const t = i/160;
          const v = 1-Math.pow(1-t,3); // SmoothStop3
          const px = 20+t*(w-40), py = (h-20)-v*(h-40);
          i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
        }
        ctx.stroke();
        const bt = ((time*0.4)%1.5)/1.2;
        if (bt>=0&&bt<=1) {
          const bv = 1-Math.pow(1-bt,3);
          ctx.beginPath(); ctx.arc(20+bt*(w-40),(h-20)-bv*(h-40),4,0,Math.PI*2);
          ctx.fillStyle='#dcc8ff'; ctx.fill();
        }
      } else if (type === 'debanding') {
        // Gradient with banding vs smooth
        const imgData = ctx.createImageData(w, h);
        for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
          const dx=x-w/2,dy=y-h/2;
          const d = Math.sqrt(dx*dx+dy*dy)/(w*0.6);
          const v = Math.max(0,1-d);
          const bits = 4, levels = (1<<bits)-1;
          const useIGN = x >= w/2;
          let q;
          if (useIGN) {
            const n = (52.9829189*((x*0.06711056+y*0.00583715)%1))%1;
            q = Math.round((v+(n-0.5)/levels)*levels)/levels;
          } else { q = Math.round(v*levels)/levels; }
          q = Math.min(1,Math.max(0,q));
          const i=(y*w+x)*4;
          imgData.data[i]=q*80; imgData.data[i+1]=q*40; imgData.data[i+2]=q*160; imgData.data[i+3]=255;
        }
        ctx.putImageData(imgData,0,0);
        ctx.strokeStyle='rgba(184,156,255,0.2)'; ctx.lineWidth=1;
        ctx.setLineDash([3,3]); ctx.beginPath(); ctx.moveTo(w/2,0); ctx.lineTo(w/2,h); ctx.stroke(); ctx.setLineDash([]);
      } else if (type === 'dof') {
        // Blurry corridor vibe
        ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0,0,w,h);
        // Draw some "objects" at different depths with blur simulation
        const depths = [{x:40,y:100,s:30,blur:true},{x:100,y:80,s:20,blur:false},{x:160,y:110,s:25,blur:true}];
        for (const d of depths) {
          const a = d.blur ? 0.15 : 0.6;
          const spread = d.blur ? 3 : 0;
          for (let r = d.s+spread*4; r >= d.s; r -= 2) {
            ctx.beginPath(); ctx.arc(d.x,d.y,r,0,Math.PI*2);
            ctx.fillStyle = `rgba(${d.blur?60:140},${d.blur?50:100},${d.blur?40:80},${a*0.1})`;
            ctx.fill();
          }
          ctx.beginPath(); ctx.arc(d.x,d.y,d.s*0.5,0,Math.PI*2);
          ctx.fillStyle = `rgba(180,140,100,${a})`;
          ctx.fill();
        }
        // Fog overlay
        const fogA = 0.15+0.05*Math.sin(time*0.5);
        ctx.fillStyle = `rgba(60,55,50,${fogA})`;
        ctx.fillRect(0,0,w,h);
        // Vignette
        const vg = ctx.createRadialGradient(w/2,h/2,20,w/2,h/2,w*0.7);
        vg.addColorStop(0,'transparent');
        vg.addColorStop(1,'rgba(0,0,0,0.6)');
        ctx.fillStyle = vg; ctx.fillRect(0,0,w,h);
      } else if (type === 'ratpark') {
        // Rat silhouette + green glow
        ctx.fillStyle = '#0e0e14'; ctx.fillRect(0, 0, w, h);
        const glow = 0.3 + Math.sin(time * 2) * 0.15;
        const grd = ctx.createRadialGradient(w*0.8, h*0.6, 2, w*0.8, h*0.6, 24);
        grd.addColorStop(0, `rgba(100,255,120,${glow})`);
        grd.addColorStop(1, 'rgba(100,255,120,0)');
        ctx.fillStyle = grd; ctx.fillRect(0, 0, w, h);
        // Floor
        ctx.fillStyle = '#1a1a22'; ctx.fillRect(0, h*0.72, w, h*0.28);
        // Rat body
        const rx = w*0.35, ry = h*0.65;
        ctx.fillStyle = '#b0a090';
        ctx.fillRect(rx, ry, 10, 6);
        ctx.fillRect(rx+8, ry-3, 5, 5); // head
        ctx.fillRect(rx+10, ry-5, 2, 2); // ear
        ctx.fillStyle = '#111'; ctx.fillRect(rx+11, ry-2, 1, 1); // eye
        ctx.fillStyle = '#d8a8a0';
        ctx.fillRect(rx-3, ry+2, 3, 1); // tail
        ctx.fillRect(rx-5, ry+1, 2, 1);
        // Cage bars
        ctx.strokeStyle = 'rgba(100,100,120,0.2)'; ctx.lineWidth = 2;
        for (let bx = 8; bx < w; bx += 14) {
          ctx.beginPath(); ctx.moveTo(bx, 0); ctx.lineTo(bx, h*0.75); ctx.stroke();
        }
      } else if (type === 'snaketd') {
        ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, 0, w, h);
        // Core glow
        const glow = 0.2 + Math.sin(time * 2) * 0.1;
        const grd = ctx.createRadialGradient(w/2, h/2, 4, w/2, h/2, 40);
        grd.addColorStop(0, `rgba(180,140,255,${glow})`);
        grd.addColorStop(1, 'rgba(180,140,255,0)');
        ctx.fillStyle = grd; ctx.fillRect(0, 0, w, h);
        // Core
        ctx.fillStyle = '#d8a0ff'; ctx.fillRect(w/2-4, h/2-4, 8, 8);
        // Snake coiling around core
        const segs = 12;
        for (let i = 0; i < segs; i++) {
          const a = time * 0.8 + i * 0.5;
          const r = 18 + i * 1.5;
          const sx = w/2 + Math.cos(a) * r, sy = h/2 + Math.sin(a) * r;
          const bright = i === 0 ? 1 : 0.6;
          ctx.fillStyle = `rgba(64,216,112,${bright})`;
          ctx.fillRect(sx-3, sy-3, 6, 6);
        }
        // Enemy dots approaching
        for (let i = 0; i < 3; i++) {
          const ea = time * 0.3 + i * 2.1;
          const er = 60 + Math.sin(time + i) * 10;
          ctx.fillStyle = '#e04040';
          ctx.fillRect(w/2+Math.cos(ea)*er-2, h/2+Math.sin(ea)*er-2, 4, 4);
        }
      } else if (type === 'themark') {
        ctx.fillStyle = '#1a1610'; ctx.fillRect(0, 0, w, h);
        // Warm central glow (the mark)
        const glow = 0.15 + Math.sin(time * 1.2) * 0.08;
        const grd = ctx.createRadialGradient(w/2, h/2, 2, w/2, h/2, 50);
        grd.addColorStop(0, `rgba(200,160,80,${glow})`);
        grd.addColorStop(1, 'rgba(200,160,80,0)');
        ctx.fillStyle = grd; ctx.fillRect(0, 0, w, h);
        // Target rings
        for (let r = 3; r >= 1; r--) {
          ctx.beginPath(); ctx.arc(w/2, h/2, r * 18, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(200,160,80,${0.08 * r})`; ctx.lineWidth = 1; ctx.stroke();
        }
        // Center dot
        ctx.beginPath(); ctx.arc(w/2, h/2, 3, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(200,160,80,${0.4 + Math.sin(time * 2) * 0.2})`; ctx.fill();
        // Drifting point (the player's mark, orbiting)
        const pa = time * 0.4;
        const pr = 20 + Math.sin(time * 0.7) * 12;
        ctx.beginPath(); ctx.arc(w/2 + Math.cos(pa) * pr, h/2 + Math.sin(pa) * pr, 2, 0, Math.PI * 2);
        ctx.fillStyle = '#c8c0b0'; ctx.fill();
      } else if (type === 'liberty') {
        ctx.fillStyle = '#1a1a10'; ctx.fillRect(0, 0, w, h);
        // Marching soldiers — small formation moving across
        const cx = w/2, cy = h/2;
        const facing = time * 0.4;
        // Commander (gold)
        ctx.fillStyle = '#c8a040';
        ctx.fillRect(cx-2, cy-2, 4, 4);
        // Soldiers around commander
        ctx.fillStyle = 'rgba(160,140,80,0.7)';
        for (let i = 0; i < 12; i++) {
          const a = (i/12)*Math.PI*2 + time*0.3;
          const r = 14 + Math.sin(i*2.3+time)*3;
          ctx.fillRect(cx+Math.cos(a)*r-1, cy+Math.sin(a)*r-1, 2, 2);
        }
        // Banner pole
        const bp = 0.3+Math.sin(time*4)*0.1;
        ctx.fillStyle = `rgba(200,160,64,${bp+0.3})`;
        ctx.fillRect(cx-1, cy-14, 1, 10);
        ctx.fillStyle = `rgba(180,140,50,${bp+0.2})`;
        ctx.fillRect(cx, cy-14, 5, 3);
        // Rally pulse
        ctx.strokeStyle = `rgba(200,160,64,${0.15+Math.sin(time*2)*0.1})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.arc(cx, cy, 22+Math.sin(time*1.5)*4, 0, Math.PI*2); ctx.stroke();
      } else if (type === 'terrain') {
        // Mini isometric terrain
        ctx.fillStyle = '#050508'; ctx.fillRect(0, 0, w, h);
        const cols = 12, cellSz = w / cols * 0.7;
        const cx = w/2, cy = h/2 + 10;
        for (let gy = 0; gy < cols; gy++) {
          for (let gx = 0; gx < cols; gx++) {
            const nx = gx - cols/2, ny = gy - cols/2;
            const iso_x = (nx - ny) * cellSz * 0.5;
            const hgt = (Math.sin(gx*0.8+time*0.5) * Math.cos(gy*0.6+time*0.3) + 1) * 0.4;
            const iso_y = (nx + ny) * cellSz * 0.25 - hgt * 30;
            const r = 30 + hgt * 180, g = 60 + hgt * 100, b = 80 + hgt * 80;
            ctx.fillStyle = `rgb(${r|0},${g|0},${b|0})`;
            ctx.fillRect(cx + iso_x - 3, cy + iso_y - 2, 6, 4);
            ctx.fillStyle = `rgb(${r*0.5|0},${g*0.5|0},${b*0.5|0})`;
            ctx.fillRect(cx + iso_x - 3, cy + iso_y + 2, 6, hgt * 12 + 2);
          }
        }
      } else if (type === 'liquid') {
        // Mini lava — scrolling noise layers
        const imgData = ctx.createImageData(w, h);
        for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
          // Three pseudo-noise layers scrolling different directions
          const v1 = Math.sin((x*0.03 - time*0.5) + (y*0.02 - time*0.3)) * 0.5 + 0.5;
          const v2 = Math.sin((x*0.05 + time*0.4) + (y*0.04 - time*0.2)) * 0.5 + 0.5;
          const v3 = Math.sin((x*0.07 + time*0.3) + (y*0.06 + time*0.5)) * 0.5 + 0.5;
          const v = v1 * 0.5 + v2 * 0.3 + v3 * 0.2;
          const i = (y*w+x)*4;
          imgData.data[i]   = 80 + v * 175;
          imgData.data[i+1] = 20 + v * 80;
          imgData.data[i+2] = 5 + v * 30;
          imgData.data[i+3] = 255;
        }
        ctx.putImageData(imgData, 0, 0);
      } else if (type === 'matrimony') {
        // Top-down RPG dungeon scene
        ctx.fillStyle = '#2a2820'; ctx.fillRect(0, 0, w, h);
        // Floor tiles
        for (let tx = 0; tx < w; tx += 12) {
          for (let ty = 0; ty < h; ty += 12) {
            ctx.fillStyle = (tx+ty)%24===0 ? '#302e25' : '#2a2820';
            ctx.fillRect(tx, ty, 12, 12);
          }
        }
        // Walls top
        ctx.fillStyle = '#4a4540'; ctx.fillRect(0, 0, w, 14);
        ctx.fillStyle = '#3a3530'; ctx.fillRect(0, 14, w, 3);
        // Player character (blue robe, moving)
        const ppx = w/2 + Math.sin(time*0.8)*10;
        const ppy = h/2 + Math.cos(time*0.6)*6;
        ctx.fillStyle = '#6a8aca'; ctx.fillRect(ppx-4, ppy-3, 8, 10);
        ctx.fillStyle = '#c8b8a0'; ctx.fillRect(ppx-3, ppy-6, 6, 5);
        // Enemy (green blob, pulsing)
        const epx = w*0.75, epy = h*0.35;
        const pulse = 1 + 0.1*Math.sin(time*3);
        ctx.fillStyle = '#5a8a5a';
        ctx.beginPath(); ctx.ellipse(epx, epy, 6*pulse, 5*pulse, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#1a1520';
        ctx.fillRect(epx-3, epy-2, 2, 2); ctx.fillRect(epx+1, epy-2, 2, 2);
        // Glowing wisp accent
        const wx = w*0.25 + Math.sin(time*1.5)*8, wy = h*0.6 + Math.cos(time*2)*5;
        ctx.fillStyle = `rgba(180,156,255,${0.3+0.2*Math.sin(time*2.5)})`;
        ctx.beginPath(); ctx.arc(wx, wy, 4, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = `rgba(180,156,255,${0.15+0.1*Math.sin(time*2.5)})`;
        ctx.beginPath(); ctx.arc(wx, wy, 8, 0, Math.PI*2); ctx.fill();
      } else if (type === 'combat') {
        // Two figures facing off with wait bars
        ctx.fillStyle = '#0a0a10'; ctx.fillRect(0, 0, w, h);
        // Player (green)
        const px = 30, py = 55, ps = 4;
        ctx.fillStyle = '#4a8a4a';
        ctx.fillRect(px-ps, py-ps*4, ps*2, ps*4);
        ctx.fillStyle = '#f0c8a0'; ctx.fillRect(px-ps, py-ps*5, ps*2, ps);
        // Sword
        ctx.fillStyle = '#c0c0c0'; ctx.fillRect(px+ps+1, py-ps*3, 2, ps*2);
        // Enemy (red)
        const ex = w-30, ey = 55;
        ctx.fillStyle = '#8a3030';
        ctx.fillRect(ex-ps, ey-ps*4, ps*2, ps*4);
        ctx.fillStyle = '#8a3030'; ctx.fillRect(ex-ps, ey-ps*5, ps*2, ps);
        ctx.fillStyle = '#ff6600'; ctx.fillRect(ex-ps+1, ey-ps*5+1, 1, 1); ctx.fillRect(ex+ps-2, ey-ps*5+1, 1, 1);
        // Wait bars
        const bw = 24, bh = 3, by = 70;
        ctx.fillStyle = '#1a1520';
        ctx.fillRect(px-bw/2, by, bw, bh); ctx.fillRect(ex-bw/2, by, bw, bh);
        const pWait = (Math.sin(time*1.5)+1)/2;
        const eWait = (Math.cos(time*1.2)+1)/2;
        ctx.fillStyle = '#4a6a8a'; ctx.fillRect(px-bw/2, by, bw*pWait, bh);
        ctx.fillStyle = '#8a6a4a'; ctx.fillRect(ex-bw/2, by, bw*eWait, bh);
        // Clash spark
        if (Math.sin(time*3) > 0.8) {
          ctx.fillStyle = '#fff'; ctx.fillRect(w/2-1, 50, 2, 2);
          ctx.fillStyle = 'rgba(255,200,100,0.5)'; ctx.fillRect(w/2-3, 48, 6, 6);
        }
      } else if (type === 'ironether') {
        ctx.fillStyle = '#0a0810'; ctx.fillRect(0, 0, w, h);
        ctx.strokeStyle = `rgba(255,140,60,${0.3+0.15*Math.sin(time*1.5)})`;
        ctx.lineWidth = 1.5; ctx.beginPath();
        const cx = w/2, cy = h/2, r = 40;
        for (let i = 0; i < 6; i++) {
          const a = (Math.PI*2/6)*i - Math.PI/2 + time*0.2;
          i===0 ? ctx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r) : ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
        }
        ctx.closePath(); ctx.stroke();
        ctx.beginPath(); ctx.arc(cx, cy, 8, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,140,60,${0.2+0.1*Math.sin(time*2)})`; ctx.fill();
      } else if (type === 'exchequer') {
        // D20 die on parchment
        ctx.fillStyle = '#1a1610'; ctx.fillRect(0, 0, w, h);
        const ecx = w/2, ecy = h/2, er = 32;
        const rot = time * 0.3;
        // Icosahedron-ish shape (d20 as triangular outline)
        ctx.strokeStyle = `rgba(212,175,55,${0.5+0.2*Math.sin(time*1.2)})`;
        ctx.lineWidth = 1.5;
        for (let tri = 0; tri < 3; tri++) {
          ctx.beginPath();
          const off = (Math.PI*2/3)*tri + rot;
          for (let v = 0; v < 3; v++) {
            const a = off + (Math.PI*2/3)*v;
            const px = ecx + Math.cos(a)*er, py = ecy + Math.sin(a)*er;
            v===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
          }
          ctx.closePath(); ctx.stroke();
        }
        // "20" in center
        ctx.fillStyle = `rgba(212,175,55,${0.6+0.2*Math.sin(time*1.8)})`;
        ctx.font = 'bold 14px serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('20', ecx, ecy+1);
        // Ember particles
        for (let p = 0; p < 5; p++) {
          const pa = time*0.8 + p*1.3;
          const px = ecx + Math.sin(pa*1.1+p)*25;
          const py = ecy - 20 - (time*15+p*12)%45;
          const po = Math.max(0, 1 - ((time*15+p*12)%45)/45);
          ctx.fillStyle = `rgba(255,${140+p*20},40,${po*0.4})`;
          ctx.fillRect(px, py, 2, 2);
        }
      }
    });
    requestAnimationFrame(drawTiles);
  }
  drawTiles();
})();
</script>
