<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake TD</title>
<style>
  * { margin:0; padding:0; }
  body { background:#111; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
  canvas { image-rendering:pixelated; border:2px solid #333; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Grid
const COLS = 30, ROWS = 20, CELL = 16;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

// Colors
const COL_BG = '#0a0a14';
const COL_GRID = '#141420';
const COL_SNAKE_HEAD = '#40d870';
const COL_SNAKE_BODY = '#30a858';
const COL_SNAKE_COIL = '#28884a';
const COL_CORE = '#d8a0ff';
const COL_CORE_GLOW = 'rgba(180,140,255,0.15)';
const COL_FOOD = '#f0c040';
const COL_ENEMY = '#e04040';
const COL_ENEMY_FAST = '#ff6020';
const COL_ENEMY_TANK = '#a03030';
const COL_HIT = '#ff0000';
const COL_WALL = '#2a2a3a';

// Game state
let snake, dir, nextDir, core, food, enemies, wave, waveTimer, waveEnemiesLeft;
let score, gameOver, paused, moveTimer, moveInterval;
let coreHP, maxCoreHP, particles, screenFlash;
let gameStarted = false;
let titlePulse = 0;

// Waves config: [count, speed, hp]
const WAVES = [
  { count:5, speed:0.5, hp:1, types:['normal'] },
  { count:8, speed:0.55, hp:1, types:['normal'] },
  { count:6, speed:0.6, hp:1, types:['normal','fast'] },
  { count:10, speed:0.5, hp:1, types:['normal','fast'] },
  { count:8, speed:0.55, hp:2, types:['normal','tank'] },
  { count:12, speed:0.5, hp:1, types:['normal','fast','fast'] },
  { count:10, speed:0.6, hp:2, types:['normal','tank','fast'] },
  { count:15, speed:0.5, hp:2, types:['normal','fast','tank'] },
  { count:12, speed:0.65, hp:2, types:['fast','tank'] },
  { count:20, speed:0.55, hp:3, types:['normal','fast','tank'] },
];

function init() {
  // Core in center
  core = { x: Math.floor(COLS/2), y: Math.floor(ROWS/2) };
  maxCoreHP = 10;
  coreHP = maxCoreHP;
  
  // Snake starts near core
  snake = [
    { x: core.x - 3, y: core.y },
    { x: core.x - 4, y: core.y },
    { x: core.x - 5, y: core.y },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  
  food = null;
  spawnFood();
  enemies = [];
  wave = 0;
  waveTimer = 3; // seconds before first wave
  waveEnemiesLeft = 0;
  score = 0;
  gameOver = false;
  paused = false;
  moveTimer = 0;
  moveInterval = 0.1; // seconds between snake moves
  particles = [];
  screenFlash = 0;
}

function spawnFood() {
  let attempts = 0;
  while(attempts < 200) {
    const x = Math.floor(Math.random() * COLS);
    const y = Math.floor(Math.random() * ROWS);
    if(x === core.x && y === core.y) { attempts++; continue; }
    if(snake.some(s => s.x === x && s.y === y)) { attempts++; continue; }
    food = { x, y, pulse: 0 };
    return;
  }
}

function spawnEnemy() {
  const waveData = WAVES[Math.min(wave, WAVES.length-1)];
  const type = waveData.types[Math.floor(Math.random() * waveData.types.length)];
  
  // Spawn from edges
  let x, y;
  const side = Math.floor(Math.random() * 4);
  if(side === 0) { x = 0; y = Math.floor(Math.random() * ROWS); }
  else if(side === 1) { x = COLS-1; y = Math.floor(Math.random() * ROWS); }
  else if(side === 2) { x = Math.floor(Math.random() * COLS); y = 0; }
  else { x = Math.floor(Math.random() * COLS); y = ROWS-1; }
  
  let speed, hp, color, size;
  if(type === 'fast') {
    speed = waveData.speed * 1.8;
    hp = 1;
    color = COL_ENEMY_FAST;
    size = 0.6;
  } else if(type === 'tank') {
    speed = waveData.speed * 0.6;
    hp = waveData.hp + 2;
    color = COL_ENEMY_TANK;
    size = 1.0;
  } else {
    speed = waveData.speed;
    hp = waveData.hp;
    color = COL_ENEMY;
    size = 0.8;
  }
  
  enemies.push({ 
    x: x + 0.5, y: y + 0.5, // float position for smooth movement
    hp, maxHp: hp, speed, color, size, type,
    hitFlash: 0
  });
}

function isSnakeCell(gx, gy) {
  return snake.some(s => s.x === gx && s.y === gy);
}

// Check if enemy path to core is blocked by snake forming a loop
function snakeBlocksCell(gx, gy) {
  return isSnakeCell(gx, gy);
}

function spawnParticle(x, y, color, count) {
  for(let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 30 + Math.random() * 60;
    particles.push({
      x: x * CELL + CELL/2, y: y * CELL + CELL/2,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
      life: 0.5 + Math.random() * 0.5,
      maxLife: 0.5 + Math.random() * 0.5,
      color, size: 1 + Math.random() * 2
    });
  }
}

function updateParticles(dt) {
  for(let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life -= dt;
    if(p.life <= 0) particles.splice(i, 1);
  }
}

function update(dt) {
  if(gameOver || paused) return;
  
  titlePulse += dt;
  if(screenFlash > 0) screenFlash = Math.max(0, screenFlash - dt * 3);
  
  // Snake movement
  moveTimer += dt;
  if(moveTimer >= moveInterval) {
    moveTimer -= moveInterval;
    dir = { ...nextDir };
    
    const head = snake[0];
    const nx = ((head.x + dir.x) % COLS + COLS) % COLS;
    const ny = ((head.y + dir.y) % ROWS + ROWS) % ROWS;
    
    // Self collision = game over
    if(snake.some(s => s.x === nx && s.y === ny)) {
      gameOver = true;
      spawnParticle(head.x, head.y, '#ff4444', 20);
      return;
    }
    
    // Core collision = just don't move there
    if(nx === core.x && ny === core.y) {
      // Skip this move
      return;
    }
    
    snake.unshift({ x: nx, y: ny });
    
    // Check food
    if(food && nx === food.x && ny === food.y) {
      score += 10;
      spawnParticle(food.x, food.y, COL_FOOD, 8);
      spawnFood();
      // Don't pop tail = grow
    } else {
      snake.pop();
    }
  }
  
  // Wave spawning
  waveTimer -= dt;
  if(waveTimer <= 0 && waveEnemiesLeft <= 0 && enemies.length === 0) {
    // Next wave
    wave++;
    const waveData = WAVES[Math.min(wave-1, WAVES.length-1)];
    waveEnemiesLeft = waveData.count;
    waveTimer = 0.8; // time between spawns within a wave
  }
  if(waveEnemiesLeft > 0) {
    waveTimer -= dt;
    if(waveTimer <= 0) {
      spawnEnemy();
      waveEnemiesLeft--;
      waveTimer = 0.8;
    }
  }
  
  // Enemy movement
  for(let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if(e.hitFlash > 0) e.hitFlash = Math.max(0, e.hitFlash - dt * 5);
    
    // Move toward core, avoid snake cells
    const dx = core.x + 0.5 - e.x;
    const dy = core.y + 0.5 - e.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    
    if(dist < 0.5) {
      // Reached core — damage it
      coreHP--;
      screenFlash = 1;
      spawnParticle(core.x, core.y, COL_CORE, 6);
      enemies.splice(i, 1);
      if(coreHP <= 0) {
        gameOver = true;
        spawnParticle(core.x, core.y, '#ff00ff', 30);
      }
      continue;
    }
    
    // Normalize and move
    let mx = dx / dist * e.speed * dt * 3;
    let my = dy / dist * e.speed * dt * 3;
    
    // Check if next position hits snake — if so, take damage and bounce
    const nextGx = Math.floor(e.x + mx);
    const nextGy = Math.floor(e.y + my);
    
    if(isSnakeCell(nextGx, nextGy)) {
      // Snake blocks! Enemy takes 1 damage
      e.hp--;
      e.hitFlash = 1;
      spawnParticle(nextGx, nextGy, e.color, 4);
      
      // Bounce away
      mx = -mx * 2;
      my = -my * 2;
      
      if(e.hp <= 0) {
        score += e.type === 'tank' ? 30 : e.type === 'fast' ? 20 : 10;
        spawnParticle(Math.floor(e.x), Math.floor(e.y), e.color, 10);
        enemies.splice(i, 1);
        continue;
      }
    }
    
    e.x += mx;
    e.y += my;
    
    // Clamp to grid
    e.x = Math.max(0, Math.min(COLS, e.x));
    e.y = Math.max(0, Math.min(ROWS, e.y));
  }
  
  updateParticles(dt);
}

function draw() {
  // Background
  ctx.fillStyle = COL_BG;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Grid dots
  ctx.fillStyle = COL_GRID;
  for(let x = 0; x < COLS; x++) {
    for(let y = 0; y < ROWS; y++) {
      ctx.fillRect(x * CELL, y * CELL, 1, 1);
    }
  }
  
  // Core glow
  const glowR = 3 + Math.sin(titlePulse * 2) * 0.5;
  const grad = ctx.createRadialGradient(
    (core.x + 0.5) * CELL, (core.y + 0.5) * CELL, CELL/2,
    (core.x + 0.5) * CELL, (core.y + 0.5) * CELL, glowR * CELL
  );
  grad.addColorStop(0, 'rgba(180,140,255,0.2)');
  grad.addColorStop(1, 'rgba(180,140,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Core
  ctx.fillStyle = COL_CORE;
  const cx = core.x * CELL + 2, cy = core.y * CELL + 2;
  ctx.fillRect(cx, cy, CELL - 4, CELL - 4);
  // Core HP bar
  const hpW = CELL + 8;
  const hpX = core.x * CELL - 4;
  const hpY = core.y * CELL - 6;
  ctx.fillStyle = '#222';
  ctx.fillRect(hpX, hpY, hpW, 3);
  ctx.fillStyle = coreHP > maxCoreHP * 0.3 ? '#b080ff' : '#ff4040';
  ctx.fillRect(hpX, hpY, hpW * (coreHP / maxCoreHP), 3);
  
  // Food
  if(food) {
    food.pulse += 0.05;
    const fp = 1 + Math.sin(food.pulse) * 0.15;
    const fs = CELL * 0.3 * fp;
    ctx.fillStyle = COL_FOOD;
    ctx.fillRect(food.x * CELL + CELL/2 - fs, food.y * CELL + CELL/2 - fs, fs*2, fs*2);
    // Glow
    ctx.fillStyle = 'rgba(240,192,64,0.15)';
    ctx.fillRect(food.x * CELL - 2, food.y * CELL - 2, CELL + 4, CELL + 4);
  }
  
  // Snake
  for(let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    const isHead = i === 0;
    const t = i / snake.length;
    
    if(isHead) {
      ctx.fillStyle = COL_SNAKE_HEAD;
      ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
      // Eyes
      ctx.fillStyle = '#111';
      const ex = dir.x === 1 ? 10 : dir.x === -1 ? 2 : 4;
      const ey = dir.y === 1 ? 10 : dir.y === -1 ? 2 : 4;
      ctx.fillRect(s.x * CELL + ex, s.y * CELL + ey, 2, 2);
      ctx.fillRect(s.x * CELL + ex + (dir.y !== 0 ? 6 : 0), s.y * CELL + ey + (dir.x !== 0 ? 6 : 0), 2, 2);
    } else {
      const c = t < 0.5 ? COL_SNAKE_BODY : COL_SNAKE_COIL;
      ctx.fillStyle = c;
      ctx.fillRect(s.x * CELL + 2, s.y * CELL + 2, CELL - 4, CELL - 4);
    }
  }
  
  // Enemies
  for(const e of enemies) {
    const ex = (e.x - 0.5) * CELL;
    const ey = (e.y - 0.5) * CELL;
    const s = CELL * e.size;
    const off = (CELL - s) / 2;
    
    ctx.fillStyle = e.hitFlash > 0 ? COL_HIT : e.color;
    ctx.fillRect(ex + off, ey + off, s, s);
    
    // HP bar for tanks
    if(e.maxHp > 1) {
      const hpW = s;
      ctx.fillStyle = '#222';
      ctx.fillRect(ex + off, ey + off - 4, hpW, 2);
      ctx.fillStyle = '#ff6060';
      ctx.fillRect(ex + off, ey + off - 4, hpW * (e.hp / e.maxHp), 2);
    }
  }
  
  // Particles
  for(const p of particles) {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
  
  // Screen flash
  if(screenFlash > 0) {
    ctx.fillStyle = `rgba(255,0,0,${screenFlash * 0.3})`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }
  
  // HUD
  ctx.font = '12px monospace';
  ctx.fillStyle = '#888';
  ctx.fillText('Score: ' + score, 8, 16);
  ctx.fillText('Wave: ' + wave, 8, 30);
  ctx.fillText('Length: ' + snake.length, 8, 44);
  
  // Wave announcement
  if(waveEnemiesLeft > 0 || (enemies.length === 0 && wave > 0 && waveTimer > 0)) {
    ctx.font = '14px monospace';
    ctx.fillStyle = '#e0c0ff';
    ctx.textAlign = 'center';
    if(enemies.length === 0 && waveEnemiesLeft <= 0 && waveTimer > 0) {
      ctx.fillText('Wave ' + (wave+1) + ' incoming...', canvas.width/2, canvas.height/2 - 40);
    }
    ctx.textAlign = 'left';
  }
  
  // Title screen
  if(!gameStarted) {
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.textAlign = 'center';
    ctx.font = '24px monospace';
    ctx.fillStyle = COL_SNAKE_HEAD;
    ctx.fillText('SNAKE TD', canvas.width/2, canvas.height/2 - 40);
    
    ctx.font = '11px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Your snake is the wall.', canvas.width/2, canvas.height/2 - 10);
    ctx.fillText('Coil around the core to protect it.', canvas.width/2, canvas.height/2 + 6);
    ctx.fillText('Eat food to grow longer.', canvas.width/2, canvas.height/2 + 22);
    ctx.fillText('Enemies die when they hit your body.', canvas.width/2, canvas.height/2 + 38);
    
    const pa = 0.5 + Math.sin(titlePulse * 3) * 0.3;
    ctx.fillStyle = `rgba(200,200,200,${pa})`;
    ctx.fillText('[ARROW KEYS / WASD to start]', canvas.width/2, canvas.height/2 + 70);
    ctx.textAlign = 'left';
  }
  
  // Game over
  if(gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.textAlign = 'center';
    ctx.font = '20px monospace';
    ctx.fillStyle = '#e04040';
    
    // Check why
    const msg = coreHP <= 0 ? 'CORE DESTROYED' : 'SNAKE DOWN';
    ctx.fillText(msg, canvas.width/2, canvas.height/2 - 20);
    
    ctx.font = '12px monospace';
    ctx.fillStyle = '#aaa';
    ctx.fillText('Score: ' + score + '  Wave: ' + wave + '  Length: ' + snake.length, canvas.width/2, canvas.height/2 + 10);
    
    const pa = 0.5 + Math.sin(titlePulse * 3) * 0.3;
    ctx.fillStyle = `rgba(200,200,200,${pa})`;
    ctx.fillText('[R to restart]', canvas.width/2, canvas.height/2 + 40);
    ctx.textAlign = 'left';
  }
}

// Input
const keys = {};
document.addEventListener('keydown', e => {
  if(!gameStarted && (e.code.startsWith('Arrow') || e.code.startsWith('Key'))) {
    gameStarted = true;
  }
  
  if(gameOver && e.code === 'KeyR') {
    init();
    gameOver = false;
    gameStarted = true;
    return;
  }
  
  // Direction
  if((e.code === 'ArrowUp' || e.code === 'KeyW') && dir.y !== 1) nextDir = {x:0, y:-1};
  if((e.code === 'ArrowDown' || e.code === 'KeyS') && dir.y !== -1) nextDir = {x:0, y:1};
  if((e.code === 'ArrowLeft' || e.code === 'KeyA') && dir.x !== 1) nextDir = {x:-1, y:0};
  if((e.code === 'ArrowRight' || e.code === 'KeyD') && dir.x !== -1) nextDir = {x:1, y:0};
});

// Game loop
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  if(gameStarted) update(dt);
  else titlePulse += dt;
  draw();
  requestAnimationFrame(loop);
}

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
