<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rotoscope → Spritesheet — strattao</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&family=JetBrains+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #c8c0b8;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Top bar ── */
  .topbar {
    height: 48px;
    background: rgba(10, 10, 18, 0.95);
    border-bottom: 1px solid rgba(184, 156, 255, 0.1);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 20;
  }

  .topbar h1 {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: 0.9rem;
    color: #e0d8f0;
    letter-spacing: 0.05em;
    text-shadow: 0 0 12px rgba(184, 156, 255, 0.2);
  }

  .topbar .sep { color: #302828; margin: 0 4px; }

  .topbar a { color: #b89cff; text-decoration: none; font-size: 0.72rem; }

  .topbar .spacer { flex: 1; }

  .tb-btn {
    padding: 5px 12px;
    background: rgba(184, 156, 255, 0.06);
    border: 1px solid rgba(184, 156, 255, 0.15);
    border-radius: 4px;
    color: #b89cff;
    font-family: 'Inter', sans-serif;
    font-size: 0.72rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .tb-btn:hover {
    background: rgba(184, 156, 255, 0.15);
    border-color: rgba(184, 156, 255, 0.3);
  }

  .tb-btn.primary {
    background: rgba(184, 156, 255, 0.12);
    border-color: rgba(184, 156, 255, 0.3);
  }

  /* ── Main layout ── */
  .main-area {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Tools sidebar ── */
  .tools-panel {
    width: 220px;
    background: rgba(10, 10, 18, 0.9);
    border-right: 1px solid rgba(184, 156, 255, 0.08);
    padding: 14px;
    flex-shrink: 0;
    overflow-y: auto;
  }

  .tool-section {
    margin-bottom: 16px;
  }

  .tool-section h3 {
    font-size: 0.65rem;
    color: #504848;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .tool-row {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .tool-btn {
    padding: 6px 10px;
    background: rgba(184, 156, 255, 0.04);
    border: 1px solid rgba(184, 156, 255, 0.1);
    border-radius: 4px;
    color: #908880;
    font-size: 0.68rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .tool-btn:hover { background: rgba(184, 156, 255, 0.1); color: #dcc8ff; }
  .tool-btn.active {
    background: rgba(184, 156, 255, 0.15);
    border-color: rgba(184, 156, 255, 0.4);
    color: #dcc8ff;
  }

  label {
    display: block;
    font-size: 0.65rem;
    color: #605858;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 3px;
    margin-top: 6px;
  }

  label:first-child { margin-top: 0; }

  .val {
    float: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    color: #b89cff;
  }

  input[type="range"] {
    width: 100%;
    height: 3px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(184, 156, 255, 0.12);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #b89cff;
    cursor: pointer;
  }

  input[type="color"] {
    width: 100%;
    height: 28px;
    border: 1px solid rgba(184, 156, 255, 0.15);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
  }

  select {
    width: 100%;
    padding: 4px 6px;
    background: rgba(184, 156, 255, 0.06);
    border: 1px solid rgba(184, 156, 255, 0.15);
    border-radius: 4px;
    color: #c8c0b8;
    font-size: 0.72rem;
    outline: none;
  }

  .check-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
  }

  .check-row input { accent-color: #b89cff; }
  .check-row label { margin: 0; }

  /* ── Canvas area ── */
  .canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #060609;
    position: relative;
    overflow: hidden;
  }

  #draw-canvas {
    cursor: crosshair;
    image-rendering: pixelated;
  }

  .frame-info {
    position: absolute;
    top: 10px; left: 10px;
    font-size: 0.68rem;
    color: rgba(184, 156, 255, 0.4);
    font-family: 'JetBrains Mono', monospace;
    pointer-events: none;
  }

  .drop-overlay {
    position: absolute;
    inset: 0;
    background: rgba(184, 156, 255, 0.08);
    border: 2px dashed rgba(184, 156, 255, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    color: #b89cff;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 5;
  }

  .drop-overlay.visible { opacity: 1; }

  /* ── Timeline ── */
  .timeline {
    height: 120px;
    background: rgba(10, 10, 18, 0.95);
    border-top: 1px solid rgba(184, 156, 255, 0.1);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    z-index: 10;
  }

  .tl-controls {
    display: flex;
    align-items: center;
    padding: 6px 12px;
    gap: 8px;
    border-bottom: 1px solid rgba(184, 156, 255, 0.06);
  }

  .tl-btn {
    padding: 3px 10px;
    background: rgba(184, 156, 255, 0.04);
    border: 1px solid rgba(184, 156, 255, 0.1);
    border-radius: 3px;
    color: #908880;
    font-size: 0.7rem;
    cursor: pointer;
  }

  .tl-btn:hover { color: #dcc8ff; background: rgba(184, 156, 255, 0.1); }

  .tl-info {
    font-size: 0.68rem;
    color: #585050;
    font-family: 'JetBrains Mono', monospace;
  }

  .tl-strip {
    flex: 1;
    display: flex;
    gap: 2px;
    padding: 6px 12px;
    overflow-x: auto;
    align-items: center;
  }

  .tl-frame {
    width: 64px;
    height: 64px;
    flex-shrink: 0;
    border: 2px solid transparent;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    background: rgba(0,0,0,0.3);
    transition: border-color 0.15s;
  }

  .tl-frame:hover { border-color: rgba(184, 156, 255, 0.3); }
  .tl-frame.active { border-color: #b89cff; box-shadow: 0 0 8px rgba(184, 156, 255, 0.3); }
  .tl-frame.has-drawing::after {
    content: '✏';
    position: absolute;
    top: 2px; right: 3px;
    font-size: 0.5rem;
    color: #b89cff;
  }

  .tl-frame canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  .tl-frame .fn {
    position: absolute;
    bottom: 1px; left: 3px;
    font-size: 0.5rem;
    color: rgba(184, 156, 255, 0.5);
    font-family: 'JetBrains Mono', monospace;
  }

  /* Hidden inputs */
  .hidden { display: none; }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <a href="/">← strattao</a>
  <span class="sep">·</span>
  <h1>Rotoscope</h1>
  <span class="spacer"></span>
  <button class="tb-btn" id="btn-load-video">📹 Load Video</button>
  <button class="tb-btn" id="btn-load-gif">🖼 Load GIF/Images</button>
  <button class="tb-btn" id="btn-undo">↩ Undo</button>
  <button class="tb-btn" id="btn-redo">↪ Redo</button>
  <button class="tb-btn primary" id="btn-export">⬇ Export Spritesheet</button>
</div>

<!-- Main -->
<div class="main-area">

  <!-- Tools -->
  <div class="tools-panel">
    <div class="tool-section">
      <h3>Draw Tool</h3>
      <div class="tool-row">
        <button class="tool-btn active" data-tool="brush" id="t-brush">🖌 Brush</button>
        <button class="tool-btn" data-tool="eraser" id="t-eraser">⌫ Eraser</button>
        <button class="tool-btn" data-tool="fill" id="t-fill">🪣 Fill</button>
        <button class="tool-btn" data-tool="line" id="t-line">╱ Line</button>
      </div>
    </div>

    <div class="tool-section">
      <h3>Brush</h3>
      <label>Size <span class="val" id="v-size">3</span></label>
      <input type="range" id="brush-size" min="1" max="32" value="3">

      <label>Opacity <span class="val" id="v-opacity">1.0</span></label>
      <input type="range" id="brush-opacity" min="0.1" max="1" step="0.05" value="1">

      <label>Color</label>
      <input type="color" id="brush-color" value="#e0d0f0">

      <div class="tool-row" style="margin-top:6px;">
        <button class="tool-btn" style="background:#e0d0f0;width:20px;height:20px;padding:0;" data-color="#e0d0f0"></button>
        <button class="tool-btn" style="background:#000000;width:20px;height:20px;padding:0;" data-color="#000000"></button>
        <button class="tool-btn" style="background:#ff4444;width:20px;height:20px;padding:0;" data-color="#ff4444"></button>
        <button class="tool-btn" style="background:#44aaff;width:20px;height:20px;padding:0;" data-color="#44aaff"></button>
        <button class="tool-btn" style="background:#44ff66;width:20px;height:20px;padding:0;" data-color="#44ff66"></button>
        <button class="tool-btn" style="background:#ffcc44;width:20px;height:20px;padding:0;" data-color="#ffcc44"></button>
      </div>
    </div>

    <div class="tool-section">
      <h3>Reference</h3>
      <label>Opacity <span class="val" id="v-ref-opacity">0.4</span></label>
      <input type="range" id="ref-opacity" min="0" max="1" step="0.05" value="0.4">

      <div class="check-row">
        <input type="checkbox" id="onion-skin" checked>
        <label for="onion-skin">Onion skin</label>
      </div>

      <label>Onion opacity <span class="val" id="v-onion-opacity">0.2</span></label>
      <input type="range" id="onion-opacity" min="0" max="0.5" step="0.05" value="0.2">

      <div class="check-row">
        <input type="checkbox" id="edge-detect">
        <label for="edge-detect">Edge detect assist</label>
      </div>
    </div>

    <div class="tool-section">
      <h3>Export</h3>
      <label>Sprite Size</label>
      <select id="sprite-size">
        <option value="32">32 × 32</option>
        <option value="48">48 × 48</option>
        <option value="64" selected>64 × 64</option>
        <option value="96">96 × 96</option>
        <option value="128">128 × 128</option>
        <option value="256">256 × 256</option>
        <option value="source">Source size</option>
      </select>

      <label>Background</label>
      <select id="export-bg">
        <option value="transparent">Transparent</option>
        <option value="black">Black</option>
        <option value="magenta">Magenta (key)</option>
      </select>

      <div class="check-row">
        <input type="checkbox" id="export-drawing-only" checked>
        <label for="export-drawing-only">Drawing only (no ref)</label>
      </div>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap" id="canvas-wrap">
    <canvas id="draw-canvas" width="640" height="480"></canvas>
    <div class="frame-info" id="frame-info">Drop video, GIF, or images to start</div>
    <div class="drop-overlay" id="drop-overlay">Drop file here</div>
  </div>

</div>

<!-- Timeline -->
<div class="timeline">
  <div class="tl-controls">
    <button class="tl-btn" id="tl-prev">◀</button>
    <button class="tl-btn" id="tl-play">▶ Play</button>
    <button class="tl-btn" id="tl-next">▶</button>
    <span class="tl-info" id="tl-info">0 / 0</span>
    <span class="spacer" style="flex:1"></span>
    <button class="tl-btn" id="tl-add-frame">+ Frame</button>
    <button class="tl-btn" id="tl-dup-frame">⎘ Duplicate</button>
    <button class="tl-btn" id="tl-del-frame">✕ Delete</button>
    <span class="tl-info">FPS:</span>
    <input type="range" id="fps" min="1" max="30" value="12" style="width:80px;">
    <span class="tl-info" id="v-fps">12</span>
  </div>
  <div class="tl-strip" id="tl-strip"></div>
</div>

<input type="file" class="hidden" id="file-video" accept="video/*">
<input type="file" class="hidden" id="file-images" accept="image/*" multiple>
<video class="hidden" id="src-video" muted></video>

<script>
(function() {

const el = id => document.getElementById(id);
const canvas = el('draw-canvas');
const ctx = canvas.getContext('2d');

// ── State ──
let frames = [];       // { ref: ImageData|null, drawing: ImageData, thumbCanvas }
let currentFrame = 0;
let tool = 'brush';
let drawing = false;
let lastX, lastY;
let lineStart = null;
let canvasW = 640, canvasH = 480;
let playing = false;
let playInterval = null;

// Undo
const undoStack = [];
const redoStack = [];
const MAX_UNDO = 30;

function saveUndo() {
  if (!frames.length) return;
  undoStack.push({ frame: currentFrame, data: cloneImageData(frames[currentFrame].drawing) });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
  redoStack.length = 0;
}

function cloneImageData(src) {
  return new ImageData(new Uint8ClampedArray(src.data), src.width, src.height);
}

// ── Init blank state ──
function initBlank(w, h) {
  canvasW = w; canvasH = h;
  canvas.width = w; canvas.height = h;
  fitCanvas();
}

function fitCanvas() {
  const wrap = el('canvas-wrap');
  const maxW = wrap.clientWidth - 40;
  const maxH = wrap.clientHeight - 40;
  const scale = Math.min(maxW / canvasW, maxH / canvasH, 4);
  canvas.style.width = (canvasW * scale) + 'px';
  canvas.style.height = (canvasH * scale) + 'px';
}

window.addEventListener('resize', fitCanvas);

// ── Frame management ──
function addFrame(refImage) {
  const drawData = ctx.createImageData(canvasW, canvasH);
  const thumbCvs = document.createElement('canvas');
  thumbCvs.width = 64; thumbCvs.height = 64;

  const frame = { ref: refImage || null, drawing: drawData, thumbCanvas: thumbCvs };
  frames.push(frame);
  rebuildTimeline();
  return frames.length - 1;
}

function goToFrame(idx) {
  if (idx < 0 || idx >= frames.length) return;
  // Save current drawing
  if (frames[currentFrame]) {
    frames[currentFrame].drawing = ctx.getImageData(0, 0, canvasW, canvasH);
    // Only save the drawing layer — we need to separate ref from drawing
  }
  currentFrame = idx;
  renderFrame();
  updateTimeline();
}

function renderFrame() {
  if (!frames.length) return;
  const f = frames[currentFrame];

  ctx.clearRect(0, 0, canvasW, canvasH);

  // Onion skin (previous frame drawing)
  if (el('onion-skin').checked && currentFrame > 0) {
    const prev = frames[currentFrame - 1];
    ctx.globalAlpha = parseFloat(el('onion-opacity').value);
    const tempCvs = document.createElement('canvas');
    tempCvs.width = canvasW; tempCvs.height = canvasH;
    tempCvs.getContext('2d').putImageData(prev.drawing, 0, 0);
    ctx.drawImage(tempCvs, 0, 0);
    ctx.globalAlpha = 1;
  }

  // Reference image
  if (f.ref) {
    const refOpacity = parseFloat(el('ref-opacity').value);
    ctx.globalAlpha = refOpacity;

    if (el('edge-detect').checked) {
      // Draw edge-detected version
      drawEdgeDetect(f.ref);
    } else {
      const tempCvs = document.createElement('canvas');
      tempCvs.width = canvasW; tempCvs.height = canvasH;
      tempCvs.getContext('2d').putImageData(f.ref, 0, 0);
      ctx.drawImage(tempCvs, 0, 0);
    }
    ctx.globalAlpha = 1;
  }

  // Drawing layer on top
  const tempDraw = document.createElement('canvas');
  tempDraw.width = canvasW; tempDraw.height = canvasH;
  tempDraw.getContext('2d').putImageData(f.drawing, 0, 0);
  ctx.drawImage(tempDraw, 0, 0);

  updateFrameInfo();
  updateThumb(currentFrame);
}

function updateFrameInfo() {
  el('frame-info').textContent = frames.length
    ? `Frame ${currentFrame + 1} / ${frames.length}  ·  ${canvasW}×${canvasH}`
    : 'Drop video, GIF, or images to start';
  el('tl-info').textContent = `${currentFrame + 1} / ${frames.length}`;
}

// ── Edge detection (Sobel) ──
function drawEdgeDetect(imgData) {
  const w = imgData.width, h = imgData.height;
  const src = imgData.data;
  const out = ctx.createImageData(w, h);
  const d = out.data;

  function gray(x, y) {
    if (x < 0 || x >= w || y < 0 || y >= h) return 0;
    const i = (y * w + x) * 4;
    return src[i] * 0.299 + src[i+1] * 0.587 + src[i+2] * 0.114;
  }

  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const gx = -gray(x-1,y-1) - 2*gray(x-1,y) - gray(x-1,y+1)
                 +gray(x+1,y-1) + 2*gray(x+1,y) + gray(x+1,y+1);
      const gy = -gray(x-1,y-1) - 2*gray(x,y-1) - gray(x+1,y-1)
                 +gray(x-1,y+1) + 2*gray(x,y+1) + gray(x+1,y+1);
      const mag = Math.min(255, Math.sqrt(gx*gx + gy*gy));
      const i = (y * w + x) * 4;
      d[i] = d[i+1] = d[i+2] = mag;
      d[i+3] = mag > 20 ? 255 : 0;
    }
  }

  const tmpCvs = document.createElement('canvas');
  tmpCvs.width = w; tmpCvs.height = h;
  tmpCvs.getContext('2d').putImageData(out, 0, 0);
  ctx.drawImage(tmpCvs, 0, 0);
}

// ── Save drawing layer (extract from composite) ──
function saveCurrentDrawing() {
  if (!frames.length) return;
  // We store drawing as we go, so just grab current canvas state
  // But we need ONLY the drawing, not the ref/onion underneath
  // Solution: we always composite on render, but store drawing separately
  // The drawing ops write to a separate buffer
}

// ── Drawing ──
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvasW / rect.width;
  const scaleY = canvasH / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

// We draw onto the frame's drawing ImageData via a temp canvas
let drawCtx; // offscreen context for drawing ops
let drawCvs;

function ensureDrawCanvas() {
  if (!drawCvs || drawCvs.width !== canvasW || drawCvs.height !== canvasH) {
    drawCvs = document.createElement('canvas');
    drawCvs.width = canvasW;
    drawCvs.height = canvasH;
    drawCtx = drawCvs.getContext('2d');
  }
}

function loadDrawingToOffscreen() {
  ensureDrawCanvas();
  drawCtx.clearRect(0, 0, canvasW, canvasH);
  if (frames[currentFrame]) {
    drawCtx.putImageData(frames[currentFrame].drawing, 0, 0);
  }
}

function saveOffscreenToDrawing() {
  if (frames[currentFrame]) {
    frames[currentFrame].drawing = drawCtx.getImageData(0, 0, canvasW, canvasH);
  }
}

function brushStroke(x1, y1, x2, y2) {
  const size = parseInt(el('brush-size').value);
  const opacity = parseFloat(el('brush-opacity').value);
  const color = el('brush-color').value;
  const isEraser = tool === 'eraser';

  ensureDrawCanvas();
  drawCtx.globalAlpha = opacity;
  drawCtx.lineCap = 'round';
  drawCtx.lineJoin = 'round';
  drawCtx.lineWidth = size;

  if (isEraser) {
    drawCtx.globalCompositeOperation = 'destination-out';
    drawCtx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    drawCtx.globalCompositeOperation = 'source-over';
    drawCtx.strokeStyle = color;
  }

  drawCtx.beginPath();
  drawCtx.moveTo(x1, y1);
  drawCtx.lineTo(x2, y2);
  drawCtx.stroke();

  drawCtx.globalAlpha = 1;
  drawCtx.globalCompositeOperation = 'source-over';

  saveOffscreenToDrawing();
  renderFrame();
}

function floodFill(startX, startY) {
  ensureDrawCanvas();
  loadDrawingToOffscreen();

  const imgData = drawCtx.getImageData(0, 0, canvasW, canvasH);
  const data = imgData.data;
  const w = canvasW, h = canvasH;

  const sx = Math.floor(startX), sy = Math.floor(startY);
  if (sx < 0 || sx >= w || sy < 0 || sy >= h) return;

  const color = el('brush-color').value;
  const r = parseInt(color.slice(1,3), 16);
  const g = parseInt(color.slice(3,5), 16);
  const b = parseInt(color.slice(5,7), 16);
  const a = Math.round(parseFloat(el('brush-opacity').value) * 255);

  const startIdx = (sy * w + sx) * 4;
  const sr = data[startIdx], sg = data[startIdx+1], sb = data[startIdx+2], sa = data[startIdx+3];

  if (sr === r && sg === g && sb === b && sa === a) return;

  const tolerance = 30;
  function matches(i) {
    return Math.abs(data[i] - sr) + Math.abs(data[i+1] - sg) + Math.abs(data[i+2] - sb) + Math.abs(data[i+3] - sa) <= tolerance;
  }

  const stack = [[sx, sy]];
  const visited = new Uint8Array(w * h);

  while (stack.length > 0) {
    const [cx, cy] = stack.pop();
    const idx = cy * w + cx;
    if (visited[idx]) continue;
    visited[idx] = 1;
    const pi = idx * 4;
    if (!matches(pi)) continue;
    data[pi] = r; data[pi+1] = g; data[pi+2] = b; data[pi+3] = a;
    if (cx > 0) stack.push([cx-1, cy]);
    if (cx < w-1) stack.push([cx+1, cy]);
    if (cy > 0) stack.push([cx, cy-1]);
    if (cy < h-1) stack.push([cx, cy+1]);
  }

  drawCtx.putImageData(imgData, 0, 0);
  saveOffscreenToDrawing();
  renderFrame();
}

canvas.addEventListener('pointerdown', e => {
  if (!frames.length) return;
  const pos = getCanvasPos(e);

  if (tool === 'fill') {
    saveUndo();
    loadDrawingToOffscreen();
    floodFill(pos.x, pos.y);
    return;
  }

  if (tool === 'line') {
    saveUndo();
    lineStart = pos;
    return;
  }

  drawing = true;
  lastX = pos.x;
  lastY = pos.y;
  saveUndo();
  loadDrawingToOffscreen();

  // Draw a dot at the start point
  brushStroke(pos.x, pos.y, pos.x, pos.y);
});

canvas.addEventListener('pointermove', e => {
  if (!drawing) return;
  const pos = getCanvasPos(e);
  brushStroke(lastX, lastY, pos.x, pos.y);
  lastX = pos.x;
  lastY = pos.y;
});

canvas.addEventListener('pointerup', e => {
  if (tool === 'line' && lineStart) {
    const pos = getCanvasPos(e);
    loadDrawingToOffscreen();
    brushStroke(lineStart.x, lineStart.y, pos.x, pos.y);
    lineStart = null;
    return;
  }
  drawing = false;
});

canvas.addEventListener('pointerleave', () => { drawing = false; });

    btn.classList.add('active');

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

  if (e.code === 'KeyB') { tool = 'brush'; updateToolUI(); }
  if (e.code === 'KeyE') { tool = 'eraser'; updateToolUI(); }
  if (e.code === 'KeyG') { tool = 'fill'; updateToolUI(); }
  if (e.code === 'KeyL') { tool = 'line'; updateToolUI(); }
  if (e.code === 'BracketLeft') {
    el('brush-size').value = Math.max(1, parseInt(el('brush-size').value) - 1);
    updateLabels();
  }
  if (e.code === 'BracketRight') {
    el('brush-size').value = Math.min(32, parseInt(el('brush-size').value) + 1);
    updateLabels();
  }
  if ((e.ctrlKey || e.metaKey) && e.code === 'KeyZ') {
    e.preventDefault();
    if (e.shiftKey) redo(); else undo();
  }
  if (e.code === 'ArrowLeft' || e.code === 'Comma') { goToFrame(currentFrame - 1); }
  if (e.code === 'ArrowRight' || e.code === 'Period') { goToFrame(currentFrame + 1); }
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
});

function updateToolUI() {
  document.querySelectorAll('.tool-btn[data-tool]').forEach(b => {
    b.classList.toggle('active', b.dataset.tool === tool);
  });
}

// ── Undo / Redo ──
function undo() {
  if (!undoStack.length) return;
  const entry = undoStack.pop();
  redoStack.push({ frame: entry.frame, data: cloneImageData(frames[entry.frame].drawing) });
  frames[entry.frame].drawing = entry.data;
  if (entry.frame === currentFrame) renderFrame();
  updateThumb(entry.frame);
}

function redo() {
  if (!redoStack.length) return;
  const entry = redoStack.pop();
  undoStack.push({ frame: entry.frame, data: cloneImageData(frames[entry.frame].drawing) });
  frames[entry.frame].drawing = entry.data;
  if (entry.frame === currentFrame) renderFrame();
  updateThumb(entry.frame);
}

el('btn-undo').addEventListener('click', undo);
el('btn-redo').addEventListener('click', redo);

// ── Timeline ──
function rebuildTimeline() {
  const strip = el('tl-strip');
  strip.innerHTML = '';
  frames.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'tl-frame' + (i === currentFrame ? ' active' : '');
    div.appendChild(f.thumbCanvas);
    const fn = document.createElement('div');
    fn.className = 'fn';
    fn.textContent = i + 1;
    div.appendChild(fn);
    div.addEventListener('click', () => goToFrame(i));
    strip.appendChild(div);
  });
  updateTimeline();
}

function updateTimeline() {
  const strip = el('tl-strip');
  strip.querySelectorAll('.tl-frame').forEach((div, i) => {
    div.classList.toggle('active', i === currentFrame);
    // Check if frame has any drawing
    const hasDrawing = frames[i] && frames[i].drawing.data.some((v, idx) => idx % 4 === 3 && v > 0);
    div.classList.toggle('has-drawing', hasDrawing);
  });
  el('tl-info').textContent = `${currentFrame + 1} / ${frames.length}`;

  // Scroll active into view
  const activeEl = strip.querySelector('.tl-frame.active');
  if (activeEl) activeEl.scrollIntoView({ block: 'nearest', inline: 'center' });
}

function updateThumb(idx) {
  if (!frames[idx]) return;
  const f = frames[idx];
  const tCtx = f.thumbCanvas.getContext('2d');
  tCtx.clearRect(0, 0, 64, 64);

  // Draw ref
  if (f.ref) {
    const tmp = document.createElement('canvas');
    tmp.width = canvasW; tmp.height = canvasH;
    tmp.getContext('2d').putImageData(f.ref, 0, 0);
    tCtx.globalAlpha = 0.4;
    tCtx.drawImage(tmp, 0, 0, 64, 64);
    tCtx.globalAlpha = 1;
  }

  // Draw drawing
  const tmp2 = document.createElement('canvas');
  tmp2.width = canvasW; tmp2.height = canvasH;
  tmp2.getContext('2d').putImageData(f.drawing, 0, 0);
  tCtx.drawImage(tmp2, 0, 0, 64, 64);
}

el('tl-prev').addEventListener('click', () => goToFrame(currentFrame - 1));
el('tl-next').addEventListener('click', () => goToFrame(currentFrame + 1));
el('tl-add-frame').addEventListener('click', () => {
  addFrame(null);
  goToFrame(frames.length - 1);
});
el('tl-dup-frame').addEventListener('click', () => {
  if (!frames.length) return;
  const src = frames[currentFrame];
  const newDraw = cloneImageData(src.drawing);
  const thumbCvs = document.createElement('canvas');
  thumbCvs.width = 64; thumbCvs.height = 64;
  frames.splice(currentFrame + 1, 0, {
    ref: src.ref ? cloneImageData(src.ref) : null,
    drawing: newDraw,
    thumbCanvas: thumbCvs
  });
  rebuildTimeline();
  goToFrame(currentFrame + 1);
});
el('tl-del-frame').addEventListener('click', () => {
  if (frames.length <= 1) return;
  frames.splice(currentFrame, 1);
  if (currentFrame >= frames.length) currentFrame = frames.length - 1;
  rebuildTimeline();
  renderFrame();
});

// ── Playback ──
function togglePlay() {
  playing = !playing;
  el('tl-play').textContent = playing ? '⏸ Pause' : '▶ Play';
  if (playing) {
    playInterval = setInterval(() => {
      let next = currentFrame + 1;
      if (next >= frames.length) next = 0;
      goToFrame(next);
    }, 1000 / parseInt(el('fps').value));
  } else {
    clearInterval(playInterval);
  }
}

el('tl-play').addEventListener('click', togglePlay);
el('fps').addEventListener('input', () => {
  el('v-fps').textContent = el('fps').value;
  if (playing) {
    clearInterval(playInterval);
    playInterval = setInterval(() => {
      let next = currentFrame + 1;
      if (next >= frames.length) next = 0;
      goToFrame(next);
    }, 1000 / parseInt(el('fps').value));
  }
});

// ── Video import ──
el('btn-load-video').addEventListener('click', () => el('file-video').click());
el('file-video').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  loadVideo(file);
});

function loadVideo(file) {
  const video = el('src-video');
  video.src = URL.createObjectURL(file);
  video.addEventListener('loadeddata', function onLoaded() {
    video.removeEventListener('loadeddata', onLoaded);
    const vw = video.videoWidth, vh = video.videoHeight;

    // Scale down if huge
    let w = vw, h = vh;
    if (w > 640) { h = Math.round(h * 640 / w); w = 640; }
    if (h > 480) { w = Math.round(w * 480 / h); h = 480; }

    initBlank(w, h);
    frames = [];

    const fps = parseInt(el('fps').value);
    const duration = video.duration;
    const totalFrames = Math.min(Math.floor(duration * fps), 200); // cap at 200

    let extracted = 0;
    const tmpCvs = document.createElement('canvas');
    tmpCvs.width = w; tmpCvs.height = h;
    const tmpCtx = tmpCvs.getContext('2d');

    el('frame-info').textContent = `Extracting frames... 0/${totalFrames}`;

    function extractNext() {
      if (extracted >= totalFrames) {
        rebuildTimeline();
        goToFrame(0);
        return;
      }

      video.currentTime = extracted / fps;
      video.addEventListener('seeked', function onSeeked() {
        video.removeEventListener('seeked', onSeeked);
        tmpCtx.drawImage(video, 0, 0, w, h);
        const refData = tmpCtx.getImageData(0, 0, w, h);
        addFrame(refData);

        extracted++;
        el('frame-info').textContent = `Extracting frames... ${extracted}/${totalFrames}`;
        // Use setTimeout to not block UI
        setTimeout(extractNext, 0);
      });
    }

    extractNext();
  });
}

// ── GIF frame extraction using canvas + ImageBitmap trick ──
// We use a tiny embedded GIF parser (LZW decoder) to extract all frames
async function loadGif(file) {
  el('frame-info').textContent = 'Parsing GIF...';
  frames = [];

  const buffer = await file.arrayBuffer();
  const gifFrames = parseGIF(new Uint8Array(buffer));

  if (!gifFrames.length) {
    el('frame-info').textContent = 'Failed to parse GIF';
    return;
  }

  const gw = gifFrames[0].width;
  const gh = gifFrames[0].height;
  let w = gw, h = gh;
  if (w > 640) { h = Math.round(h * 640 / w); w = 640; }
  if (h > 480) { w = Math.round(w * 480 / h); h = 480; }
  initBlank(w, h);

  // Composite each frame (GIF frames can be partial patches)
  const compositeCvs = document.createElement('canvas');
  compositeCvs.width = gw; compositeCvs.height = gh;
  const compCtx = compositeCvs.getContext('2d');

  const scaleCvs = document.createElement('canvas');
  scaleCvs.width = w; scaleCvs.height = h;
  const scaleCtx = scaleCvs.getContext('2d');

  for (let i = 0; i < gifFrames.length; i++) {
    const gf = gifFrames[i];

    // Handle disposal
    if (i > 0) {
      const prev = gifFrames[i - 1];
      if (prev.disposalMethod === 2) {
        // Restore to background
        compCtx.clearRect(prev.left, prev.top, prev.frameWidth, prev.frameHeight);
      }
      // disposalMethod 3 (restore to previous) is rare, skip
    }

    // Draw frame patch
    const patchCvs = document.createElement('canvas');
    patchCvs.width = gf.frameWidth; patchCvs.height = gf.frameHeight;
    const patchCtx = patchCvs.getContext('2d');
    const patchData = patchCtx.createImageData(gf.frameWidth, gf.frameHeight);
    patchData.data.set(gf.pixels);
    patchCtx.putImageData(patchData, 0, 0);
    compCtx.drawImage(patchCvs, gf.left, gf.top);

    // Scale to target size
    scaleCtx.clearRect(0, 0, w, h);
    scaleCtx.drawImage(compositeCvs, 0, 0, w, h);
    const refData = scaleCtx.getImageData(0, 0, w, h);

    addFrame(refData);
    el('frame-info').textContent = `Parsing GIF... ${i + 1}/${gifFrames.length}`;
  }

  rebuildTimeline();
  goToFrame(0);
}

// ── Minimal GIF Parser ──
// Parses GIF87a/89a, extracts frames with LZW decompression
function parseGIF(data) {
  let pos = 0;
  const frames = [];

  function readU8() { return data[pos++]; }
  function readU16() { const v = data[pos] | (data[pos+1] << 8); pos += 2; return v; }
  function readBytes(n) { const s = data.slice(pos, pos + n); pos += n; return s; }

  // Header
  const sig = String.fromCharCode(...readBytes(6));
  if (sig !== 'GIF87a' && sig !== 'GIF89a') return [];

  const screenW = readU16();
  const screenH = readU16();
  const packed = readU8();
  const bgIndex = readU8();
  readU8(); // pixel aspect

  const gctFlag = (packed >> 7) & 1;
  const gctSize = 1 << ((packed & 7) + 1);
  let gct = null;

  if (gctFlag) {
    gct = [];
    for (let i = 0; i < gctSize; i++) {
      gct.push([readU8(), readU8(), readU8()]);
    }
  }

  let transparentIndex = -1;
  let disposalMethod = 0;

  while (pos < data.length) {
    const block = readU8();

    if (block === 0x3B) break; // trailer

    if (block === 0x21) {
      // Extension
      const label = readU8();

      if (label === 0xF9) {
        // Graphics Control Extension
        readU8(); // block size (always 4)
        const gcPacked = readU8();
        disposalMethod = (gcPacked >> 2) & 7;
        const transFlag = gcPacked & 1;
        readU16(); // delay
        transparentIndex = transFlag ? readU8() : (readU8(), -1);
        readU8(); // terminator
      } else {
        // Skip other extensions
        while (true) {
          const sz = readU8();
          if (sz === 0) break;
          pos += sz;
        }
      }
      continue;
    }

    if (block === 0x2C) {
      // Image descriptor
      const left = readU16();
      const top = readU16();
      const fw = readU16();
      const fh = readU16();
      const imgPacked = readU8();
      const lctFlag = (imgPacked >> 7) & 1;
      const interlace = (imgPacked >> 6) & 1;
      const lctSize = 1 << ((imgPacked & 7) + 1);

      let lct = null;
      if (lctFlag) {
        lct = [];
        for (let i = 0; i < lctSize; i++) {
          lct.push([readU8(), readU8(), readU8()]);
        }
      }

      const ct = lct || gct;
      const minCodeSize = readU8();

      // Read sub-blocks
      let lzwData = [];
      while (true) {
        const sz = readU8();
        if (sz === 0) break;
        for (let i = 0; i < sz; i++) lzwData.push(data[pos++]);
      }

      // LZW decode
      const pixels = decodeLZW(lzwData, minCodeSize, fw * fh);

      // Convert to RGBA
      const rgba = new Uint8ClampedArray(fw * fh * 4);
      const rows = new Array(fh);

      // Handle interlace
      if (interlace) {
        let row = 0;
        const passes = [[0, 8], [4, 8], [2, 4], [1, 2]];
        let pixIdx = 0;
        for (const [start, step] of passes) {
          for (let y = start; y < fh; y += step) {
            for (let x = 0; x < fw; x++) {
              const ci = pixels[pixIdx++];
              const oi = (y * fw + x) * 4;
              if (ci === transparentIndex) {
                rgba[oi + 3] = 0;
              } else if (ct && ct[ci]) {
                rgba[oi] = ct[ci][0];
                rgba[oi + 1] = ct[ci][1];
                rgba[oi + 2] = ct[ci][2];
                rgba[oi + 3] = 255;
              }
            }
          }
        }
      } else {
        for (let i = 0; i < pixels.length && i < fw * fh; i++) {
          const ci = pixels[i];
          const oi = i * 4;
          if (ci === transparentIndex) {
            rgba[oi + 3] = 0;
          } else if (ct && ct[ci]) {
            rgba[oi] = ct[ci][0];
            rgba[oi + 1] = ct[ci][1];
            rgba[oi + 2] = ct[ci][2];
            rgba[oi + 3] = 255;
          }
        }
      }

      frames.push({
        left, top, frameWidth: fw, frameHeight: fh,
        width: screenW, height: screenH,
        pixels: rgba, disposalMethod
      });

      transparentIndex = -1;
      disposalMethod = 0;
      continue;
    }

    // Unknown block, skip
    break;
  }

  return frames;
}

function decodeLZW(data, minCodeSize, pixelCount) {
  const clearCode = 1 << minCodeSize;
  const eoiCode = clearCode + 1;
  let codeSize = minCodeSize + 1;
  let nextCode = eoiCode + 1;
  let maxCode = 1 << codeSize;

  // Init table
  let table = [];
  for (let i = 0; i < clearCode; i++) table[i] = [i];
  table[clearCode] = [];
  table[eoiCode] = [];

  const output = [];
  let bitBuf = 0, bitCount = 0, dataPos = 0;

  function readCode() {
    while (bitCount < codeSize) {
      if (dataPos >= data.length) return -1;
      bitBuf |= data[dataPos++] << bitCount;
      bitCount += 8;
    }
    const code = bitBuf & ((1 << codeSize) - 1);
    bitBuf >>= codeSize;
    bitCount -= codeSize;
    return code;
  }

  let code = readCode(); // should be clear code
  if (code !== clearCode) return output;

  code = readCode();
  if (code === -1 || code === eoiCode) return output;
  let prev = table[code] ? table[code].slice() : [code];
  for (const p of prev) output.push(p);

  while (output.length < pixelCount) {
    code = readCode();
    if (code === -1 || code === eoiCode) break;

    if (code === clearCode) {
      codeSize = minCodeSize + 1;
      nextCode = eoiCode + 1;
      maxCode = 1 << codeSize;
      table = [];
      for (let i = 0; i < clearCode; i++) table[i] = [i];
      table[clearCode] = [];
      table[eoiCode] = [];

      code = readCode();
      if (code === -1 || code === eoiCode) break;
      prev = table[code] ? table[code].slice() : [code];
      for (const p of prev) output.push(p);
      continue;
    }

    let entry;
    if (table[code]) {
      entry = table[code];
    } else if (code === nextCode) {
      entry = prev.concat(prev[0]);
    } else {
      break; // corrupt
    }

    for (const p of entry) output.push(p);

    if (nextCode < 4096) {
      table[nextCode++] = prev.concat(entry[0]);
      if (nextCode >= maxCode && codeSize < 12) {
        codeSize++;
        maxCode = 1 << codeSize;
      }
    }

    prev = entry.slice();
  }

  return output;
}

function loadImages(files) {
  frames = [];
  let loaded = 0;

  // Sort by name
  files.sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

  files.forEach((file, idx) => {
    const img = new Image();
    img.onload = () => {
      if (idx === 0) {
        let w = img.width, h = img.height;
        if (w > 640) { h = Math.round(h * 640 / w); w = 640; }
        if (h > 480) { w = Math.round(w * 480 / h); h = 480; }
        initBlank(w, h);
      }

      const tmpCvs = document.createElement('canvas');
      tmpCvs.width = canvasW; tmpCvs.height = canvasH;
      const tmpCtx = tmpCvs.getContext('2d');
      tmpCtx.drawImage(img, 0, 0, canvasW, canvasH);
      const refData = tmpCtx.getImageData(0, 0, canvasW, canvasH);

      // Store with index to maintain order
      if (!frames[idx]) {
        const drawData = ctx.createImageData(canvasW, canvasH);
        const thumbCvs = document.createElement('canvas');
        thumbCvs.width = 64; thumbCvs.height = 64;
        frames[idx] = { ref: refData, drawing: drawData, thumbCanvas: thumbCvs };
      } else {
        frames[idx].ref = refData;
      }

      loaded++;
      if (loaded === files.length) {
        // Remove any undefined gaps
        frames = frames.filter(Boolean);
        rebuildTimeline();
        goToFrame(0);
      }
    };
    img.src = URL.createObjectURL(file);
  });
}

// ── Drag & Drop ──
const wrap = el('canvas-wrap');
const overlay = el('drop-overlay');

wrap.addEventListener('dragenter', e => { e.preventDefault(); overlay.classList.add('visible'); });
wrap.addEventListener('dragover', e => { e.preventDefault(); });
wrap.addEventListener('dragleave', e => { if (e.target === wrap || e.target === overlay) overlay.classList.remove('visible'); });
wrap.addEventListener('drop', e => {
  e.preventDefault();
  overlay.classList.remove('visible');
  const files = Array.from(e.dataTransfer.files);
  if (!files.length) return;

  if (files[0].type.startsWith('video/')) {
    loadVideo(files[0]);

    loadImages(files);
  }
});

// ── Export spritesheet ──
el('btn-export').addEventListener('click', exportSheet);

function exportSheet() {
  if (!frames.length) return;

  const sizeVal = el('sprite-size').value;
  const drawOnly = el('export-drawing-only').checked;
  const bg = el('export-bg').value;

  let sw, sh;
  if (sizeVal === 'source') {
    sw = canvasW; sh = canvasH;
  } else {
    sw = sh = parseInt(sizeVal);
  }

  // Layout: auto grid
  const cols = Math.ceil(Math.sqrt(frames.length));
  const rows = Math.ceil(frames.length / cols);

  const outCvs = document.createElement('canvas');
  outCvs.width = cols * sw;
  outCvs.height = rows * sh;
  const outCtx = outCvs.getContext('2d');

  // Background
  if (bg === 'black') {
    outCtx.fillStyle = '#000';
    outCtx.fillRect(0, 0, outCvs.width, outCvs.height);
  } else if (bg === 'magenta') {
    outCtx.fillStyle = '#ff00ff';
    outCtx.fillRect(0, 0, outCvs.width, outCvs.height);
  }

  frames.forEach((f, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const dx = col * sw;
    const dy = row * sh;

    const tmpCvs = document.createElement('canvas');
    tmpCvs.width = canvasW; tmpCvs.height = canvasH;
    const tmpCtx = tmpCvs.getContext('2d');

    if (!drawOnly && f.ref) {
      tmpCtx.putImageData(f.ref, 0, 0);
    }

    const drawTmp = document.createElement('canvas');
    drawTmp.width = canvasW; drawTmp.height = canvasH;
    drawTmp.getContext('2d').putImageData(f.drawing, 0, 0);
    tmpCtx.drawImage(drawTmp, 0, 0);

    outCtx.drawImage(tmpCvs, 0, 0, canvasW, canvasH, dx, dy, sw, sh);
  });

  // Download
  const link = document.createElement('a');
  link.download = `spritesheet_${cols}x${rows}_${sw}px.png`;
  link.href = outCvs.toDataURL('image/png');
  link.click();
}

// ── Labels ──
function updateLabels() {
  el('v-size').textContent = el('brush-size').value;
  el('v-opacity').textContent = parseFloat(el('brush-opacity').value).toFixed(2);
  el('v-ref-opacity').textContent = parseFloat(el('ref-opacity').value).toFixed(2);
  el('v-onion-opacity').textContent = parseFloat(el('onion-opacity').value).toFixed(2);
  el('v-fps').textContent = el('fps').value;
}

document.querySelectorAll('input[type="range"]').forEach(inp => {
  inp.addEventListener('input', () => {
    updateLabels();
    if (frames.length) renderFrame();
  });
});

document.querySelectorAll('#onion-skin, #edge-detect, #ref-opacity, #onion-opacity').forEach(inp => {
  inp.addEventListener('change', () => { if (frames.length) renderFrame(); });
});

// ── Init with a blank frame ──
initBlank(640, 480);
addFrame(null);
goToFrame(0);
updateLabels();

})();
</script>

</body>
</html>
