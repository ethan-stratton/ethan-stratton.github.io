<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depth of Field — strattao</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&family=JetBrains+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #08080c;
    color: #c8c0b8;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    overflow: hidden;
    height: 100vh;
  }

  #scene {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    display: block;
  }

  .controls {
    position: fixed;
    top: 0; right: 0;
    width: 300px;
    height: 100vh;
    z-index: 10;
    background: rgba(8, 8, 14, 0.88);
    border-left: 1px solid rgba(184, 156, 255, 0.1);
    padding: 24px 20px;
    overflow-y: auto;
    backdrop-filter: blur(12px);
    transition: transform 0.3s;
  }

  .controls.hidden { transform: translateX(100%); }

  .controls h1 {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: 1.1rem;
    color: #e0d8f0;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
    text-shadow: 0 0 16px rgba(184, 156, 255, 0.25);
  }

  .controls .sub {
    font-size: 0.7rem;
    color: #585050;
    margin-bottom: 24px;
  }

  .controls .sub a {
    color: #b89cff;
    text-decoration: none;
  }

  .section {
    margin-bottom: 20px;
    padding: 14px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(184, 156, 255, 0.08);
    border-radius: 6px;
  }

  .section h2 {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: 0.85rem;
    color: #a898c8;
    margin-bottom: 14px;
    letter-spacing: 0.05em;
  }

  label {
    display: block;
    font-size: 0.7rem;
    color: #706860;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 4px;
    margin-top: 10px;
  }

  label:first-child { margin-top: 0; }

  .val {
    float: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    color: #b89cff;
  }

  input[type="range"] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(184, 156, 255, 0.12);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #b89cff;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(184, 156, 255, 0.4);
  }

  select {
    width: 100%;
    padding: 6px 8px;
    background: rgba(184, 156, 255, 0.06);
    border: 1px solid rgba(184, 156, 255, 0.15);
    border-radius: 4px;
    color: #c8c0b8;
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    outline: none;
  }

  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 10px;
  }

  .preset-btn {
    padding: 6px;
    background: rgba(184, 156, 255, 0.04);
    border: 1px solid rgba(184, 156, 255, 0.1);
    border-radius: 4px;
    color: #908880;
    font-size: 0.68rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .preset-btn:hover {
    background: rgba(184, 156, 255, 0.12);
    color: #dcc8ff;
    border-color: rgba(184, 156, 255, 0.3);
  }

  #toggle-panel {
    position: fixed;
    top: 16px; right: 316px;
    z-index: 20;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(8, 8, 14, 0.8);
    border: 1px solid rgba(184, 156, 255, 0.2);
    color: #b89cff;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    transition: right 0.3s;
  }

  .depth-indicator {
    margin-top: 14px;
    height: 8px;
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
    position: relative;
    border: 1px solid rgba(184, 156, 255, 0.06);
  }

  .depth-indicator .focal-mark {
    position: absolute;
    top: -3px;
    width: 3px; height: 14px;
    background: #b89cff;
    border-radius: 2px;
    box-shadow: 0 0 8px rgba(184, 156, 255, 0.5);
    transition: left 0.2s;
  }

  .depth-indicator .range-mark {
    position: absolute;
    top: 0;
    height: 8px;
    background: rgba(184, 156, 255, 0.15);
    border-radius: 4px;
    transition: left 0.2s, width 0.2s;
  }

  .hint {
    font-size: 0.65rem;
    color: #504848;
    font-style: italic;
    margin-top: 8px;
  }

  #error-msg {
    position: fixed;
    bottom: 20px; left: 20px;
    z-index: 100;
    color: #ff6060;
    font-size: 0.75rem;
    background: rgba(0,0,0,0.8);
    padding: 8px 14px;
    border-radius: 4px;
    display: none;
  }
</style>
</head>
<body>

<div id="scene"></div>
<div id="error-msg"></div>

<button id="toggle-panel">⚙</button>

<div class="controls" id="panel">
  <h1>Depth of Field</h1>
  <p class="sub">Silent Hill camera · <a href="/">← strattao</a></p>

  <div class="section">
    <h2>Focus</h2>
    <label>Focal Distance <span class="val" id="v-focal">15</span></label>
    <input type="range" id="focal" min="2" max="50" step="0.5" value="15">

    <label>Aperture (blur strength) <span class="val" id="v-aperture">0.025</span></label>
    <input type="range" id="aperture" min="0" max="0.08" step="0.001" value="0.025">

    <label>Max Blur <span class="val" id="v-maxblur">0.01</span></label>
    <input type="range" id="maxblur" min="0" max="0.05" step="0.001" value="0.01">

    <div class="depth-indicator">
      <div class="range-mark" id="range-mark"></div>
      <div class="focal-mark" id="focal-mark"></div>
    </div>
    <p class="hint">Click anywhere in the scene to focus on that depth</p>
  </div>

  <div class="section">
    <h2>Atmosphere</h2>
    <label>Fog Density <span class="val" id="v-fog">0.04</span></label>
    <input type="range" id="fog" min="0" max="0.12" step="0.005" value="0.04">

    <label>Fog Color <span class="val" id="v-fogcol">silent hill</span></label>
    <select id="fog-color">
      <option value="sh">Silent Hill (grey)</option>
      <option value="warm">Warm (amber)</option>
      <option value="cold">Cold (blue)</option>
      <option value="blood">Blood (dark red)</option>
      <option value="void">Void (black)</option>
    </select>

    <label>Ambient Light <span class="val" id="v-ambient">0.15</span></label>
    <input type="range" id="ambient" min="0" max="0.5" step="0.01" value="0.15">

    <label>Film Grain <span class="val" id="v-grain">0.06</span></label>
    <input type="range" id="grain" min="0" max="0.2" step="0.005" value="0.06">

    <label>Vignette <span class="val" id="v-vignette">0.4</span></label>
    <input type="range" id="vignette" min="0" max="1" step="0.05" value="0.4">
  </div>

  <div class="section">
    <h2>Camera</h2>
    <label>Angle <span class="val" id="v-angle">fixed corridor</span></label>
    <select id="cam-angle">
      <option value="corridor">Fixed Corridor</option>
      <option value="low">Low Angle</option>
      <option value="overhead">Overhead</option>
      <option value="dutch">Dutch Tilt</option>
      <option value="orbit">Slow Orbit</option>
    </select>

    <label>Camera Sway <span class="val" id="v-sway">0.3</span></label>
    <input type="range" id="sway" min="0" max="1" step="0.05" value="0.3">
  </div>

  <div class="section">
    <h2>Presets</h2>
    <div class="preset-grid">
      <button class="preset-btn" data-preset="foggy-street">Foggy Street</button>
      <button class="preset-btn" data-preset="otherworld">Otherworld</button>
      <button class="preset-btn" data-preset="hospital">Hospital</button>
      <button class="preset-btn" data-preset="shallow">Shallow DOF</button>
      <button class="preset-btn" data-preset="deep">Deep Focus</button>
      <button class="preset-btn" data-preset="noir">Noir</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

const el = id => document.getElementById(id);
const errEl = el('error-msg');

function showError(msg) {
  errEl.textContent = msg;
  errEl.style.display = 'block';
  console.error(msg);
}

try {

const W = window.innerWidth;
const H = window.innerHeight;

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
el('scene').appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, W / H, 0.5, 100);
camera.position.set(0, 3, 0);
camera.lookAt(0, 2.5, -20);

// ── Fog ──
const fogColors = {
  sh:   new THREE.Color(0.25, 0.23, 0.22),
  warm: new THREE.Color(0.3, 0.2, 0.1),
  cold: new THREE.Color(0.1, 0.12, 0.2),
  blood: new THREE.Color(0.15, 0.03, 0.02),
  void: new THREE.Color(0, 0, 0),
};
scene.fog = new THREE.FogExp2(fogColors.sh, 0.04);
scene.background = fogColors.sh.clone();

// ── Lights ──
const ambientLight = new THREE.AmbientLight(0x887766, 0.15);
scene.add(ambientLight);

const lights = [];
for (let i = 0; i < 8; i++) {
  const z = -5 - i * 7;
  const light = new THREE.PointLight(0xffaa66, 1.5, 15, 2);
  light.position.set(Math.sin(i * 1.3) * 1.5, 4, z);
  scene.add(light);
  lights.push({ light, baseIntensity: 1.0 + Math.random(), flickerSpeed: 2 + Math.random() * 4 });

  // Bulb
  const bulb = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffcc88 })
  );
  bulb.position.copy(light.position);
  scene.add(bulb);
}

// ── Corridor ──
const wallMat = new THREE.MeshStandardMaterial({ color: 0x3a3530, roughness: 0.85 });
const floorMat = new THREE.MeshStandardMaterial({ color: 0x252220, roughness: 0.9 });
const ceilMat = new THREE.MeshStandardMaterial({ color: 0x2a2825, roughness: 0.95 });
const cLen = 70, cW = 4, cH = 5;

// Floor
const floor = new THREE.Mesh(new THREE.PlaneGeometry(cW, cLen), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.set(0, 0, -cLen / 2);
scene.add(floor);

// Ceiling
const ceil = new THREE.Mesh(new THREE.PlaneGeometry(cW, cLen), ceilMat);
ceil.rotation.x = Math.PI / 2;
ceil.position.set(0, cH, -cLen / 2);
scene.add(ceil);

// Walls
const wallGeo = new THREE.PlaneGeometry(cLen, cH);
const wallL = new THREE.Mesh(wallGeo, wallMat);
wallL.rotation.y = Math.PI / 2;
wallL.position.set(-cW / 2, cH / 2, -cLen / 2);
scene.add(wallL);

const wallR = new THREE.Mesh(wallGeo, wallMat);
wallR.rotation.y = -Math.PI / 2;
wallR.position.set(cW / 2, cH / 2, -cLen / 2);
scene.add(wallR);

// Back wall
const back = new THREE.Mesh(new THREE.PlaneGeometry(cW, cH), wallMat);
back.position.set(0, cH / 2, -cLen);
scene.add(back);

// ── Objects at various depths ──
const mats = [
  new THREE.MeshStandardMaterial({ color: 0x554840, roughness: 0.7 }),
  new THREE.MeshStandardMaterial({ color: 0x664444, roughness: 0.6 }),
  new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.5, metalness: 0.3 }),
  new THREE.MeshStandardMaterial({ color: 0x888880, roughness: 0.4, metalness: 0.5 }),
];

function box(x, y, z, w, h, d, mat) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, z);
  scene.add(m);
}

box(-1.2, 0.4, -6,  0.8, 0.8, 0.8, mats[0]);
box( 1.0, 0.3, -12, 0.6, 0.6, 1.2, mats[1]);
box(-0.8, 0.75,-20, 0.5, 1.5, 0.5, mats[2]);
box( 0.5, 0.5, -28, 1.0, 1.0, 0.6, mats[0]);
box(-1.0, 0.3, -35, 0.7, 0.6, 0.7, mats[1]);
box( 1.2, 1.0, -42, 0.4, 2.0, 0.4, mats[2]);
box( 0.0, 0.25,-50, 1.5, 0.5, 1.5, mats[0]);
// Gurney
box( 1.3, 0.5, -18, 0.7, 0.1, 2.0, mats[1]);
box( 1.3, 0.8, -18, 0.5, 0.05, 1.8, mats[3]);

// Pipes
for (let i = 0; i < 8; i++) {
  const pipe = new THREE.Mesh(
    new THREE.CylinderGeometry(0.06, 0.06, cLen, 6),
    new THREE.MeshStandardMaterial({ color: 0x555550, metalness: 0.6, roughness: 0.3 })
  );
  pipe.rotation.x = Math.PI / 2;
  pipe.position.set(-1.5 + (i % 4) * 1.0, cH - 0.15 - Math.floor(i / 4) * 0.2, -cLen / 2);
  scene.add(pipe);
}

// ── Post Processing ──
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bokehPass = new BokehPass(scene, camera, {
  focus: 15.0,
  aperture: 0.025,
  maxblur: 0.01,
  width: W,
  height: H
});
composer.addPass(bokehPass);

// Film grain + vignette
const grainShader = {
  uniforms: {
    tDiffuse: { value: null },
    time: { value: 0 },
    grain: { value: 0.06 },
    vignette: { value: 0.4 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float time;
    uniform float grain;
    uniform float vignette;
    varying vec2 vUv;
    float rand(vec2 co) { return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453); }
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      color.rgb += (rand(vUv + fract(time)) - 0.5) * grain;
      vec2 vc = vUv - 0.5;
      color.rgb *= 1.0 - dot(vc, vc) * vignette * 2.5;
      gl_FragColor = color;
    }
  `
};
const grainPass = new ShaderPass(grainShader);
composer.addPass(grainPass);

// ── Click to focus ──
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(scene.children, true);
  if (hits.length > 0) {
    el('focal').value = Math.min(50, hits[0].distance);
    updateControls();
  }
});

// ── Presets ──
const presets = {
  'foggy-street': { focal: 15, aperture: 0.025, maxblur: 0.01, fog: 0.06, fogcol: 'sh', ambient: 0.12, grain: 0.08, vignette: 0.5, angle: 'corridor', sway: 0.4 },
  'otherworld':   { focal: 10, aperture: 0.035, maxblur: 0.02, fog: 0.08, fogcol: 'blood', ambient: 0.08, grain: 0.12, vignette: 0.7, angle: 'low', sway: 0.6 },
  'hospital':     { focal: 20, aperture: 0.02,  maxblur: 0.008, fog: 0.03, fogcol: 'cold', ambient: 0.2, grain: 0.04, vignette: 0.3, angle: 'corridor', sway: 0.2 },
  'shallow':      { focal: 8,  aperture: 0.06,  maxblur: 0.04, fog: 0.02, fogcol: 'sh', ambient: 0.2, grain: 0.03, vignette: 0.2, angle: 'corridor', sway: 0.1 },
  'deep':         { focal: 25, aperture: 0.003, maxblur: 0.002, fog: 0.01, fogcol: 'void', ambient: 0.3, grain: 0.02, vignette: 0.15, angle: 'corridor', sway: 0.1 },
  'noir':         { focal: 12, aperture: 0.03,  maxblur: 0.015, fog: 0.05, fogcol: 'void', ambient: 0.06, grain: 0.1, vignette: 0.8, angle: 'dutch', sway: 0.3 },
};

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = presets[btn.dataset.preset];
    if (!p) return;
    el('focal').value = p.focal;
    el('aperture').value = p.aperture;
    el('maxblur').value = p.maxblur;
    el('fog').value = p.fog;
    el('fog-color').value = p.fogcol;
    el('ambient').value = p.ambient;
    el('grain').value = p.grain;
    el('vignette').value = p.vignette;
    el('cam-angle').value = p.angle;
    el('sway').value = p.sway;
    updateControls();
  });
});

// ── Controls ──
function updateControls() {
  const focal = parseFloat(el('focal').value);
  const aperture = parseFloat(el('aperture').value);
  const maxblur = parseFloat(el('maxblur').value);
  const fogDensity = parseFloat(el('fog').value);
  const fogCol = el('fog-color').value;
  const ambient = parseFloat(el('ambient').value);
  const grainAmt = parseFloat(el('grain').value);
  const vignetteAmt = parseFloat(el('vignette').value);

  bokehPass.uniforms['focus'].value = focal;
  bokehPass.uniforms['aperture'].value = aperture;
  bokehPass.uniforms['maxblur'].value = maxblur;

  scene.fog.density = fogDensity;
  const fc = fogColors[fogCol] || fogColors.sh;
  scene.fog.color.copy(fc);
  scene.background.copy(fc);

  ambientLight.intensity = ambient;
  grainPass.uniforms.grain.value = grainAmt;
  grainPass.uniforms.vignette.value = vignetteAmt;

  // Labels
  el('v-focal').textContent = focal.toFixed(1);
  el('v-aperture').textContent = aperture.toFixed(3);
  el('v-maxblur').textContent = maxblur.toFixed(3);
  el('v-fog').textContent = fogDensity.toFixed(3);
  el('v-fogcol').textContent = el('fog-color').options[el('fog-color').selectedIndex].text.toLowerCase();
  el('v-ambient').textContent = ambient.toFixed(2);
  el('v-grain').textContent = grainAmt.toFixed(3);
  el('v-vignette').textContent = vignetteAmt.toFixed(2);
  el('v-angle').textContent = el('cam-angle').options[el('cam-angle').selectedIndex].text.toLowerCase();
  el('v-sway').textContent = parseFloat(el('sway').value).toFixed(2);

  // Depth indicator
  const maxDist = 50;
  const focalPct = (focal / maxDist) * 100;
  el('focal-mark').style.left = focalPct + '%';
  const rPct = 10; // approx visual range
  el('range-mark').style.left = Math.max(0, focalPct - rPct) + '%';
  el('range-mark').style.width = (rPct * 2) + '%';
}

document.querySelectorAll('.controls input, .controls select').forEach(e => {
  e.addEventListener('input', updateControls);
});

// ── Camera angles ──
function getCameraState(angle, t, sway) {
  const s = sway * 0.3;
  const sx = Math.sin(t * 0.15) * s;
  const sy = Math.sin(t * 0.1) * s * 0.3;

  switch (angle) {
    case 'corridor': return { pos: [sx, 3+sy, 0], look: [sx*0.5, 2.5, -20] };
    case 'low':      return { pos: [sx, 1.0+sy*0.5, 0], look: [sx*0.3, 1.5, -20] };
    case 'overhead':  return { pos: [sx, 4.5+sy, -5], look: [0, 0, -25] };
    case 'dutch':    return { pos: [1.5+sx, 2.5+sy, 0], look: [-0.5, 2, -20], roll: 0.12+Math.sin(t*0.08)*0.03 };
    case 'orbit': {
      const a = t * 0.05, r = 3;
      return { pos: [Math.sin(a)*r, 3+sy, Math.cos(a)*r-15], look: [0, 2.5, -20] };
    }
    default: return { pos: [0, 3, 0], look: [0, 2.5, -20] };
  }
}

// ── Toggle panel ──
el('toggle-panel').addEventListener('click', () => {
  const hidden = el('panel').classList.toggle('hidden');
  el('toggle-panel').style.right = hidden ? '16px' : '316px';
});

// ── Resize ──
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
  bokehPass.uniforms['aspect'].value = w / h;
});

// ── Render loop ──
let time = 0;

function animate() {
  requestAnimationFrame(animate);
  time += 0.016;

  // Flicker
  for (const l of lights) {
    l.light.intensity = Math.max(0, l.baseIntensity + Math.sin(time * l.flickerSpeed) * 0.3 + Math.sin(time * l.flickerSpeed * 2.7) * 0.15);
  }

  // Camera
  const cam = getCameraState(el('cam-angle').value, time, parseFloat(el('sway').value));
  camera.position.set(...cam.pos);
  camera.lookAt(new THREE.Vector3(...cam.look));
  if (cam.roll) camera.rotation.z = cam.roll;
  else camera.rotation.z = 0;

  grainPass.uniforms.time.value = time;
  composer.render();
}

updateControls();
animate();

} catch(e) {
  showError('Error: ' + e.message);
  console.error(e);
}

</script>

</body>
</html>
