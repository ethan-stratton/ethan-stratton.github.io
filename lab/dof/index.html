<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Depth of Field — strattao</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&family=JetBrains+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #08080c;
    color: #c8c0b8;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    overflow: hidden;
    height: 100vh;
  }

  #scene {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  /* Crosshair */
  #crosshair {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #crosshair.visible { opacity: 0.4; }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: #b89cff;
  }
  #crosshair::before {
    width: 16px; height: 1px;
    top: 0; left: -8px;
  }
  #crosshair::after {
    width: 1px; height: 16px;
    top: -8px; left: 0;
  }

  .controls {
    position: fixed;
    top: 0; right: 0;
    width: 300px;
    height: 100vh;
    z-index: 10;
    background: rgba(8, 8, 14, 0.88);
    border-left: 1px solid rgba(184, 156, 255, 0.1);
    padding: 24px 20px;
    overflow-y: auto;
    backdrop-filter: blur(12px);
    transition: transform 0.3s;
  }

  .controls.hidden { transform: translateX(100%); }

  .controls h1 {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: 1.1rem;
    color: #e0d8f0;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
    text-shadow: 0 0 16px rgba(184, 156, 255, 0.25);
  }

  .controls .sub {
    font-size: 0.7rem;
    color: #585050;
    margin-bottom: 20px;
  }

  .controls .sub a { color: #b89cff; text-decoration: none; }

  .help-box {
    background: rgba(184, 156, 255, 0.04);
    border: 1px solid rgba(184, 156, 255, 0.1);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 0.68rem;
    color: #706860;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .help-box kbd {
    background: rgba(184, 156, 255, 0.1);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: #b89cff;
    border: 1px solid rgba(184, 156, 255, 0.15);
  }

  .section {
    margin-bottom: 16px;
    padding: 12px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(184, 156, 255, 0.08);
    border-radius: 6px;
  }

  .section h2 {
    font-family: 'Cinzel', serif;
    font-weight: 400;
    font-size: 0.85rem;
    color: #a898c8;
    margin-bottom: 12px;
    letter-spacing: 0.05em;
  }

  label {
    display: block;
    font-size: 0.68rem;
    color: #706860;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 3px;
    margin-top: 8px;
  }

  label:first-child { margin-top: 0; }

  .val {
    float: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: #b89cff;
  }

  input[type="range"] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(184, 156, 255, 0.12);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #b89cff;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(184, 156, 255, 0.4);
  }

  select {
    width: 100%;
    padding: 5px 8px;
    background: rgba(184, 156, 255, 0.06);
    border: 1px solid rgba(184, 156, 255, 0.15);
    border-radius: 4px;
    color: #c8c0b8;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    outline: none;
  }

  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 8px;
  }

  .preset-btn {
    padding: 6px;
    background: rgba(184, 156, 255, 0.04);
    border: 1px solid rgba(184, 156, 255, 0.1);
    border-radius: 4px;
    color: #908880;
    font-size: 0.66rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .preset-btn:hover {
    background: rgba(184, 156, 255, 0.12);
    color: #dcc8ff;
    border-color: rgba(184, 156, 255, 0.3);
  }

  #toggle-panel {
    position: fixed;
    top: 16px; right: 316px;
    z-index: 20;
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(8, 8, 14, 0.8);
    border: 1px solid rgba(184, 156, 255, 0.2);
    color: #b89cff;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    transition: right 0.3s;
  }

  .depth-indicator {
    margin-top: 10px;
    height: 8px;
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
    position: relative;
    border: 1px solid rgba(184, 156, 255, 0.06);
  }

  .depth-indicator .focal-mark {
    position: absolute;
    top: -3px;
    width: 3px; height: 14px;
    background: #b89cff;
    border-radius: 2px;
    box-shadow: 0 0 8px rgba(184, 156, 255, 0.5);
    transition: left 0.15s;
  }

  .depth-indicator .range-mark {
    position: absolute;
    top: 0;
    height: 8px;
    background: rgba(184, 156, 255, 0.15);
    border-radius: 4px;
    transition: left 0.15s, width 0.15s;
  }

  #error-msg {
    position: fixed;
    bottom: 20px; left: 20px;
    z-index: 100;
    color: #ff6060;
    font-size: 0.75rem;
    background: rgba(0,0,0,0.8);
    padding: 8px 14px;
    border-radius: 4px;
    display: none;
  }

  .check-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
  }

  .check-row input[type="checkbox"] {
    accent-color: #b89cff;
  }

  .check-row label {
    margin: 0;
    font-size: 0.68rem;
  }
</style>
</head>
<body>

<div id="scene"></div>
<div id="crosshair"></div>
<div id="error-msg"></div>

<button id="toggle-panel">⚙</button>

<div class="controls" id="panel">
  <h1>Depth of Field</h1>
  <p class="sub"><a href="/">← strattao</a> · lab</p>

  <div class="help-box">
    <strong>Click the scene</strong> to enter — pointer lock for mouselook.<br>
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move · <kbd>Shift</kbd> sprint · <kbd>Space</kbd> up · <kbd>C</kbd> crouch<br>
    <kbd>Esc</kbd> release mouse · <kbd>Tab</kbd> toggle panel
  </div>

  <div class="section">
    <h2>Focus</h2>
    <label>Focal Distance <span class="val" id="v-focal">15</span></label>
    <input type="range" id="focal" min="1" max="60" step="0.5" value="15">

    <label>Aperture <span class="val" id="v-aperture">0.015</span></label>
    <input type="range" id="aperture" min="0" max="0.06" step="0.001" value="0.015">

    <label>Max Blur <span class="val" id="v-maxblur">0.008</span></label>
    <input type="range" id="maxblur" min="0" max="0.03" step="0.001" value="0.008">

    <div class="check-row">
      <input type="checkbox" id="autofocus" checked>
      <label for="autofocus">Auto-focus (center of screen)</label>
    </div>

    <div class="depth-indicator">
      <div class="range-mark" id="range-mark"></div>
      <div class="focal-mark" id="focal-mark"></div>
    </div>
  </div>

  <div class="section">
    <h2>Atmosphere</h2>
    <label>Fog Density <span class="val" id="v-fog">0.04</span></label>
    <input type="range" id="fog" min="0" max="0.12" step="0.002" value="0.04">

    <label>Fog Color <span class="val" id="v-fogcol">silent hill</span></label>
    <select id="fog-color">
      <option value="sh">Silent Hill (grey)</option>
      <option value="warm">Warm (amber)</option>
      <option value="cold">Cold (blue)</option>
      <option value="blood">Blood (dark red)</option>
      <option value="void">Void (black)</option>
    </select>

    <label>Ambient <span class="val" id="v-ambient">0.12</span></label>
    <input type="range" id="ambient" min="0" max="0.5" step="0.01" value="0.12">

    <label>Film Grain <span class="val" id="v-grain">0.05</span></label>
    <input type="range" id="grain" min="0" max="0.2" step="0.005" value="0.05">

    <label>Vignette <span class="val" id="v-vignette">0.4</span></label>
    <input type="range" id="vignette" min="0" max="1" step="0.05" value="0.4">
  </div>

  <div class="section">
    <h2>Movement</h2>
    <label>Walk Speed <span class="val" id="v-speed">3.0</span></label>
    <input type="range" id="speed" min="1" max="8" step="0.5" value="3">

    <label>Mouse Sensitivity <span class="val" id="v-sens">0.15</span></label>
    <input type="range" id="sens" min="0.05" max="0.4" step="0.01" value="0.15">

    <label>Head Bob <span class="val" id="v-bob">0.3</span></label>
    <input type="range" id="bob" min="0" max="1" step="0.05" value="0.3">
  </div>

  <div class="section">
    <h2>Presets</h2>
    <div class="preset-grid">
      <button class="preset-btn" data-preset="foggy-street">Foggy Street</button>
      <button class="preset-btn" data-preset="otherworld">Otherworld</button>
      <button class="preset-btn" data-preset="hospital">Hospital</button>
      <button class="preset-btn" data-preset="shallow">Shallow DOF</button>
      <button class="preset-btn" data-preset="deep">Deep Focus</button>
      <button class="preset-btn" data-preset="noir">Noir</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { BokehPass } from 'three/addons/postprocessing/BokehPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';

const el = id => document.getElementById(id);

try {

const W = window.innerWidth, H = window.innerHeight;

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(W, H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
el('scene').appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 150);

// ── Player state ──
const player = {
  x: 0, y: 1.7, z: 2,  // start near entrance, eye height
  yaw: Math.PI,         // facing into corridor (-Z)
  pitch: 0,
  vy: 0,
};

// ── Fog ──
const fogColors = {
  sh:    new THREE.Color(0.22, 0.20, 0.19),
  warm:  new THREE.Color(0.25, 0.15, 0.08),
  cold:  new THREE.Color(0.08, 0.10, 0.18),
  blood: new THREE.Color(0.12, 0.02, 0.01),
  void:  new THREE.Color(0, 0, 0),
};
scene.fog = new THREE.FogExp2(fogColors.sh, 0.04);
scene.background = fogColors.sh.clone();

// ── Lights ──
const ambientLight = new THREE.AmbientLight(0x887766, 0.12);
scene.add(ambientLight);

const flickerLights = [];
for (let i = 0; i < 10; i++) {
  const z = -3 - i * 6;
  const side = (i % 2 === 0) ? -1.4 : 1.4;
  const light = new THREE.PointLight(0xffaa55, 1.2, 12, 2);
  light.position.set(side, 3.8, z);
  scene.add(light);
  flickerLights.push({
    light,
    base: 0.8 + Math.random() * 0.8,
    speed: 1.5 + Math.random() * 5,
    phase: Math.random() * 10
  });

  // Bulb mesh
  const bulb = new THREE.Mesh(
    new THREE.SphereGeometry(0.1, 6, 6),
    new THREE.MeshBasicMaterial({ color: 0xffcc88 })
  );
  bulb.position.copy(light.position);
  scene.add(bulb);

  // Light cone (subtle)
  const cone = new THREE.Mesh(
    new THREE.ConeGeometry(0.8, 2, 8, 1, true),
    new THREE.MeshBasicMaterial({ color: 0xffaa44, transparent: true, opacity: 0.03, side: THREE.DoubleSide })
  );
  cone.position.set(side, 2.8, z);
  scene.add(cone);
}

// ── Corridor geometry ──
const cLen = 80, cW = 4.5, cH = 4.5;

// Textured materials with repeating
function makeMat(color, rough, rep) {
  const m = new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: 0.05 });
  return m;
}

const wallMat = makeMat(0x3a3530, 0.85);
const floorMat = makeMat(0x222018, 0.95);
const ceilMat = makeMat(0x2a2825, 0.9);
const trimMat = new THREE.MeshStandardMaterial({ color: 0x2a2520, roughness: 0.7 });

// Floor
const floor = new THREE.Mesh(new THREE.PlaneGeometry(cW, cLen), floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.set(0, 0, -cLen / 2 + 2);
scene.add(floor);

// Ceiling
const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(cW, cLen), ceilMat);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.set(0, cH, -cLen / 2 + 2);
scene.add(ceiling);

// Walls
for (const side of [-1, 1]) {
  const wall = new THREE.Mesh(new THREE.PlaneGeometry(cLen, cH), wallMat);
  wall.rotation.y = -side * Math.PI / 2;
  wall.position.set(side * cW / 2, cH / 2, -cLen / 2 + 2);
  scene.add(wall);

  // Baseboard trim
  const trim = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.15, cLen), trimMat);
  trim.position.set(side * (cW / 2 - 0.015), 0.075, -cLen / 2 + 2);
  scene.add(trim);
}

// Back wall
const backW = new THREE.Mesh(new THREE.PlaneGeometry(cW, cH), wallMat);
backW.position.set(0, cH / 2, -cLen + 2);
scene.add(backW);

// Front wall (behind player)
const frontW = new THREE.Mesh(new THREE.PlaneGeometry(cW, cH), wallMat);
frontW.rotation.y = Math.PI;
frontW.position.set(0, cH / 2, 2);
scene.add(frontW);

// ── Props ──
const propMats = [
  new THREE.MeshStandardMaterial({ color: 0x4a4038, roughness: 0.75 }),
  new THREE.MeshStandardMaterial({ color: 0x5a3838, roughness: 0.65 }),
  new THREE.MeshStandardMaterial({ color: 0x384858, roughness: 0.55, metalness: 0.2 }),
  new THREE.MeshStandardMaterial({ color: 0x787870, roughness: 0.4, metalness: 0.4 }),
];

function addProp(geo, mat, x, y, z, ry) {
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  if (ry) m.rotation.y = ry;
  scene.add(m);
  return m;
}

// Boxes / crates
addProp(new THREE.BoxGeometry(0.7, 0.7, 0.7), propMats[0], -1.3, 0.35, -4);
addProp(new THREE.BoxGeometry(0.5, 0.5, 0.5), propMats[0], -1.0, 0.95, -4);
addProp(new THREE.BoxGeometry(0.9, 0.6, 0.6), propMats[1], 1.2, 0.3, -10, 0.3);

// Gurney
addProp(new THREE.BoxGeometry(0.7, 0.6, 2.2), propMats[3], 1.4, 0.3, -18);
addProp(new THREE.BoxGeometry(0.6, 0.04, 2.0), propMats[3], 1.4, 0.64, -18);

// Tall pillars / shelves
addProp(new THREE.BoxGeometry(0.4, 2.2, 0.4), propMats[2], -1.5, 1.1, -25);
addProp(new THREE.BoxGeometry(0.4, 2.2, 0.4), propMats[2], -1.5, 1.1, -26);

// Debris further down
addProp(new THREE.BoxGeometry(1.2, 0.3, 0.8), propMats[0], 0.3, 0.15, -32);
addProp(new THREE.BoxGeometry(0.5, 1.5, 0.5), propMats[1], -0.8, 0.75, -40, 0.15);
addProp(new THREE.BoxGeometry(0.3, 0.3, 0.3), propMats[0], 0.9, 0.15, -42);
addProp(new THREE.BoxGeometry(0.6, 0.6, 1.5), propMats[1], 1.0, 0.3, -50, -0.2);
addProp(new THREE.CylinderGeometry(0.2, 0.25, 1.0, 8), propMats[2], -1.2, 0.5, -55);
addProp(new THREE.BoxGeometry(1.0, 0.4, 1.0), propMats[0], 0.0, 0.2, -62);

// Wheelchair shape (rough)
const wheelBase = addProp(new THREE.BoxGeometry(0.6, 0.5, 0.6), propMats[3], -0.5, 0.35, -20, 0.4);
addProp(new THREE.BoxGeometry(0.5, 0.5, 0.05), propMats[3], -0.5, 0.7, -19.75, 0.4);

// Ceiling pipes
const pipeMat = new THREE.MeshStandardMaterial({ color: 0x505048, metalness: 0.5, roughness: 0.35 });
for (let i = 0; i < 3; i++) {
  const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, cLen, 6), pipeMat);
  pipe.rotation.x = Math.PI / 2;
  pipe.position.set(-1.2 + i * 1.2, cH - 0.1, -cLen / 2 + 2);
  scene.add(pipe);
}

// Hanging pipe (broken, angled)
const hangPipe = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 3, 6), pipeMat);
hangPipe.position.set(0.8, 3.2, -35);
hangPipe.rotation.z = 0.4;
hangPipe.rotation.x = 0.2;
scene.add(hangPipe);

// ── Post Processing ──
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bokehPass = new BokehPass(scene, camera, {
  focus: 15.0,
  aperture: 0.015,
  maxblur: 0.008,
  width: W,
  height: H
});
composer.addPass(bokehPass);

const grainShader = {
  uniforms: {
    tDiffuse: { value: null },
    time: { value: 0 },
    grain: { value: 0.05 },
    vignette: { value: 0.4 },
  },
  vertexShader: `
    varying vec2 vUv;
    void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
  `,
  fragmentShader: `
    uniform sampler2D tDiffuse;
    uniform float time;
    uniform float grain;
    uniform float vignette;
    varying vec2 vUv;
    float rand(vec2 co) { return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453); }
    void main() {
      vec4 color = texture2D(tDiffuse, vUv);
      color.rgb += (rand(vUv * 800.0 + fract(time * 100.0)) - 0.5) * grain;
      vec2 vc = vUv - 0.5;
      color.rgb *= 1.0 - dot(vc, vc) * vignette * 2.5;
      gl_FragColor = color;
    }
  `
};
const grainPass = new ShaderPass(grainShader);
composer.addPass(grainPass);

// ── Input ──
const keys = {};
let locked = false;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Tab') {
    e.preventDefault();
    const hidden = el('panel').classList.toggle('hidden');
    el('toggle-panel').style.right = hidden ? '16px' : '316px';
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Pointer lock
renderer.domElement.addEventListener('click', () => {
  if (!locked) renderer.domElement.requestPointerLock();
});

document.addEventListener('pointerlockchange', () => {
  locked = !!document.pointerLockElement;
  el('crosshair').classList.toggle('visible', locked);
});

document.addEventListener('mousemove', e => {
  if (!locked) return;
  const sens = parseFloat(el('sens').value) * 0.01;
  player.yaw -= e.movementX * sens;
  player.pitch -= e.movementY * sens;
  player.pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, player.pitch));
});

// ── Autofocus raycaster ──
const afRaycaster = new THREE.Raycaster();
const afDir = new THREE.Vector2(0, 0); // screen center

// ── Presets ──
const presets = {
  'foggy-street': { focal: 12, aperture: 0.012, maxblur: 0.006, fog: 0.05, fogcol: 'sh', ambient: 0.10, grain: 0.06, vignette: 0.45 },
  'otherworld':   { focal: 8,  aperture: 0.020, maxblur: 0.010, fog: 0.07, fogcol: 'blood', ambient: 0.06, grain: 0.10, vignette: 0.65 },
  'hospital':     { focal: 18, aperture: 0.010, maxblur: 0.005, fog: 0.025, fogcol: 'cold', ambient: 0.18, grain: 0.03, vignette: 0.25 },
  'shallow':      { focal: 6,  aperture: 0.035, maxblur: 0.020, fog: 0.015, fogcol: 'sh', ambient: 0.15, grain: 0.02, vignette: 0.2 },
  'deep':         { focal: 30, aperture: 0.002, maxblur: 0.001, fog: 0.008, fogcol: 'void', ambient: 0.25, grain: 0.02, vignette: 0.1 },
  'noir':         { focal: 10, aperture: 0.018, maxblur: 0.008, fog: 0.04, fogcol: 'void', ambient: 0.04, grain: 0.08, vignette: 0.75 },
};

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = presets[btn.dataset.preset];
    if (!p) return;
    el('focal').value = p.focal;
    el('aperture').value = p.aperture;
    el('maxblur').value = p.maxblur;
    el('fog').value = p.fog;
    el('fog-color').value = p.fogcol;
    el('ambient').value = p.ambient;
    el('grain').value = p.grain;
    el('vignette').value = p.vignette;
    updateControls();
  });
});

// ── Controls sync ──
function updateControls() {
  const focal = parseFloat(el('focal').value);
  const aperture = parseFloat(el('aperture').value);
  const maxblur = parseFloat(el('maxblur').value);
  const fogDensity = parseFloat(el('fog').value);
  const fogCol = el('fog-color').value;
  const ambient = parseFloat(el('ambient').value);
  const grainAmt = parseFloat(el('grain').value);
  const vignetteAmt = parseFloat(el('vignette').value);

  bokehPass.uniforms['focus'].value = focal;
  bokehPass.uniforms['aperture'].value = aperture;
  bokehPass.uniforms['maxblur'].value = maxblur;

  scene.fog.density = fogDensity;
  const fc = fogColors[fogCol] || fogColors.sh;
  scene.fog.color.copy(fc);
  scene.background.copy(fc);

  ambientLight.intensity = ambient;
  grainPass.uniforms.grain.value = grainAmt;
  grainPass.uniforms.vignette.value = vignetteAmt;

  el('v-focal').textContent = focal.toFixed(1);
  el('v-aperture').textContent = aperture.toFixed(3);
  el('v-maxblur').textContent = maxblur.toFixed(3);
  el('v-fog').textContent = fogDensity.toFixed(3);
  el('v-fogcol').textContent = el('fog-color').options[el('fog-color').selectedIndex].text.toLowerCase();
  el('v-ambient').textContent = ambient.toFixed(2);
  el('v-grain').textContent = grainAmt.toFixed(3);
  el('v-vignette').textContent = vignetteAmt.toFixed(2);
  el('v-speed').textContent = parseFloat(el('speed').value).toFixed(1);
  el('v-sens').textContent = parseFloat(el('sens').value).toFixed(2);
  el('v-bob').textContent = parseFloat(el('bob').value).toFixed(2);

  const maxDist = 60;
  el('focal-mark').style.left = (focal / maxDist * 100) + '%';
  el('range-mark').style.left = Math.max(0, focal / maxDist * 100 - 8) + '%';
  el('range-mark').style.width = '16%';
}

document.querySelectorAll('.controls input, .controls select').forEach(e => {
  e.addEventListener('input', updateControls);
});

// ── Toggle panel ──
el('toggle-panel').addEventListener('click', () => {
  const hidden = el('panel').classList.toggle('hidden');
  el('toggle-panel').style.right = hidden ? '16px' : '316px';
});

// ── Resize ──
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  composer.setSize(w, h);
});

// ── Game loop ──
let time = 0;
let bobPhase = 0;
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  time += dt;

  // ── Movement ──
  const speed = parseFloat(el('speed').value) * (keys['ShiftLeft'] || keys['ShiftRight'] ? 2.0 : 1.0);
  const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const right = new THREE.Vector3(forward.z, 0, -forward.x);

  let moving = false;
  if (keys['KeyW'] || keys['ArrowUp'])    { player.x += forward.x*speed*dt; player.z += forward.z*speed*dt; moving = true; }
  if (keys['KeyS'] || keys['ArrowDown'])   { player.x -= forward.x*speed*dt; player.z -= forward.z*speed*dt; moving = true; }
  if (keys['KeyA'] || keys['ArrowLeft'])    { player.x -= right.x*speed*dt; player.z -= right.z*speed*dt; moving = true; }
  if (keys['KeyD'] || keys['ArrowRight'])   { player.x += right.x*speed*dt; player.z += right.z*speed*dt; moving = true; }

  // Vertical
  const eyeBase = keys['KeyC'] ? 1.0 : 1.7;
  if (keys['Space']) player.y = Math.min(cH - 0.3, player.y + 3 * dt);
  else player.y += (eyeBase - player.y) * 5 * dt;

  // Clamp to corridor
  const hw = cW / 2 - 0.3;
  player.x = Math.max(-hw, Math.min(hw, player.x));
  player.z = Math.max(-cLen + 2.5, Math.min(1.8, player.z));

  // Head bob
  const bobAmt = parseFloat(el('bob').value);
  if (moving) bobPhase += dt * speed * 1.8;
  const bobY = moving ? Math.sin(bobPhase) * 0.04 * bobAmt : 0;
  const bobX = moving ? Math.cos(bobPhase * 0.5) * 0.02 * bobAmt : 0;

  // Camera
  camera.position.set(player.x + bobX, player.y + bobY, player.z);
  const lookTarget = new THREE.Vector3(
    player.x - Math.sin(player.yaw),
    player.y + Math.sin(player.pitch),
    player.z - Math.cos(player.yaw)
  );
  camera.lookAt(lookTarget);

  // ── Autofocus ──
  if (el('autofocus').checked) {
    afRaycaster.setFromCamera(afDir, camera);
    const hits = afRaycaster.intersectObjects(scene.children, true);
    if (hits.length > 0) {
      const targetFocal = hits[0].distance;
      const currentFocal = bokehPass.uniforms['focus'].value;
      // Smooth focus transition
      const newFocal = currentFocal + (targetFocal - currentFocal) * 3 * dt;
      bokehPass.uniforms['focus'].value = newFocal;
      el('focal').value = newFocal;
      el('v-focal').textContent = newFocal.toFixed(1);
      el('focal-mark').style.left = (newFocal / 60 * 100) + '%';
    }
  }

  // ── Flicker lights ──
  for (const fl of flickerLights) {
    const t = time + fl.phase;
    fl.light.intensity = Math.max(0, fl.base
      + Math.sin(t * fl.speed) * 0.4
      + Math.sin(t * fl.speed * 2.3) * 0.2
      + Math.sin(t * fl.speed * 5.7) * 0.1
    );
  }

  grainPass.uniforms.time.value = time;
  composer.render();
}

updateControls();
animate();

} catch(e) {
  el('error-msg').textContent = 'Error: ' + e.message;
  el('error-msg').style.display = 'block';
  console.error(e);
}

</script>

</body>
