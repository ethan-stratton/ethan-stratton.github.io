<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrimony Beyond Space and Time</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=JetBrains+Mono:wght@300;400&family=Pixelify+Sans:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f; color: #c8c0b8;
    font-family: 'JetBrains Mono', monospace;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
  }
  h1 {
    font-family: 'Cinzel', serif; font-weight: 400;
    font-size: 1.2rem; color: #e8e0d8;
    letter-spacing: 0.06em; margin-bottom: 12px;
    text-shadow: 0 0 30px rgba(180, 140, 255, 0.3);
  }
  canvas#game {
    border: 2px solid #2a2530;
    image-rendering: pixelated;
    background: #0a0a0f;
  }
  .info {
    font-size: 0.6rem; color: #484040; margin-top: 8px;
  }
  .dialogue-box {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    width: 480px; max-width: 90vw;
    background: rgba(10, 8, 15, 0.95);
    border: 2px solid #3a3540; border-radius: 6px;
    padding: 14px 18px;
    font-size: 0.75rem; color: #c8b8a0; line-height: 1.7;
    display: none; z-index: 10;
  }
  .dialogue-box .speaker {
    font-family: 'Cinzel', serif; font-size: 0.7rem;
    color: #b89cff; margin-bottom: 6px;
  }
  .combat-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(5, 3, 10, 0.95);
    display: none; z-index: 20;
    align-items: center; justify-content: center;
    flex-direction: column;
  }
  .combat-overlay.active { display: flex; }
  .combat-overlay iframe {
    width: 900px; max-width: 95vw; height: 700px; max-height: 80vh;
    border: 2px solid #3a3540; border-radius: 6px;
  }
  .combat-close {
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
    color: #908880; margin-top: 10px; cursor: pointer;
    padding: 6px 16px; border: 1px solid #3a3540; border-radius: 4px;
    background: rgba(20, 18, 25, 0.9);
  }
  .combat-close:hover { border-color: #b89cff; color: #e8e0d8; }
</style>
</head>
<body>

<h1>Matrimony Beyond Space and Time</h1>
<canvas id="game" width="512" height="512"></canvas>
<div class="info">Arrow keys to move · Space to interact</div>
<div class="dialogue-box" id="dialogueBox">
  <div class="speaker" id="dialogueSpeaker"></div>
  <div id="dialogueText"></div>
</div>

<script>
// ══════════════════════════════════
// LDtk LEVEL DATA (embedded)
// ══════════════════════════════════
let levelData = null;

// ══════════════════════════════════
// GAME CONFIG
// ══════════════════════════════════
const TILE = 16;       // tile size in pixels
const SCALE = 2;       // render scale (16px tiles → 32px on screen)
const CANVAS_TILES = 16; // viewport in tiles
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = CANVAS_TILES * TILE * SCALE;
canvas.height = CANVAS_TILES * TILE * SCALE;

// ══════════════════════════════════
// TILESET (fallback colors until real art)
// ══════════════════════════════════
let tilesetImg = null;
let tilesetLoaded = false;
let tilesetCols = 0;

// Color fallback for IntGrid values
const INTGRID_COLORS = {
  0: '#2a2820', // walkable floor
  1: '#4a4540', // wall
};

// ══════════════════════════════════
// SPRITES (DeepDive 16x16, 4-frame strips)
// ══════════════════════════════════
const SPRITE_FRAME_SIZE = 16;
const SPRITE_FRAMES = 4;
const ANIM_SPEED = 200; // ms per frame

const sprites = {};
function loadSprite(name, src) {
  const img = new Image();
  img.src = src;
  sprites[name] = { img, loaded: false };
  img.onload = () => { sprites[name].loaded = true; };
}

// Player sprite (Snoblin prototype character)
// 128x384 sheet, 32x32 frames, 4 cols × 12 rows
// Row 0: Idle down (2f)
// Row 1: Idle right (2f)
// Row 2: Idle up (2f)
// Row 3: Walk down (4f)
// Row 4: Walk right (4f)
// Row 5: Walk up (4f)
// Row 6: ignore
// Row 7: Hurt (2f)
// Row 8: ignore
// Row 9: Death down (3f)
// Row 10: Death right (3f)
// Row 11: Death left (3f)
const PLAYER_SHEET = {
  img: null, loaded: false,
  frameW: 32, frameH: 32, cols: 4,
  anims: {
    idle_down:  { row: 0, frames: 2 },
    idle_right: { row: 1, frames: 2 },
    idle_up:    { row: 2, frames: 2 },
    walk_down:  { row: 3, frames: 4 },
    walk_right: { row: 4, frames: 4 },
    walk_up:    { row: 5, frames: 4 },
    hurt:       { row: 7, frames: 2 },
    death_down: { row: 9, frames: 3 },
    death_right:{ row: 10, frames: 3 },
    death_left: { row: 11, frames: 3 },
  }
};
{
  const img = new Image();
  img.src = 'character sprite/Snoblin_Prototype_Character/Assets/Prototype_Character/prototype_character.png';
  img.onload = () => { PLAYER_SHEET.loaded = true; };
  PLAYER_SHEET.img = img;
}

// Enemy sprites (DeepDive 16x16, 4-frame strips)
loadSprite('Enemy1', 'sprites/FireElemental.png');

// ══════════════════════════════════
// GAME STATE
// ══════════════════════════════════
const state = {
  player: { x: 0, y: 0 },  // grid coords (destination)
  entities: [],
  collision: [],  // 2D array: 0=walk, 1=wall
  mapW: 0, mapH: 0,
  tiles: [],      // from LDtk tile layers (all of them, in draw order)
  facing: 'down',
  moving: false,
  moveTimer: 0,
  moveFrom: { x: 0, y: 0 },
  dialogue: null,
  flags: {},
  defeatedEnemies: {},
  // Smooth camera position (in tile coords, fractional)
  smoothX: 0,
  smoothY: 0,
  // Combat
  combat: null, // { enemy, enemyHp, enemyMaxHp, enemyEff, enemyDef, enemyWait, playerHp, playerMaxHp, playerEff, playerDef, playerWait, attackText }
  combatTransition: null, // { type: 'in'|'out', startTime, duration }
};

// ══════════════════════════════════
// LOAD LEVEL
// ══════════════════════════════════
async function loadLevel() {
  const resp = await fetch('LDtK_Matrimony/Matrimony.ldtk?v=' + Date.now());
  const data = await resp.json();
  const level = data.levels[0];
  
  // Load tileset image
  const tsDef = data.defs.tilesets[0];
  if (tsDef && tsDef.relPath) {
    tilesetCols = Math.floor(tsDef.pxWid / tsDef.tileGridSize);
    tilesetImg = new Image();
    tilesetImg.onload = () => { tilesetLoaded = true; };
    tilesetImg.src = 'LDtK_Matrimony/' + tsDef.relPath;
  }

  // Collect tile layers in reverse order (LDtk stores top-first, we want background drawn first)
  const tileLayers = [];
  
  for (const layer of level.layerInstances) {
    if (layer.__identifier === 'IntGrid') {
      state.mapW = layer.__cWid;
      state.mapH = layer.__cHei;
      state.collision = [];
      for (let y = 0; y < state.mapH; y++) {
        const row = [];
        for (let x = 0; x < state.mapW; x++) {
          row.push(layer.intGridCsv[y * state.mapW + x]);
        }
        state.collision.push(row);
      }
    }
    if (layer.__type === 'Tiles' && layer.gridTiles && layer.gridTiles.length > 0) {
      tileLayers.push(layer.gridTiles);
    }
    if (layer.__identifier === 'Entities') {
      state.entities = [];
      for (const e of layer.entityInstances) {
        const gx = Math.floor(e.px[0] / TILE);
        const gy = Math.floor(e.px[1] / TILE);
        if (e.__identifier === 'Main') {
          state.player.x = gx;
          state.player.y = gy;
        } else {
          state.entities.push({
            type: e.__identifier,
            x: gx, y: gy,
            id: `${e.__identifier}_${gx}_${gy}`,
            fields: {},
          });
        }
      }
    }
  }
  
  // Reverse so background layers draw first
  tileLayers.reverse();
  state.tiles = tileLayers;
  
  updateCamera();
}

// ══════════════════════════════════
// CAMERA
// ══════════════════════════════════
function updateCamera() {
  state.smoothX = state.player.x;
  state.smoothY = state.player.y;
}

function getPlayerVisualPos() {
  if (!state.moving) return { x: state.player.x, y: state.player.y };
  const t = Math.min(1, state.moveTimer / MOVE_DURATION);
  // Linear interpolation for chained movement (no decel pulse between steps)
  return {
    x: state.moveFrom.x + (state.player.x - state.moveFrom.x) * t,
    y: state.moveFrom.y + (state.player.y - state.moveFrom.y) * t,
  };
}

function getCameraOffset() {
  const vis = getPlayerVisualPos();
  let camX = vis.x - Math.floor(CANVAS_TILES / 2);
  let camY = vis.y - Math.floor(CANVAS_TILES / 2);
  camX = Math.max(0, Math.min(state.mapW - CANVAS_TILES, camX));
  camY = Math.max(0, Math.min(state.mapH - CANVAS_TILES, camY));
  return { x: camX, y: camY };
}

// ══════════════════════════════════
// INPUT
// ══════════════════════════════════
const keys = {};
document.addEventListener('keydown', (e) => {
  keys[e.key] = true;
  if (e.key === 'Escape' && state.combat && !state.combatTransition) {
    exitCombat();
    return;
  }
  if (e.key === ' ') {
    e.preventDefault();
    if (state.dialogue) {
      closeDialogue();
    } else if (!state.combat) {
      interact();
    }
  }
});
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

function tryMove(dx, dy) {
  if (state.moving || state.dialogue || state.combat || state.combatTransition) return;
  
  // Set facing
  if (dx < 0) state.facing = 'left';
  if (dx > 0) state.facing = 'right';
  if (dy < 0) state.facing = 'up';
  if (dy > 0) state.facing = 'down';
  
  const nx = state.player.x + dx;
  const ny = state.player.y + dy;
  
  // Bounds check
  if (nx < 0 || nx >= state.mapW || ny < 0 || ny >= state.mapH) return;
  // Collision check
  if (state.collision[ny][nx] !== 0) return;
  // Entity collision (non-defeated enemies block)
  const blocking = state.entities.find(e => e.x === nx && e.y === ny && !state.defeatedEnemies[e.id]);
  if (blocking) {
    // Face the entity
    state.facing = dx > 0 ? 'right' : dx < 0 ? 'left' : dy > 0 ? 'down' : 'up';
    handleEntityContact(blocking);
    return;
  }
  
  // Start movement
  state.moving = true;
  state.moveTimer = 0;
  state.moveFrom.x = state.player.x;
  state.moveFrom.y = state.player.y;
  state.player.x = nx;
  state.player.y = ny;
}

const MOVE_DURATION = 150; // ms for grid movement
let lastFrameTime = 0;

function handleMovement(now) {
  const dt = lastFrameTime ? Math.min(now - lastFrameTime, 50) : 16; // cap to avoid jumps on tab-back
  lastFrameTime = now;

  if (state.moving) {
    state.moveTimer += dt;
    if (state.moveTimer >= MOVE_DURATION) {
      state.moving = false;
      // Chain movement immediately if key held — no gap between steps
      if (keys['ArrowLeft'] || keys['a']) tryMove(-1, 0);
      else if (keys['ArrowRight'] || keys['d']) tryMove(1, 0);
      else if (keys['ArrowUp'] || keys['w']) tryMove(0, -1);
      else if (keys['ArrowDown'] || keys['s']) tryMove(0, 1);
    }
    return;
  }

  if (keys['ArrowLeft'] || keys['a']) tryMove(-1, 0);
  else if (keys['ArrowRight'] || keys['d']) tryMove(1, 0);
  else if (keys['ArrowUp'] || keys['w']) tryMove(0, -1);
  else if (keys['ArrowDown'] || keys['s']) tryMove(0, 1);
}

// ══════════════════════════════════
// INTERACTION
// ══════════════════════════════════
function getFacingTile() {
  const dx = state.facing === 'left' ? -1 : state.facing === 'right' ? 1 : 0;
  const dy = state.facing === 'up' ? -1 : state.facing === 'down' ? 1 : 0;
  return { x: state.player.x + dx, y: state.player.y + dy };
}

function interact() {
  const { x, y } = getFacingTile();
  const entity = state.entities.find(e => e.x === x && e.y === y && !state.defeatedEnemies[e.id]);
  if (entity) {
    handleEntityContact(entity);
  }
}

function handleEntityContact(entity) {
  if (entity.type === 'Enemy1') {
    startCombat(entity, {
      name: 'Fire Elemental',
      maxHp: 20, hp: 20,
      eff: 8, def: 3, wait: 5,
    });
  } else {
    showDialogue('', 'Nothing happens.');
  }
}

// ══════════════════════════════════
// COMBAT SYSTEM
// ══════════════════════════════════
const ENEMY_DATA = {
  'Enemy1': {
    name: 'Fire Elemental',
    sprite: 'Enemy1',
    maxHp: 20, eff: 8, def: 3, wait: 5,
  },
};

function startCombat(entity, enemyStats) {
  state.combatTransition = { type: 'in', startTime: performance.now(), duration: 600 };
  // Set up combat state after transition
  setTimeout(() => {
    state.combat = {
      enemy: entity,
      enemyName: enemyStats.name || entity.type,
      enemySprite: entity.type,
      enemyHp: enemyStats.maxHp,
      enemyMaxHp: enemyStats.maxHp,
      enemyEff: enemyStats.eff,
      enemyDef: enemyStats.def,
      enemyWait: enemyStats.wait,
      playerHp: 30,
      playerMaxHp: 30,
      playerEff: 10,
      playerDef: 2,
      playerWait: 0,
      attackText: '',
    };
  }, 600);
}

function exitCombat() {
  state.combatTransition = { type: 'out', startTime: performance.now(), duration: 400 };
  const enemy = state.combat.enemy;
  if (state.combat.enemyHp <= 0) {
    state.defeatedEnemies[enemy.id] = true;
  }
  setTimeout(() => {
    state.combat = null;
    state.combatTransition = null;
  }, 400);
}

function drawCombat() {
  const c = state.combat;
  const W = canvas.width;
  const H = canvas.height;
  
  // Background
  ctx.fillStyle = '#0c0c14';
  ctx.fillRect(0, 0, W, H);
  
  const FONT = '"Pixelify Sans", sans-serif';
  
  // ── TOP: Enemy info bar (~18% of screen height) ──
  const topH = Math.round(H * 0.18);
  
  // Enemy portrait box (left side)
  const portraitSize = Math.round(topH * 0.75);
  const portraitX = 12;
  const portraitY = Math.round((topH - portraitSize) / 2);
  
  // Portrait border
  ctx.strokeStyle = '#5a5060';
  ctx.lineWidth = 2;
  ctx.strokeRect(portraitX, portraitY, portraitSize, portraitSize);
  
  // Draw enemy sprite in portrait
  const spr = sprites[c.enemySprite];
  if (spr && spr.loaded) {
    const frame = Math.floor(performance.now() / ANIM_SPEED) % SPRITE_FRAMES;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(spr.img,
      frame * SPRITE_FRAME_SIZE, 0, SPRITE_FRAME_SIZE, SPRITE_FRAME_SIZE,
      portraitX + 4, portraitY + 4, portraitSize - 8, portraitSize - 8
    );
    ctx.imageSmoothingEnabled = true;
  }
  
  // Enemy name + HP bar (to the right of portrait)
  const infoX = portraitX + portraitSize + 14;
  const infoY = portraitY + 4;
  
  // HP bar
  const barW = Math.round(W * 0.25);
  const barH = 10;
  const barY = infoY + 2;
  
  // HP bar background
  ctx.fillStyle = '#2a1a1a';
  ctx.fillRect(infoX, barY, barW, barH);
  // HP bar fill
  const hpRatio = c.enemyHp / c.enemyMaxHp;
  ctx.fillStyle = hpRatio > 0.5 ? '#3a8a3a' : hpRatio > 0.25 ? '#b89030' : '#a03030';
  ctx.fillRect(infoX, barY, Math.round(barW * hpRatio), barH);
  // HP bar border
  ctx.strokeStyle = '#6a6070';
  ctx.lineWidth = 1;
  ctx.strokeRect(infoX, barY, barW, barH);
  
  // Attack text area (to the right of HP bar)
  const textX = infoX + barW + 16;
  ctx.fillStyle = '#e8e0d0';
  ctx.font = '14px ' + FONT;
  ctx.textAlign = 'left';
  ctx.fillText(c.enemyName, infoX, barY + barH + 18);
  
  // Attack text
  if (c.attackText) {
    ctx.fillStyle = '#d0c0a0';
    ctx.font = '13px ' + FONT;
    ctx.fillText(c.attackText, textX, barY + 9);
  }
  
  // EFF DEF WAIT under portrait and HP bar
  const statY = portraitY + portraitSize + 6;
  ctx.fillStyle = '#a098a0';
  ctx.font = '12px ' + FONT;
  ctx.fillText('Eff: ' + c.enemyEff, portraitX, statY + 12);
  ctx.fillText('Def: ' + c.enemyDef, portraitX + 70, statY + 12);
  ctx.fillText('Wait: ' + c.enemyWait, portraitX + 140, statY + 12);
  
  // ── MIDDLE: Battle arena (~50% of screen, starts at ~20%) ──
  const arenaY = Math.round(H * 0.20);
  const arenaH = Math.round(H * 0.50);
  
  // Arena background (simple gradient floor)
  const grad = ctx.createLinearGradient(0, arenaY, 0, arenaY + arenaH);
  grad.addColorStop(0, '#1a1820');
  grad.addColorStop(0.4, '#1e2418');
  grad.addColorStop(1, '#222818');
  ctx.fillStyle = grad;
  ctx.fillRect(0, arenaY, W, arenaH);
  
  // Simple ground line
  const groundY = arenaY + Math.round(arenaH * 0.7);
  ctx.strokeStyle = '#3a3830';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(W, groundY);
  ctx.stroke();
  
  // Draw player character (left side of arena)
  const playerArenaX = Math.round(W * 0.2);
  const playerArenaY = groundY - 64;
  if (PLAYER_SHEET.loaded) {
    const anim = PLAYER_SHEET.anims['idle_right'];
    const frame = Math.floor(performance.now() / 400) % anim.frames;
    const srcX = frame * PLAYER_SHEET.frameW;
    const srcY = anim.row * PLAYER_SHEET.frameH;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(PLAYER_SHEET.img,
      srcX, srcY, PLAYER_SHEET.frameW, PLAYER_SHEET.frameH,
      playerArenaX, playerArenaY, 64, 64
    );
    ctx.imageSmoothingEnabled = true;
  }
  
  // Draw enemy (right side of arena)
  const enemyArenaX = Math.round(W * 0.7);
  const enemyArenaY = groundY - 48;
  if (spr && spr.loaded) {
    const frame = Math.floor(performance.now() / ANIM_SPEED) % SPRITE_FRAMES;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(spr.img,
      frame * SPRITE_FRAME_SIZE, 0, SPRITE_FRAME_SIZE, SPRITE_FRAME_SIZE,
      enemyArenaX, enemyArenaY, 48, 48
    );
    ctx.imageSmoothingEnabled = true;
  }
  
  // ── BOTTOM: Player info bar ──
  const botY = arenaY + arenaH + 8;
  
  // Player HP
  const pBarX = portraitX;
  const pBarY = botY + 4;
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(pBarX, pBarY, barW, barH);
  const pHpRatio = c.playerHp / c.playerMaxHp;
  ctx.fillStyle = pHpRatio > 0.5 ? '#3a6aba' : pHpRatio > 0.25 ? '#b89030' : '#a03030';
  ctx.fillRect(pBarX, pBarY, Math.round(barW * pHpRatio), barH);
  ctx.strokeStyle = '#6a6070';
  ctx.strokeRect(pBarX, pBarY, barW, barH);
  
  // Player HP text
  ctx.fillStyle = '#e8e0d0';
  ctx.font = '13px ' + FONT;
  ctx.fillText('HP ' + c.playerHp + '/' + c.playerMaxHp, pBarX, pBarY + barH + 16);
  
  // Player stats
  ctx.fillStyle = '#a098a0';
  ctx.font = '12px ' + FONT;
  ctx.fillText('Eff: ' + c.playerEff, pBarX + barW + 16, pBarY + 9);
  ctx.fillText('Def: ' + c.playerDef, pBarX + barW + 86, pBarY + 9);
  ctx.fillText('Wait: ' + c.playerWait, pBarX + barW + 156, pBarY + 9);
  
  // Temporary: ESC to exit
  ctx.fillStyle = '#484048';
  ctx.font = '10px ' + FONT;
  ctx.textAlign = 'right';
  ctx.fillText('[ESC] Exit', W - 10, H - 10);
  ctx.textAlign = 'left';
}

function drawCombatTransition() {
  const t = state.combatTransition;
  if (!t) return;
  const elapsed = performance.now() - t.startTime;
  const progress = Math.min(1, elapsed / t.duration);
  
  if (t.type === 'in') {
    // Horizontal bars closing in from top and bottom
    const barH = Math.round((canvas.height / 2) * progress);
    ctx.fillStyle = '#0c0c14';
    ctx.fillRect(0, 0, canvas.width, barH);
    ctx.fillRect(0, canvas.height - barH, canvas.width, barH);
  } else {
    // Reverse — bars opening
    const barH = Math.round((canvas.height / 2) * (1 - progress));
    ctx.fillStyle = '#0c0c14';
    ctx.fillRect(0, 0, canvas.width, barH);
    ctx.fillRect(0, canvas.height - barH, canvas.width, barH);
  }
}

function showDialogue(speaker, text) {
  state.dialogue = { speaker, text };
  const box = document.getElementById('dialogueBox');
  document.getElementById('dialogueSpeaker').textContent = speaker;
  document.getElementById('dialogueText').textContent = text;
  box.style.display = 'block';
}

function closeDialogue() {
  state.dialogue = null;
  document.getElementById('dialogueBox').style.display = 'none';
}

// ══════════════════════════════════
// RENDERING
// ══════════════════════════════════
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Don't render until tileset is loaded (prevents flash of IntGrid)
  if (!tilesetLoaded) return;
  
  const cam = getCameraOffset();
  const camX = cam.x;
  const camY = cam.y;
  const vis = getPlayerVisualPos();
  
  // Draw IntGrid (floor/walls) as fallback
  // We need to draw extra tiles to cover fractional camera offsets
  const startX = Math.floor(camX) - 1;
  const startY = Math.floor(camY) - 1;
  const endX = Math.ceil(camX) + CANVAS_TILES + 1;
  const endY = Math.ceil(camY) + CANVAS_TILES + 1;
  
  for (let y = startY; y < endY; y++) {
    for (let x = startX; x < endX; x++) {
      if (x < 0 || x >= state.mapW || y < 0 || y >= state.mapH) continue;
      const val = state.collision[y][x];
      const sx = (x - camX) * TILE * SCALE;
      const sy = (y - camY) * TILE * SCALE;
      ctx.fillStyle = INTGRID_COLORS[val] || '#1a1520';
      ctx.fillRect(Math.round(sx), Math.round(sy), TILE * SCALE + 1, TILE * SCALE + 1); // +1 to avoid seams
    }
  }
  
  // Draw tile layers (background first, foreground last)
  if (tilesetLoaded && tilesetImg) {
    ctx.imageSmoothingEnabled = false;
    for (const tileLayer of state.tiles) {
      for (const tile of tileLayer) {
        const gx = Math.floor(tile.px[0] / TILE);
        const gy = Math.floor(tile.px[1] / TILE);
        if (gx < startX || gx > endX || gy < startY || gy > endY) continue;
        const sx = (gx - camX) * TILE * SCALE;
        const sy = (gy - camY) * TILE * SCALE;
        ctx.drawImage(tilesetImg,
          tile.src[0], tile.src[1], TILE, TILE,
          Math.round(sx), Math.round(sy), TILE * SCALE, TILE * SCALE
        );
      }
    }
    ctx.imageSmoothingEnabled = true;
  }
  
  // Draw entities
  for (const e of state.entities) {
    if (state.defeatedEnemies[e.id]) continue;
    if (e.x < startX || e.x > endX || e.y < startY || e.y > endY) continue;
    const sx = Math.round((e.x - camX) * TILE * SCALE);
    const sy = Math.round((e.y - camY) * TILE * SCALE);
    drawEntity(ctx, e, sx, sy);
  }
  
  // Draw player at visual (interpolated) position
  const playerDrawX = Math.round((vis.x - camX) * TILE * SCALE);
  const playerDrawY = Math.round((vis.y - camY) * TILE * SCALE);
  drawPlayer(ctx, playerDrawX, playerDrawY);
  
  // Version number (top right)
  ctx.fillStyle = 'rgba(200, 192, 184, 0.4)';
  ctx.font = '10px "JetBrains Mono", monospace';
  ctx.textAlign = 'right';
  ctx.fillText('v0.08', canvas.width - 8, 14);
  ctx.textAlign = 'left';
}

function drawSprite(ctx, spriteName, x, y, time) {
  const s = TILE * SCALE;
  const spr = sprites[spriteName];
  if (spr && spr.loaded) {
    const frame = Math.floor((time || performance.now()) / ANIM_SPEED) % SPRITE_FRAMES;
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(spr.img,
      frame * SPRITE_FRAME_SIZE, 0, SPRITE_FRAME_SIZE, SPRITE_FRAME_SIZE,
      x, y, s, s
    );
    ctx.imageSmoothingEnabled = true;
  } else {
    // Fallback rectangle
    ctx.fillStyle = spriteName === 'player' ? '#6a8aca' : '#d77643';
    ctx.fillRect(x + s*0.2, y + s*0.15, s*0.6, s*0.7);
  }
}

function drawPlayer(ctx, x, y) {
  const s = TILE * SCALE;
  if (!PLAYER_SHEET.loaded) {
    ctx.fillStyle = '#6a8aca';
    ctx.fillRect(x + s*0.2, y + s*0.15, s*0.6, s*0.7);
    return;
  }
  
  // Left uses right's rows but flipped
  let dir = state.facing;
  let flip = false;
  if (dir === 'left') { dir = 'right'; flip = true; }
  
  const animName = (state.moving ? 'walk_' : 'idle_') + dir;
  const anim = PLAYER_SHEET.anims[animName];
  const speed = state.moving ? 120 : 400;
  const frame = Math.floor(performance.now() / speed) % anim.frames;
  
  const srcX = frame * PLAYER_SHEET.frameW;
  const srcY = anim.row * PLAYER_SHEET.frameH;
  
  const drawSize = s * 2;
  const drawX = Math.round(x - s / 2);
  const drawY = Math.round(y - s / 2);
  
  ctx.imageSmoothingEnabled = false;
  
  if (flip) {
    ctx.save();
    ctx.translate(drawX + drawSize, drawY);
    ctx.scale(-1, 1);
    ctx.drawImage(PLAYER_SHEET.img,
      srcX, srcY, PLAYER_SHEET.frameW, PLAYER_SHEET.frameH,
      0, 0, drawSize, drawSize
    );
    ctx.restore();
  } else {
    ctx.drawImage(PLAYER_SHEET.img,
      srcX, srcY, PLAYER_SHEET.frameW, PLAYER_SHEET.frameH,
      drawX, drawY, drawSize, drawSize
    );
  }
  
  ctx.imageSmoothingEnabled = true;
}

function drawEntity(ctx, entity, x, y) {
  drawSprite(ctx, entity.type, x, y, performance.now());
}

// ══════════════════════════════════
// GAME LOOP
// ══════════════════════════════════
let lastTime = 0;

function gameLoop(time) {
  if (state.combat) {
    drawCombat();
  } else {
    handleMovement(time);
    draw();
  }
  if (state.combatTransition) {
    drawCombatTransition();
  }
  requestAnimationFrame(gameLoop);
}

// ══════════════════════════════════
// INIT
// ══════════════════════════════════
loadLevel().then(() => {
  requestAnimationFrame(gameLoop);
});

</script>
