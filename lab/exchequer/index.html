<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Exchequer — Life Quest Companion</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=MedievalSharp&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#1a1610;--panel:#2a2418;--border:#3a3020;--gold:#d4af37;--gold-dim:#8a7a2a;
--red:#8b2020;--blue:#204080;--green:#206020;--text:#d4c8a0;--text-dim:#8a7e60;
--font-title:'Cinzel',serif;--font-body:'Crimson Text',serif;--font-card:'MedievalSharp',cursive;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:16px;overflow-x:hidden}
body{
background:var(--bg);
background-image:repeating-radial-gradient(circle at 20% 50%,transparent 0,transparent 1px,rgba(255,255,255,.003) 1px,transparent 2px),
repeating-radial-gradient(circle at 80% 20%,transparent 0,transparent 1px,rgba(255,255,255,.005) 1px,transparent 2px);
}
#app{display:none;min-height:100vh;padding-bottom:70px}
.hidden{display:none!important}
/* PANELS */
.panel{background:var(--panel);border:2px solid var(--border);border-radius:8px;padding:16px;margin:8px;box-shadow:inset 0 0 20px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.5)}
.panel-gold{border-color:var(--gold);box-shadow:inset 0 0 20px rgba(0,0,0,.3),0 0 10px rgba(212,175,55,.15)}
/* TYPOGRAPHY */
h1,h2,h3{font-family:var(--font-title);color:var(--gold);font-weight:700}
h1{font-size:1.6rem}h2{font-size:1.3rem}h3{font-size:1.1rem}
.card-title{font-family:var(--font-card);color:var(--gold);font-size:1.2rem}
/* AVATAR */
.avatar-frame{width:100px;height:100px;border:3px solid var(--gold);border-radius:50%;overflow:hidden;margin:0 auto 8px;cursor:pointer;position:relative;background:var(--bg)}
.avatar-frame img{width:100%;height:100%;object-fit:cover}
.avatar-frame .avatar-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--gold-dim)}
.avatar-frame:hover::after{content:'📷';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);font-size:1.5rem}
.avatar-frame input{display:none}
/* BUTTONS */
.btn{font-family:var(--font-title);background:linear-gradient(180deg,#3a3020,#2a2418);color:var(--gold);border:2px solid var(--gold-dim);padding:12px 24px;border-radius:6px;font-size:1rem;cursor:pointer;min-height:44px;min-width:44px;transition:all .2s}
.btn:active,.btn:hover{border-color:var(--gold);box-shadow:0 0 12px rgba(212,175,55,.3)}
.btn-primary{background:linear-gradient(180deg,#4a3a10,#2a2000);border-color:var(--gold)}
.btn-danger{border-color:var(--red);color:#e08080}
.btn-sm{padding:8px 16px;font-size:.85rem}
/* INPUTS */
input[type=text],input[type=number],textarea{background:#1a1610;border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:1rem;padding:10px 12px;border-radius:4px;width:100%}
input:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 6px rgba(212,175,55,.2)}
textarea{resize:vertical;min-height:80px}
/* SLIDER */
input[type=range]{-webkit-appearance:none;width:100%;height:8px;background:linear-gradient(90deg,var(--border),var(--gold));border-radius:4px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;background:var(--gold);border-radius:50%;cursor:pointer;border:2px solid var(--bg)}
/* NAV */
#nav{position:fixed;bottom:0;left:0;right:0;background:#0f0d08;border-top:2px solid var(--border);display:flex;z-index:100;height:64px}
#nav button{flex:1;background:none;border:none;color:var(--text-dim);font-size:.7rem;font-family:var(--font-body);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-height:44px;padding:4px}
#nav button .nav-icon{font-size:1.4rem}
#nav button.active{color:var(--gold);border-top:2px solid var(--gold);margin-top:-2px}
/* SCREEN */
.screen{display:none;max-width:800px;margin:0 auto;padding:8px}
.screen.active{display:block}
/* BARS */
.bar-track{background:#0f0d08;border:1px solid var(--border);border-radius:4px;height:20px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.bar-label{position:absolute;top:0;left:0;right:0;text-align:center;font-size:.75rem;line-height:20px;color:var(--text);font-family:var(--font-title);text-shadow:0 1px 2px #000}
.bar-hp .bar-fill{background:linear-gradient(90deg,#5a1010,var(--red),#c03030)}
.bar-mp .bar-fill{background:linear-gradient(90deg,#102050,var(--blue),#3060b0)}
.bar-gp .bar-fill{background:linear-gradient(90deg,#104010,var(--green),#30a030)}
.bar-xp .bar-fill{background:linear-gradient(90deg,var(--gold-dim),var(--gold))}
/* CARDS */
.card{background:var(--panel);border:2px solid var(--border);border-radius:8px;padding:14px;margin:6px;cursor:pointer;transition:all .2s;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.card:hover,.card:active,.card.selected{border-color:var(--gold);box-shadow:0 0 12px rgba(212,175,55,.2)}
.card.selected{background:#2e2a1a}
/* PROGRESS DOTS */
.dots{display:flex;justify-content:center;gap:8px;padding:12px}
.dot{width:12px;height:12px;border-radius:50%;background:var(--border);transition:all .3s}
.dot.active{background:var(--gold);box-shadow:0 0 6px var(--gold)}
.dot.done{background:var(--gold-dim)}
/* GRID */
.grid{display:grid;gap:8px}.grid-2{grid-template-columns:1fr 1fr}.grid-3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:600px){.grid-2,.grid-3{grid-template-columns:1fr}}
/* CARD FLIP */
.flip-container{perspective:800px;width:200px;height:280px;margin:20px auto;cursor:pointer}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.flip-container.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:8px;border:2px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;flex-direction:column;padding:12px}
.flip-front{background:linear-gradient(135deg,#2a2418,#1a1610);font-size:3rem}
.flip-back{background:var(--panel);transform:rotateY(180deg);overflow-y:auto;text-align:center}
/* RADAR */
#radarCanvas{display:block;margin:0 auto;max-width:100%}
/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:12px}
.tab{flex:1;text-align:center;padding:10px;background:var(--panel);border:1px solid var(--border);border-radius:6px 6px 0 0;cursor:pointer;font-family:var(--font-title);font-size:.85rem;color:var(--text-dim)}
.tab.active{color:var(--gold);border-color:var(--gold);border-bottom-color:var(--panel)}
/* CHECKBOX */
.quest-check{display:flex;align-items:center;gap:10px;padding:8px;min-height:44px;cursor:pointer}
.quest-check input{width:20px;height:20px;accent-color:var(--gold)}
/* MODAL OVERLAY */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--panel);border:2px solid var(--gold);border-radius:12px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto;padding:20px;box-shadow:0 0 30px rgba(212,175,55,.2)}
.field-label{display:block;font-family:var(--font-title);color:var(--gold-dim);font-size:.8rem;margin:10px 0 3px;letter-spacing:.5px}
.field-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-family:var(--font-body);font-size:.95rem}
.field-input:focus{border-color:var(--gold);outline:none}
/* LEVEL UP */
@keyframes goldFlash{0%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(1.5)}}
.level-up-flash{position:fixed;top:0;left:0;right:0;bottom:0;z-index:300;display:flex;align-items:center;justify-content:center;pointer-events:none}
.level-up-flash h1{font-size:3rem;color:var(--gold);text-shadow:0 0 40px var(--gold);animation:goldFlash 2s forwards}
/* STREAK */
.streak-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.streak-count{font-family:var(--font-title);color:var(--gold);font-size:1.1rem;min-width:30px}
.streak-rank{font-size:.8rem;color:var(--text-dim);font-style:italic}
/* Toggle btn */
.toggle-btn{padding:8px 12px;border:1px solid var(--border);border-radius:4px;background:var(--panel);color:var(--text-dim);cursor:pointer;font-family:var(--font-body);min-height:44px}
.toggle-btn.on{border-color:var(--gold);color:var(--gold);background:#2e2a1a}
/* Deck stack */
.deck{width:140px;height:200px;background:linear-gradient(135deg,#2a2418,#1a1610);border:3px solid var(--gold-dim);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;box-shadow:4px 4px 0 #0a0a06,6px 6px 0 #05050300;margin:10px}
.deck:active{transform:translateY(2px);box-shadow:2px 2px 0 #0a0a06}
.deck .deck-icon{font-size:3rem}
.deck .deck-label{font-family:var(--font-title);color:var(--gold);font-size:.85rem;margin-top:8px}
/* Star rating */
.stars{color:var(--gold);letter-spacing:2px}
/* Responsive 2-col */
@media(min-width:768px){
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
#nav{left:auto;right:auto;width:100%;max-width:800px;margin:0 auto;left:50%;transform:translateX(-50%)}
}
/* Scrollbar */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* Loading */
#loading{display:flex;align-items:center;justify-content:center;height:100vh;font-family:var(--font-title);color:var(--gold);font-size:1.3rem}
</style>
</head>

<!-- BOTTOM NAV -->

<button data-screen="dashboard" class="active"><span class="nav-icon">⚔️</span>Dashboard</button>

</select>
</div>
<div id="armoryContent"></div>
</div>

</div><!-- /app -->

const STREAK_TYPES=['prayer','scripture','service','cleanLiving','exercise','custom'];
const STREAK_LABELS={prayer:'🙏 Prayer',scripture:'📖 Scripture',service:'🤝 Service',cleanLiving:'🛡️ Clean Living',exercise:'💪 Exercise',custom:'⭐ Custom'};

function getStreakRank(days){for(const[min,name]of STREAK_RANKS)if(days>=min)return name;return '—';}

// ============== STATE ==============
const SAVE_KEY='exchequer_save';
let S=null; // state

function loadState(){try{S=JSON.parse(localStorage.getItem(SAVE_KEY))}catch(e){S=null}}
function saveState(){localStorage.setItem(SAVE_KEY,JSON.stringify(S))}
function resetState(){localStorage.removeItem(SAVE_KEY);S=null;location.reload()}

function exportSave(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`exchequer-${S.character.name.replace(/\s+/g,'-').toLowerCase()}-${new Date().toISOString().slice(0,10)}.json`;
  a.click();URL.revokeObjectURL(a.href);
}

function importSave(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.character||!data.character.name){alert('Invalid save file.');return}
      if(!confirm(`Load save for "${data.character.name}" (Level ${data.character.level})? This will replace your current character.`))return;
      S=data;saveState();location.reload();
    }catch(err){alert('Could not read save file.')}
  };
  reader.readAsText(file);
  input.value='';
}

let currentScreen='dashboard';
function showScreen(name){
  currentScreen=name;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(name);if(el)el.classList.add('active');
  document.querySelectorAll('#nav button').forEach(b=>{b.classList.toggle('active',b.dataset.screen===name)});

function renderSZDots(){

function drawRadar(){
  const canvas=document.getElementById('radarCanvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height;
  const cx=W/2,cy=H/2,r=90;
  ctx.clearRect(0,0,W,H);
  const stats=S.character.stats;const n=7;
  const angles=Array.from({length:n},(_,i)=>((Math.PI*2*i)/n)-Math.PI/2);

  // Grid
  for(let ring=2;ring<=10;ring+=2){
    ctx.beginPath();
    angles.forEach((a,i)=>{const d=r*ring/10;const x=cx+Math.cos(a)*d;const y=cy+Math.sin(a)*d;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
    ctx.closePath();ctx.strokeStyle='rgba(58,48,32,.6)';ctx.stroke();
  }
  // Axes
  angles.forEach(a=>{ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);ctx.strokeStyle='rgba(58,48,32,.4)';ctx.stroke()});
  // Data
  ctx.beginPath();
  angles.forEach((a,i)=>{const d=r*stats[i]/10;const x=cx+Math.cos(a)*d;const y=cy+Math.sin(a)*d;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
  ctx.closePath();ctx.fillStyle='rgba(212,175,55,.15)';ctx.fill();ctx.strokeStyle='#d4af37';ctx.lineWidth=2;ctx.stroke();
  // Labels
  ctx.fillStyle='#d4c8a0';ctx.font='11px Cinzel,serif';ctx.textAlign='center';
  angles.forEach((a,i)=>{const d=r+18;const x=cx+Math.cos(a)*d;const y=cy+Math.sin(a)*d+4;ctx.fillText(STAT_NAMES[i],x,y)});
}

function renderLog(){
  const today=new Date().toISOString().slice(0,10);
  const boss=getAllMonsters()[S.loadout.bossIdx];
  const alreadyLogged=S.lastCheckIn===today;

  let dqChecks=S.loadout.dailyQuests.map(i=>{const q=QUESTS.Daily[i];return q?`<label class="quest-check"><input type="checkbox" data-logdq="${i}"> 📜 <strong>${q.name}</strong> <span style="color:var(--text-dim);font-size:.85rem">— ${q.desc}</span></label>`:''}).join('');
  let puToggles=S.loadout.powerups.map(i=>{const p=POWERUPS[i];return p?`<button class="toggle-btn" data-logpu="${i}">⚡ ${p.name}</button>`:''}).join(' ');
  let streakChecks=STREAK_TYPES.map(k=>`<label class="quest-check"><input type="checkbox" data-streak="${k}"> ${STREAK_LABELS[k]}</label>`).join('');

  document.getElementById('logContent').innerHTML=`<div class="panel">
    <h2 style="text-align:center">📋 Battle Log — ${today}</h2>
    ${alreadyLogged?'<p style="text-align:center;color:var(--gold);margin:8px">✅ Already logged today</p>':''}
    <h3 style="margin:12px 0">Daily Quests</h3>${dqChecks||'<p style="color:var(--text-dim)">No daily quests equipped</p>'}
    <h3 style="margin:12px 0">Power-Ups Used</h3><div style="display:flex;flex-wrap:wrap;gap:6px">${puToggles||'<p style="color:var(--text-dim)">No power-ups equipped</p>'}</div>
    <h3 style="margin:12px 0">Streaks Maintained</h3>${streakChecks}
    <h3 style="margin:12px 0">Monster Encounter</h3>
    <textarea id="logMonsterNote" placeholder="What happened with ${boss.name} today?"></textarea>
    <div style="text-align:center;margin-top:16px"><button class="btn btn-primary" onclick="submitLog()">⚔️ Log Day</button></div>
  </div>
  <div class="panel"><h3>📖 History</h3>${renderHistory()}</div>`;

  document.querySelectorAll('.toggle-btn[data-logpu]').forEach(btn=>{btn.onclick=()=>btn.classList.toggle('on')});
}

function renderHistory(){
  if(!S.history.length)return'<p style="color:var(--text-dim)">No entries yet.</p>';
  return S.history.slice(-10).reverse().map(h=>`<div style="padding:6px 0;border-bottom:1px solid var(--border)">
    <strong>${h.date}</strong> — +${h.xp} XP${h.note?' · <em>'+h.note.slice(0,60)+'</em>':''}</div>`).join('');
}

function submitLog(){
  const today=new Date().toISOString().slice(0,10);
  let xp=0;
  const completedDQ=Array.from(document.querySelectorAll('[data-logdq]:checked')).map(x=>+x.dataset.logdq);
  xp+=completedDQ.length*10;
  const usedPU=Array.from(document.querySelectorAll('.toggle-btn.on[data-logpu]')).map(x=>+x.dataset.logpu);
  xp+=usedPU.length*5;

  // Streaks
  const maintainedStreaks=Array.from(document.querySelectorAll('[data-streak]:checked')).map(x=>x.dataset.streak);
  STREAK_TYPES.forEach(k=>{
    if(maintainedStreaks.includes(k)){
      S.streaks[k]=(S.streaks[k]||0)+1;
      if(S.streaks[k]>=(S.streakBest[k]||0))S.streakBest[k]=S.streaks[k];
      // Milestone XP
      if([7,14,30,90].includes(S.streaks[k]))xp+=50;
    } else {
      S.streaks[k]=0;
    }
  });

  const note=document.getElementById('logMonsterNote').value;
  S.history.push({date:today,xp,completedDQ,usedPU,note,streaks:{...S.streaks}});
  S.lastCheckIn=today;
  addXP(xp);
  saveState();
  renderLog();
}

function addXP(amount){
  S.character.xp+=amount;
  const xpPerLevel=500;
  while(S.character.xp>=S.character.level*xpPerLevel){
    S.character.xp-=S.character.level*xpPerLevel;
    S.character.level++;
    showLevelUp();
  }
  saveState();
}

function showLevelUp(){
  const el=document.createElement('div');el.className='level-up-flash';
  el.innerHTML=`<h1>⚔️ LEVEL ${S.character.level}!</h1>`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2500);
  // Give +1 stat choice via prompt
  setTimeout(()=>{
    const choice=prompt('LEVEL UP! Choose a stat to increase (+1):\n'+STAT_NAMES.map((s,i)=>`${i+1}. ${s} [${S.character.stats[i]}]`).join('\n'));
    const idx=parseInt(choice)-1;
    if(idx>=0&&idx<7&&S.character.stats[idx]<10){S.character.stats[idx]++;saveState()}
  },500);
}

    <p><strong>Loot:</strong> ${m.loot}</p>
    <p style="margin-top:8px"><strong>Record:</strong> W:${rec.wins} / L:${rec.losses}</p>
    <div style="display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="S.loadout.bossIdx=${idx};saveState();this.closest('.modal-overlay').remove();renderBestiarum()">Set as Active Boss</button>
      <button class="btn btn-sm" onclick="recordMonster(${idx},'win');this.closest('.modal-overlay').remove();renderBestiarum()">✅ Win</button>
      <button class="btn btn-sm btn-danger" onclick="recordMonster(${idx},'loss');this.closest('.modal-overlay').remove();renderBestiarum()">❌ Loss</button>
      ${isCustom?`<button class="btn btn-sm" style="border-color:#8b2020;color:#c44" onclick="deleteCustomMonster(${customIdx})">🗑️ Delete</button>`:''}
      <button class="btn btn-sm" onclick="this.closest('.modal-overlay').remove()">Close</button>
    </div></div>`;
  document.body.appendChild(overlay);
}

function recordMonster(idx,result){
  if(!S.monsterRecord[idx])S.monsterRecord[idx]={wins:0,losses:0};
  if(result==='win')S.monsterRecord[idx].wins++;else S.monsterRecord[idx].losses++;
  saveState();
}

// ============== AVATAR UPLOAD ==============
function uploadAvatar(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    // Resize to 200x200 max to keep localStorage small
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const sz=Math.min(img.width,img.height);
      const sx=(img.width-sz)/2,sy=(img.height-sz)/2;
      canvas.width=200;canvas.height=200;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,sx,sy,sz,sz,0,0,200,200);
      S.character.avatar=canvas.toDataURL('image/jpeg',0.8);
      saveState();renderDashboard();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function saveCustomMonster(btn){
  const g=id=>document.getElementById(id).value.trim();
  const name=g('cm-name');if(!name){alert('Name your enemy.');return}
  const m={
    name,brood:g('cm-brood')||'Unknown',sin:g('cm-sin')||'unknown',
    icon:g('cm-icon')||'👹',stars:Math.max(1,Math.min(5,parseInt(g('cm-stars'))||3)),
    moves:(g('cm-moves')||'Unknown Attack').split(',').map(s=>s.trim()),
    weakness:g('cm-weakness')||'Unknown',flavor:g('cm-flavor')||'It lurks within.',
    insight:g('cm-insight')||'Face it.',loot:g('cm-loot')||'Self-knowledge',
    custom:true
  };
  if(!S.customMonsters)S.customMonsters=[];
  S.customMonsters.push(m);saveState();
  btn.closest('.modal-overlay').remove();
  renderBestiarum();
}

function deleteCustomMonster(customIdx){
  if(!confirm('Remove this monster from the Bestiarum?'))return;
  S.customMonsters.splice(customIdx,1);saveState();
  document.querySelector('.modal-overlay')?.remove();
  renderBestiarum();
}

// ============== ARMORY ==============
let armoryTab='quests';
function renderArmory(){
  const tier=document.getElementById('tierFilter').value;
  let html='';
  if(armoryTab==='quests'){
    Object.entries(QUESTS).forEach(([t,list])=>{
      if(tier!=='all'&&tier!==t)return;
      list.forEach((q,i)=>{
        const equipped=S.loadout.dailyQuests.includes(i)&&t==='Daily';
        html+=`<div class="card"><div class="card-title">📜 ${q.name}</div>
          <div style="color:var(--text-dim);font-size:.85rem">${t} · +${q.xp} XP · ${q.stat}</div>
          <p style="margin:6px 0">${q.desc}</p>
          ${t==='Daily'?`<button class="btn btn-sm" onclick="equipQuest(${i})">${equipped?'✅ Equipped':'Equip'}</button>`:''}</div>`;
      });
    });
  } else {
    POWERUPS.forEach((p,i)=>{
      const equipped=S.loadout.powerups.includes(i);
      html+=`<div class="card"><div class="card-title">⚡ ${p.name}</div>
        <div style="color:var(--text-dim);font-size:.85rem">+${p.xp} XP · ${p.stat}</div>
        <p style="margin:6px 0">${p.desc}</p>
        <button class="btn btn-sm" onclick="equipPowerup(${i})">${equipped?'✅ Equipped':'Equip'}</button></div>`;
    });
  }
  document.getElementById('armoryContent').innerHTML=html||'<p style="text-align:center;color:var(--text-dim)">Nothing here.</p>';
  document.querySelectorAll('.tabs .tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===armoryTab));
}

function equipQuest(idx){
  const arr=S.loadout.dailyQuests;
  const i=arr.indexOf(idx);
  if(i>=0)arr.splice(i,1);else if(arr.length<3)arr.push(idx);
  saveState();renderArmory();
}

function equipPowerup(idx){
  const arr=S.loadout.powerups;
  const i=arr.indexOf(idx);
  if(i>=0)arr.splice(i,1);else if(arr.length<3)arr.push(idx);
  saveState();renderArmory();
}

// ============== WEEKLY REVIEW ==============
function showWeeklyReview(){
  const last7=S.history.filter(h=>{const d=new Date(h.date);const ago=new Date();ago.setDate(ago.getDate()-7);return d>=ago});
  const totalXP=last7.reduce((s,h)=>s+h.xp,0);
  const overlay=document.createElement('div');overlay.className='modal-overlay';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
  overlay.innerHTML=`<div class="modal">
    <h2 style="text-align:center">📊 Weekly Review</h2>
    <p style="text-align:center;margin:8px">Last 7 days: <strong>${last7.length}</strong> logs · <strong>+${totalXP} XP</strong></p>
    <h3 style="margin:12px 0">🔥 Streak Status</h3>
    ${STREAK_TYPES.map(k=>`<div class="streak-item"><span>${STREAK_LABELS[k]}</span><span class="streak-count">${S.streaks[k]||0}</span><span class="streak-rank">${getStreakRank(S.streaks[k]||0)}</span></div>`).join('')}
    <div style="text-align:center;margin-top:16px"><button class="btn" onclick="this.closest('.modal-overlay').remove()">Close</button></div></div>`;
  document.body.appendChild(overlay);
}

init();
