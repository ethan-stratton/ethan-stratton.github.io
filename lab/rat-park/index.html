<script>
document.fonts.ready.then(() => { init(); });

function init() {

const SCALE = 3;
const W = 320, H = 240;
const canvas = document.getElementById('c');
const ctxMain = canvas.getContext('2d');
canvas.width = W * SCALE; canvas.height = H * SCALE;
ctxMain.imageSmoothingEnabled = false;

const buf = document.createElement('canvas');
buf.width = W; buf.height = H;
const bx = buf.getContext('2d');

// ══════════════════════════════════
//  AUDIO ENGINE (synthesized)
// ══════════════════════════════════
let audioCtx = null, audioStarted = false;
const aud = { masterGain:null, ambientNoise:null, ambientGain:null, musicOscs:[], musicGains:[], bassOsc:null, bassGain:null, drugOsc:null, drugGain:null, drugOsc2:null, lastStepTime:0 };

function initAudio() {
  if (audioStarted) return; audioStarted = true;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  aud.masterGain = audioCtx.createGain(); aud.masterGain.gain.value = 0.5; aud.masterGain.connect(audioCtx.destination);

  // Brown noise
  const nLen = audioCtx.sampleRate * 2, nBuf = audioCtx.createBuffer(1, nLen, audioCtx.sampleRate), nD = nBuf.getChannelData(0);
  let ln = 0; for (let i = 0; i < nLen; i++) { ln = (ln + 0.02 * (Math.random()*2-1)) / 1.02; nD[i] = ln * 3.5; }
  aud.ambientNoise = audioCtx.createBufferSource(); aud.ambientNoise.buffer = nBuf; aud.ambientNoise.loop = true;
  aud.ambientGain = audioCtx.createGain(); aud.ambientGain.gain.value = 0.08;
  const nLPF = audioCtx.createBiquadFilter(); nLPF.type = 'lowpass'; nLPF.frequency.value = 300;
  aud.ambientNoise.connect(nLPF); nLPF.connect(aud.ambientGain); aud.ambientGain.connect(aud.masterGain); aud.ambientNoise.start();

  // Bass drone
  aud.bassOsc = audioCtx.createOscillator(); aud.bassOsc.type = 'sine'; aud.bassOsc.frequency.value = 65.41;
  aud.bassGain = audioCtx.createGain(); aud.bassGain.gain.value = 0;
  const bF = audioCtx.createBiquadFilter(); bF.type = 'lowpass'; bF.frequency.value = 200;
  aud.bassOsc.connect(bF); bF.connect(aud.bassGain); aud.bassGain.connect(aud.masterGain); aud.bassOsc.start();

  // Music layers
  const types = ['triangle','sine','triangle'];
  for (let i = 0; i < 3; i++) {
    const o = audioCtx.createOscillator(); o.type = types[i]; o.frequency.value = 130;
    const g = audioCtx.createGain(); g.gain.value = 0;
    const f = audioCtx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 800 + i*400;
    o.connect(f); f.connect(g); g.connect(aud.masterGain); o.start();
    aud.musicOscs.push(o); aud.musicGains.push(g);
  }

  // Drug drone
  aud.drugOsc = audioCtx.createOscillator(); aud.drugOsc.type = 'sawtooth'; aud.drugOsc.frequency.value = 55;
  aud.drugOsc2 = audioCtx.createOscillator(); aud.drugOsc2.type = 'sawtooth'; aud.drugOsc2.frequency.value = 55.8;
  aud.drugGain = audioCtx.createGain(); aud.drugGain.gain.value = 0;
  const dF = audioCtx.createBiquadFilter(); dF.type = 'lowpass'; dF.frequency.value = 180;
  aud.drugOsc.connect(dF); aud.drugOsc2.connect(dF); dF.connect(aud.drugGain); aud.drugGain.connect(aud.masterGain);
  aud.drugOsc.start(); aud.drugOsc2.start();
}

function sfx(type, speaker) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  if (type === 'step') {
    if (t - aud.lastStepTime < 0.18) return; aud.lastStepTime = t;
    const len = Math.floor(audioCtx.sampleRate * 0.04), b = audioCtx.createBuffer(1, len, audioCtx.sampleRate), d = b.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * (1-i/len)**2 * 0.3;
    const s = audioCtx.createBufferSource(); s.buffer = b;
    const hp = audioCtx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 2000+Math.random()*2000;
    const g = audioCtx.createGain(); g.gain.value = 0.15;
    s.connect(hp); hp.connect(g); g.connect(aud.masterGain); s.start();
  } else if (type === 'blip') {
    const pMap = { Hazel: 420, Bruno: 180, Pip: 550 };
    const freq = (pMap[speaker] || 300) + (Math.random()-0.5)*40;
    const o = audioCtx.createOscillator(); o.type = 'square'; o.frequency.value = freq;
    const g = audioCtx.createGain(); g.gain.value = 0.06; g.gain.setTargetAtTime(0, t+0.04, 0.02);
    o.connect(g); g.connect(aud.masterGain); o.start(); o.stop(t+0.08);
  } else if (type === 'socialUp') {
    [261.63,329.63,392].forEach((f,i) => {
      const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
      const g = audioCtx.createGain(); g.gain.value = 0; g.gain.setValueAtTime(0.08, t+i*0.1); g.gain.setTargetAtTime(0, t+i*0.1+0.12, 0.06);
      o.connect(g); g.connect(aud.masterGain); o.start(t+i*0.1); o.stop(t+i*0.1+0.3);
    });
  } else if (type === 'socialDown') {
    [293.66,233.08,174.61].forEach((f,i) => {
      const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
      const g = audioCtx.createGain(); g.gain.value = 0; g.gain.setValueAtTime(0.07, t+i*0.15); g.gain.setTargetAtTime(0, t+i*0.15+0.15, 0.08);
      o.connect(g); g.connect(aud.masterGain); o.start(t+i*0.15); o.stop(t+i*0.15+0.4);
    });
  } else if (type === 'drugDrink') {
    const o1 = audioCtx.createOscillator(), o2 = audioCtx.createOscillator();
    o1.type = o2.type = 'sine'; o1.frequency.value = 440; o2.frequency.value = 443;
    o1.frequency.setTargetAtTime(220, t+0.5, 0.3); o2.frequency.setTargetAtTime(218, t+0.5, 0.3);
    const g = audioCtx.createGain(); g.gain.value = 0.12; g.gain.setTargetAtTime(0, t+0.8, 0.2);
    o1.connect(g); o2.connect(g); g.connect(aud.masterGain); o1.start(); o2.start(); o1.stop(t+1.2); o2.stop(t+1.2);
  } else if (type === 'eat') {
    // Crunchy eating sound
    for (let i = 0; i < 3; i++) {
      const len = Math.floor(audioCtx.sampleRate * 0.03), b = audioCtx.createBuffer(1, len, audioCtx.sampleRate), d = b.getChannelData(0);
      for (let j = 0; j < len; j++) d[j] = (Math.random()*2-1) * (1-j/len) * 0.2;
      const s = audioCtx.createBufferSource(); s.buffer = b;
      const g = audioCtx.createGain(); g.gain.value = 0.12;
      const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1200 + Math.random()*800;
      s.connect(bp); bp.connect(g); g.connect(aud.masterGain); s.start(t + i*0.12);
    }
  } else if (type === 'wrestleHit') {
    const o = audioCtx.createOscillator(); o.type = 'square'; o.frequency.value = 200 + Math.random()*100;
    o.frequency.setTargetAtTime(100, t+0.03, 0.02);
    const g = audioCtx.createGain(); g.gain.value = 0.1; g.gain.setTargetAtTime(0, t+0.05, 0.02);
    o.connect(g); g.connect(aud.masterGain); o.start(); o.stop(t+0.1);
  } else if (type === 'wrestleWin') {
    [392, 523.25, 659.25].forEach((f,i) => {
      const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
      const g = audioCtx.createGain(); g.gain.value = 0; g.gain.setValueAtTime(0.1, t+i*0.08); g.gain.setTargetAtTime(0, t+i*0.08+0.15, 0.05);
      o.connect(g); g.connect(aud.masterGain); o.start(t+i*0.08); o.stop(t+i*0.08+0.3);
    });
  } else if (type === 'build') {
    const o = audioCtx.createOscillator(); o.type = 'triangle'; o.frequency.value = 300 + Math.random()*200;
    const g = audioCtx.createGain(); g.gain.value = 0.06; g.gain.setTargetAtTime(0, t+0.1, 0.04);
    o.connect(g); g.connect(aud.masterGain); o.start(); o.stop(t+0.2);
  } else if (type === 'drip') {
    const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = 1800;
    o.frequency.exponentialRampToValueAtTime(600, t+0.06);
    const g = audioCtx.createGain(); g.gain.value = 0.07; g.gain.setTargetAtTime(0, t+0.04, 0.02);
    o.connect(g); g.connect(aud.masterGain); o.start(); o.stop(t+0.12);
  } else if (type === 'squeak') {
    const o = audioCtx.createOscillator(); o.type = 'sine'; o.frequency.value = 800+Math.random()*400;
    o.frequency.setTargetAtTime(1200+Math.random()*300, t+0.05, 0.03);
    const g = audioCtx.createGain(); g.gain.value = 0.04; g.gain.setTargetAtTime(0, t+0.08, 0.03);
    o.connect(g); g.connect(aud.masterGain); o.start(); o.stop(t+0.15);
  }
}

function updateAudio(social, drugDist) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  aud.ambientGain.gain.setTargetAtTime(0.05 + (1-social)*0.06, t, 0.5);
  aud.bassGain.gain.setTargetAtTime(0.03 + social*0.06, t, 0.5);
  const notes = [130.81, 155.56, 174.61, 196, 233.08, 261.63];
  const thr = [0.3, 0.5, 0.7];
  for (let i = 0; i < 3; i++) {
    aud.musicGains[i].gain.setTargetAtTime(Math.max(0, Math.min(0.06, (social-thr[i])/0.2*0.06)), t, 0.8);
    aud.musicOscs[i].frequency.setTargetAtTime(notes[Math.floor((state.time*0.15+i*1.7) % notes.length)], t, 2);
  }
  const dp = Math.max(0, 1 - drugDist/200);
  aud.drugGain.gain.setTargetAtTime(dp * (1-social) * 0.08, t, 0.3);
}

// ══════════════════════════════════
//  SPRITE SYSTEM
// ══════════════════════════════════
const spriteCache = {};
function defineSprite(name, w, h, pixels) {
  const c = document.createElement('canvas'); c.width = w; c.height = h;
  const cx = c.getContext('2d');
  for (const [x, y, col] of pixels) { cx.fillStyle = col; cx.fillRect(x, y, 1, 1); }
  spriteCache[name] = c;
}
function drawSprite(name, x, y, flipX) {
  const s = spriteCache[name]; if (!s) return;
  if (flipX) { bx.save(); bx.translate(Math.floor(x+s.width), Math.floor(y)); bx.scale(-1,1); bx.drawImage(s,0,0); bx.restore(); }
  else bx.drawImage(s, Math.floor(x), Math.floor(y));
}

// ══════════════════════════════════
//  ENVIRONMENT DRAWING
// ══════════════════════════════════
function drawWheel(x, y, time) {
  const cx = x+10, cy = y+10;
  bx.strokeStyle = '#8878a0'; bx.lineWidth = 2;
  bx.beginPath(); bx.arc(cx, cy, 9, 0, Math.PI*2); bx.stroke();
  bx.strokeStyle = '#685870'; bx.lineWidth = 1;
  bx.beginPath(); bx.arc(cx, cy, 5, 0, Math.PI*2); bx.stroke();
  bx.strokeStyle = '#786890'; bx.lineWidth = 1;
  for (let i = 0; i < 6; i++) { const a = i*Math.PI/3+time*0.8; bx.beginPath(); bx.moveTo(cx+Math.cos(a)*5,cy+Math.sin(a)*5); bx.lineTo(cx+Math.cos(a)*9,cy+Math.sin(a)*9); bx.stroke(); }
  bx.strokeStyle = '#585060'; bx.lineWidth = 1.5;
  bx.beginPath(); bx.moveTo(cx,cy+9); bx.lineTo(cx-4,cy+14); bx.moveTo(cx,cy+9); bx.lineTo(cx+4,cy+14); bx.stroke();
}
function drawBottle(x, y, isClean) {
  bx.fillStyle = isClean ? 'rgba(100,160,255,0.5)' : 'rgba(100,255,130,0.5)';
  bx.fillRect(x+3, y, 6, 18);
  bx.fillStyle = '#888'; bx.fillRect(x+2, y-2, 8, 3);
  bx.fillStyle = isClean ? 'rgba(80,130,255,0.6)' : 'rgba(80,255,110,0.6)';
  bx.fillRect(x+4, y+4, 4, 12);
  bx.fillStyle = '#aaa'; bx.fillRect(x+5, y+18, 2, 3);
}
function drawNest(x, y, level) {
  // Nest grows with level (0-3)
  const sizes = [[12,4],[16,6],[20,7],[24,8]];
  const [rw, rh] = sizes[Math.min(level, 3)];
  bx.fillStyle = '#a09070'; bx.beginPath(); bx.ellipse(x+16, y+6, rw, rh, 0, 0, Math.PI*2); bx.fill();
  bx.fillStyle = '#b8a080'; bx.beginPath(); bx.ellipse(x+16, y+4, rw-3, rh-2, 0, 0, Math.PI*2); bx.fill();
  if (level >= 2) { bx.fillStyle = '#c8b890'; bx.fillRect(x+4, y+1, 4, 1); bx.fillRect(x+22, y+2, 3, 1); }
  if (level >= 3) { bx.fillStyle = '#d8c8a0'; bx.fillRect(x+8, y, 5, 1); bx.fillRect(x+20, y+1, 4, 1); bx.fillRect(x+14, y-1, 3, 1); }
}
function drawTunnel(x, y) {
  bx.fillStyle = '#8a7050'; bx.fillRect(x, y, 36, 18);
  bx.fillStyle = '#6a5030'; bx.fillRect(x, y, 36, 1); bx.fillRect(x, y+17, 36, 1);
  bx.fillStyle = '#1a1218';
  bx.beginPath(); bx.ellipse(x+2, y+9, 3, 7, 0, 0, Math.PI*2); bx.fill();
  bx.beginPath(); bx.ellipse(x+34, y+9, 3, 7, 0, 0, Math.PI*2); bx.fill();
  bx.strokeStyle = '#7a6040'; bx.lineWidth = 0.5;
  for (let i = 4; i < 34; i += 3) { bx.beginPath(); bx.moveTo(x+i, y+1); bx.lineTo(x+i, y+17); bx.stroke(); }
}
// Food pellet
function drawFood(x, y) {
  bx.fillStyle = '#b09060'; bx.fillRect(x, y, 4, 3);
  bx.fillStyle = '#c8a878'; bx.fillRect(x, y, 4, 1);
}
// Nest material pickup
function drawMaterial(x, y, type) {
  if (type === 'paper') { bx.fillStyle = '#d8d0c0'; bx.fillRect(x, y, 6, 3); bx.fillStyle = '#c8c0b0'; bx.fillRect(x+1, y+1, 4, 1); }
  else if (type === 'fluff') { bx.fillStyle = '#e8e0d8'; bx.fillRect(x+1, y, 3, 2); bx.fillRect(x, y+1, 5, 1); }
  else if (type === 'cloth') { bx.fillStyle = '#9888b0'; bx.fillRect(x, y, 5, 4); bx.fillStyle = '#a898c0'; bx.fillRect(x+1, y+1, 3, 2); }
}

const MOOD = {
  connected: { bg:'#2a1a3a', cage:'#6a5a7a', floor:'#3a2a4a', floorLight:'#4a3a5a', bars:'#7a6a8a' },
  neutral:   { bg:'#1a1a22', cage:'#3a3a44', floor:'#2a2a32', floorLight:'#323238', bars:'#4a4a54' },
  isolated:  { bg:'#111114', cage:'#222228', floor:'#1a1a1e', floorLight:'#202024', bars:'#2a2a30' }
};
function lerpColor(a, b, t) {
  const p = c => { const h = parseInt(c.slice(1),16); return [h>>16,(h>>8)&0xff,h&0xff]; };
  const [ar,ag,ab] = p(a), [br,bg,bb] = p(b);
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}
function getMood() {
  const s = state.social;
  const bl = k => s > 0.6 ? lerpColor(MOOD.neutral[k], MOOD.connected[k], (s-0.6)/0.4) : lerpColor(MOOD.isolated[k], MOOD.neutral[k], s/0.6);
  return { bg:bl('bg'), cage:bl('cage'), floor:bl('floor'), floorLight:bl('floorLight'), bars:bl('bars') };
}

// ══════════════════════════════════
//  DIALOG SYSTEM
// ══════════════════════════════════
function setDialogText(text) {
  state.dialogFullText = text; state.dialogCharIdx = 0; state.dialogText = ''; state.dialogTimer = 0;
}

function showDialog(speaker, lines, callback) {
  state.dialogActive = true;
  state.dialogSpeaker = speaker;
  state.dialogQueue = lines.length > 1 ? lines.slice(1) : [];
  setDialogText(lines[0]);
  state.dialogCallback = callback || null;
}

function handleInteract() {
  // Wrestling minigame input
  if (state.activity === 'wrestling') {
    state.activityData.playerPush += 8;
    sfx('wrestleHit');
    return;
  }

  if (state.dialogActive) {
    if (state.dialogCharIdx < state.dialogFullText.length) {
      state.dialogCharIdx = state.dialogFullText.length;
      state.dialogText = state.dialogFullText;
      return;
    }
    if (state.dialogQueue.length > 0) {
      setDialogText(state.dialogQueue.shift());
    } else {
      state.dialogActive = false;
      if (state.dialogCallback) { state.dialogCallback(); state.dialogCallback = null; }
    }
    return;
  }

  if (state.activity) return; // busy with activity

  // Carrying food? Check if near NPC to share
  if (state.carrying === 'food') {
    for (const npc of npcs) {
      if (Math.abs(player.x - npc.x) < 26) {
        startEating(npc);
        return;
      }
    }
  }

  // Carrying material? Check if near nest
  if (state.carrying && state.carrying !== 'food') {
    const nest = objects.find(o => o.type === 'nest');
    if (Math.abs(player.x - (nest.x + 16)) < 28) {
      // Add material to nest
      nestLevel = Math.min(3, nestLevel + 1);
      state.carrying = null;
      sfx('build');
      showDialog('', ["You add the " + state.carrying + "\nto the nest. It's cozier\nnow."], null);
      // Actually we lost the name... fix:
      return;
    }
  }

  // NPCs
  for (const npc of npcs) {
    if (Math.abs(player.x - npc.x) < 26) {
      talkToNpc(npc);
      return;
    }
  }

  // Objects
  for (const obj of objects) {
    const dist = Math.abs(player.x - (obj.x + (obj.w || 10)/2));
    if (dist < 24) {
      interactObject(obj);
      return;
    }
  }
}

function talkToNpc(npc) {
  const tier = Math.min(npc.visitCount, npc.dialogs.length - 1);
  const lines = [...npc.dialogs[tier]];

  // Check if special action is available, offer it after dialog
  const hasSpecial = npc.specialAction && npc.visitCount >= (npc.specialAction === 'sit' ? 3 : 1);

  const bonus = npc.socialBonus[Math.min(tier, npc.socialBonus.length - 1)];

  // After main dialog, offer activity if unlocked
  if (hasSpecial && npc.visitCount > 0) {
    if (npc.specialAction === 'wrestle') {
      lines.push("[E to wrestle!]");
    } else if (npc.specialAction === 'build' && nestLevel < 3) {
      lines.push("[Find materials and\nbring them to the nest!]");
    } else if (npc.specialAction === 'sit') {
      lines.push("[Sit together quietly...]");
    }
  }

  showDialog(npc.name, lines, () => {
    npc.visitCount++;
    state.social = Math.min(1, state.social + bonus);
    sfx('socialUp');

    // Auto-start special activity
    if (hasSpecial && npc.visitCount > 1) {
      if (npc.specialAction === 'wrestle') startWrestling(npc);
      else if (npc.specialAction === 'sit') startSitting(npc);
    }
  });
}

function interactObject(obj) {
  if (obj.type === 'food' && !obj.taken) {
    obj.taken = true;
    obj.respawnTimer = 15; // seconds
    state.carrying = 'food';
    showDialog('', ["You picked up some food.\nShare it with someone!"], null);
    return;
  }

  if (obj.type === 'material' && !obj.taken && !state.carrying) {
    obj.taken = true;
    state.carrying = obj.matType;
    showDialog('', ["You found some " + obj.matType + "!\nBring it to the nest."], null);
    return;
  }

  if (obj.type === 'wheel') {
    showDialog('', ["*squeak squeak squeak*\n...that was kind of fun."], () => { state.social = Math.min(1, state.social + 0.03); sfx('squeak'); });
  } else if (obj.type === 'bottle') {
    showDialog('', ["Clean water. Refreshing."], null);
  } else if (obj.type === 'nest') {
    if (state.carrying && state.carrying !== 'food') {
      const mat = state.carrying;
      nestLevel = Math.min(3, nestLevel + 1);
      state.carrying = null;
      sfx('build');
      showDialog('', ["You add the " + mat + " to\nthe nest. It's getting\ncozier."], () => {
        state.social = Math.min(1, state.social + 0.05);
      });
    } else {
      const nestTexts = [
        "A bare spot. Needs\nsome bedding.",
        "Getting there. Still\ncould use more.",
        "Soft and warm. Almost\nperfect.",
        "A proper home. You\nbuilt this together."
      ];
      showDialog('', [nestTexts[nestLevel]], null);
    }
  } else if (obj.type === 'tunnel') {
    showDialog('', ["You scurry through the\ntube. Safe in here."], () => { state.social = Math.min(1, state.social + 0.02); });
  } else if (obj.type === 'drug') {
    if (state.social > 0.5) {
      showDialog('', ["The water glows faintly.\nYou think about your\nfriends. ...you walk away."], null);
    } else {
      showDialog('', ["It smells sweet. Warm.\nIt promises quiet.", "Everything else is so\nloud and hard...", "...maybe just a sip."], () => {
        state.social = Math.max(0, state.social - 0.2);
        sfx('socialDown'); sfx('drugDrink');
      });
    }
  }
}

// ── Eating together ──
function startEating(npc) {

  state.activity = 'eating';
  state.activityTimer = 0;
  state.activityData = { npc, phase: 0 }; // phase: 0=sit, 1=eat, 2=done

}

function updateEating(dt) {
  const d = state.activityData;
  state.activityTimer += dt;

  if (d.phase === 0 && state.activityTimer > 0.5) {
    d.phase = 1; state.activityTimer = 0;
    sfx('eat');
  }
  if (d.phase === 1 && state.activityTimer > 1.5) {
    d.phase = 2; state.activityTimer = 0;
    // Happiness boost
    d.npc.happiness = Math.min(10, d.npc.happiness + 2);
    state.social = Math.min(1, state.social + 0.08);
    sfx('socialUp');
    player.sprOverride = null;
    state.activity = null;

    // React dialog
    const reacts = {
      'Hazel': "Mmm! Thank you so much!\nYou're so thoughtful.",
      'Bruno': "...thanks.\nI forget to eat sometimes.",
      'Pip': "YUMMM!! you're the\nbest!!! more more more!!"
    };
    showDialog(d.npc.name, [reacts[d.npc.name] || "Thank you!"], null);
  }
}

// ── Wrestling with Pip ──
function startWrestling(npc) {
  state.activity = 'wrestling';
  state.activityTimer = 0;
  state.activityData = {
    npc,
    bar: 50,           // 0-100, 50 = center. <20 = Pip wins, >80 = you win
    playerPush: 0,     // accumulated push from mashing
    pipStrength: 3 + npc.friendship * 0.5,  // gets harder as friendship grows
    done: false,
    result: null
  };
}

function updateWrestling(dt) {
  const d = state.activityData;
  state.activityTimer += dt;

  if (d.done) {
    if (state.activityTimer > 2) {
      state.activity = null;
      d.npc.friendship = Math.min(10, d.npc.friendship + 1);
      state.social = Math.min(1, state.social + 0.06);
      sfx('socialUp');
    }
    return;
  }

  // Player push decays
  d.bar += d.playerPush * dt * 3;
  d.playerPush *= 0.85;

  // Pip pushes back (rhythmic bursts)
  const pipPush = d.pipStrength * (1 + Math.sin(state.time * 4) * 0.5);
  d.bar -= pipPush * dt * 2;

  d.bar = Math.max(0, Math.min(100, d.bar));

  // Check win/lose
  if (d.bar >= 85) {
    d.done = true; d.result = 'win'; state.activityTimer = 0;
    sfx('wrestleWin');
    showDialog('Pip', ["aaagh! you got me!!\nbest two out of three??"], null);
  } else if (d.bar <= 15) {
    d.done = true; d.result = 'lose'; state.activityTimer = 0;
    sfx('wrestleHit');
    showDialog('Pip', ["hehehe!! i'm too\nstrong for you!!", "...again?? please??"], null);
  }

  // Timeout after 8 seconds = draw
  if (!d.done && state.activityTimer > 8) {
    d.done = true; d.result = 'draw'; state.activityTimer = 0;
    showDialog('Pip', ["wow we're even!!\nthat was SO fun!!"], null);
  }
}

function drawWrestling() {
  const d = state.activityData;
  if (!d) return;

  // Tug-of-war bar at top
  const barX = 60, barY = 50, barW = 200, barH = 10;
  bx.fillStyle = 'rgba(0,0,0,0.7)';
  bx.fillRect(barX - 4, barY - 16, barW + 8, barH + 24);

  // Labels
  bx.font = '6px "Press Start 2P"';
  bx.fillStyle = '#b89cff';
  bx.fillText('MASH [E]!', barX, barY - 6);
  bx.fillStyle = '#c8b880';
  const pipW = bx.measureText('Pip').width;
  bx.fillText('Pip', barX + barW - pipW, barY - 6);

  // Bar background
  bx.fillStyle = '#222';
  bx.fillRect(barX, barY, barW, barH);

  // Player side (left = losing, right = winning)
  const pos = (d.bar / 100) * barW;
  bx.fillStyle = '#b89cff';
  bx.fillRect(barX, barY, pos, barH);
  bx.fillStyle = '#c8b880';
  bx.fillRect(barX + pos, barY, barW - pos, barH);

  // Center marker
  bx.fillStyle = '#fff';
  bx.fillRect(barX + barW/2 - 1, barY - 2, 2, barH + 4);

  // Cursor
  bx.fillStyle = '#fff';
  bx.fillRect(barX + pos - 2, barY - 3, 4, barH + 6);
}

function updateSitting(dt) {

function drawSitting() {
  // Peaceful dots floating up
  const d = state.activityData;
  if (!d) return;
  const t = state.activityTimer;
  bx.fillStyle = 'rgba(184,156,255,0.2)';
  for (let i = 0; i < 5; i++) {
    const px = player.x - state.camera.x + Math.sin(t * 0.8 + i) * 15;
    const py = player.y - 20 - ((t * 8 + i * 7) % 30);
    bx.beginPath();
    bx.arc(px, py, 1 + Math.sin(t + i) * 0.5, 0, Math.PI * 2);
    bx.fill();
  }

// ══════════════════════════════════
//  UPDATE
// ══════════════════════════════════
function update(dt) {
  state.time += dt;

  // Typewriter
  if (state.dialogActive && state.dialogCharIdx < state.dialogFullText.length) {
    state.dialogTimer += dt;
    while (state.dialogTimer > 0.03 && state.dialogCharIdx < state.dialogFullText.length) {
      state.dialogTimer -= 0.03;
      state.dialogCharIdx++;
      state.dialogText = state.dialogFullText.slice(0, state.dialogCharIdx);
      const ch = state.dialogFullText[state.dialogCharIdx - 1];
      if (ch !== ' ' && ch !== '\n' && state.dialogCharIdx % 2 === 0) sfx('blip', state.dialogSpeaker);
    }
  }

  // Activity updates
  if (state.activity === 'eating') { updateEating(dt); return; }
  if (state.activity === 'wrestling') { updateWrestling(dt); }
  if (state.activity === 'sitting') { updateSitting(dt); return; }

  // Food respawn
  for (const obj of objects) {
    if (obj.type === 'food' && obj.taken) {
      obj.respawnTimer -= dt;
      if (obj.respawnTimer <= 0) { obj.taken = false; }
    }
  }

  if (!state.dialogActive && state.activity !== 'wrestling') {
    let move = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) move = -1;
    if (keys['ArrowRight'] || keys['KeyD']) move = 1;

    const speedMult = 0.6 + state.social * 0.4;
    player.vx = move * player.speed * speedMult;
    player.x += player.vx;
    player.x = Math.max(16, Math.min(WORLD_W - 16, player.x));

    if (move !== 0) {
      player.facing = move;
      player.frameTimer += dt;
      if (player.frameTimer > 0.15) { player.frame = 1 - player.frame; player.frameTimer = 0; sfx('step'); }
    } else { player.frame = 0; }

    // Drug drift
    if (state.social < 0.25 && move === 0) {
      player.x += Math.sign(590 - player.x) * (1 - state.social / 0.25) * 0.2;
    }
  }

  // Camera
  const target = player.x - W / 2;
  state.camera.x += (target - state.camera.x) * 0.06;
  state.camera.x = Math.max(0, Math.min(WORLD_W - W, state.camera.x));

  // Audio
  updateAudio(state.social, Math.abs(player.x - 590));
  if (audioStarted && Math.random() < 0.002) sfx('drip');
  if (audioStarted && Math.abs(player.x - 270) < 80 && Math.random() < 0.005) sfx('squeak');
}

// ══════════════════════════════════
//  DRAW
// ══════════════════════════════════
function draw() {
  const m = getMood();
  const cam = state.camera.x;

  bx.fillStyle = m.bg; bx.fillRect(0, 0, W, H);

  // Cage bars
  bx.strokeStyle = m.bars; bx.lineWidth = 3;
  for (let x = 15; x < WORLD_W; x += 25) {
    const sx = Math.floor(x - cam);
    if (sx > -4 && sx < W + 4) { bx.beginPath(); bx.moveTo(sx, CAGE_TOP); bx.lineTo(sx, FLOOR_Y + 4); bx.stroke(); }
  }
  bx.fillStyle = m.cage; bx.fillRect(0, CAGE_TOP - 3, W, 6);

  // Floor
  bx.fillStyle = m.floor; bx.fillRect(0, FLOOR_Y, W, H - FLOOR_Y);
  bx.fillStyle = m.floorLight;
  for (let i = 0; i < 80; i++) {
    const fx = Math.floor(((i*43+17)%WORLD_W)-cam);
    if (fx > -4 && fx < W+4) bx.fillRect(fx, FLOOR_Y+3+(i*11)%30, 2+(i%4), 1);
  }

  // Objects
  for (const obj of objects) {
    const ox = Math.floor(obj.x - cam);
    if (ox < -40 || ox > W + 40) continue;

    if (obj.type === 'wheel') drawWheel(ox, obj.y, state.time);
    else if (obj.type === 'bottle') drawBottle(ox, obj.y, true);
    else if (obj.type === 'nest') drawNest(ox, obj.y, nestLevel);
    else if (obj.type === 'tunnel') drawTunnel(ox, obj.y);
    else if (obj.type === 'food' && !obj.taken) drawFood(ox, obj.y);
    else if (obj.type === 'material' && !obj.taken) drawMaterial(ox, obj.y, obj.matType);
    else if (obj.type === 'drug') {
      const pull = 1 - state.social;
      const glow = 0.15 + pull*0.5 + Math.sin(state.time*2.5)*pull*0.1;
      const grad = bx.createRadialGradient(ox+6, obj.y+10, 2, ox+6, obj.y+10, 25+pull*20);
      grad.addColorStop(0, `rgba(100,255,120,${glow*0.5})`); grad.addColorStop(1, 'rgba(100,255,120,0)');
      bx.fillStyle = grad; bx.fillRect(ox-30, obj.y-30, 72, 72);
      drawBottle(ox, obj.y, false);
    }
  }

  // NPCs
  for (const npc of npcs) {
    const nx = Math.floor(npc.x - cam);
    if (nx < -20 || nx > W + 20) continue;
    const flip = npc.facing < 0;

    // Eating animation
    let spr = npc.sprite;
    if (state.activity === 'eating' && state.activityData.npc === npc && state.activityData.phase === 1) {
      spr = npc.eatSprite;
    }
    drawSprite(spr, nx - 8, npc.y - 14, flip);

    // Name + happiness hearts
    bx.font = '6px "Press Start 2P"';
    bx.fillStyle = 'rgba(200,200,200,0.4)';
    const tw = bx.measureText(npc.name).width;
    bx.fillText(npc.name, nx - tw/2 + 4, npc.y - 18);

    // Tiny happiness indicator (small hearts)
    const hearts = Math.floor(npc.happiness / 2);
    bx.fillStyle = 'rgba(255,120,150,0.5)';
    bx.font = '4px "Press Start 2P"';
    for (let i = 0; i < hearts; i++) {
      bx.fillText('♥', nx - hearts * 3 + i * 6, npc.y - 24);
    }
  }

  // Player
  const px = Math.floor(player.x - cam);
  let sprName = player.sprOverride || (player.frame === 0 ? 'player_idle' : 'player_walk');
  drawSprite(sprName, px - 8, player.y - 14, player.facing < 0);

  // Carrying indicator
  if (state.carrying) {
    bx.fillStyle = '#e0d0f0';
    bx.font = '5px "Press Start 2P"';
    const carryText = state.carrying === 'food' ? '🍖' : '📦';
    bx.fillText(carryText, px - 2, player.y - 20);
  }

  // Activity overlays
  if (state.activity === 'wrestling') drawWrestling();
  if (state.activity === 'sitting') drawSitting();

  // Interact prompt
  if (!state.dialogActive && !state.activity) {
    let prompt = null;

    if (state.carrying === 'food') {
      for (const npc of npcs) {
        if (Math.abs(player.x - npc.x) < 26) {
          prompt = { text: '[E] Share food', x: Math.floor(npc.x - cam), y: npc.y - 32 };
          break;
        }
      }
    }

    if (state.carrying && state.carrying !== 'food') {
      const nest = objects.find(o => o.type === 'nest');
      if (Math.abs(player.x - (nest.x + 16)) < 28) {
        prompt = { text: '[E] Add to nest', x: Math.floor(nest.x + 16 - cam), y: FLOOR_Y - 34 };
      }
    }

    if (!prompt) {
      for (const npc of npcs) {
        if (Math.abs(player.x - npc.x) < 26) {
          prompt = { text: '[E] Talk', x: Math.floor(npc.x - cam), y: npc.y - 28 };
          break;
        }
      }
    }

    if (!prompt) {
      const labels = { wheel:'[E] Use', bottle:'[E] Drink', nest:'[E] Inspect', tunnel:'[E] Enter', drug:'[E] ...', food:'[E] Pick up', material:'[E] Pick up' };
      for (const obj of objects) {
        if ((obj.type === 'food' || obj.type === 'material') && obj.taken) continue;
        const dist = Math.abs(player.x - (obj.x + 5));
        if (dist < 24) {
          prompt = { text: labels[obj.type], x: Math.floor(obj.x + 5 - cam), y: FLOOR_Y - 34 };
          break;
        }
      }
    }

    if (prompt) {
      bx.font = '7px "Press Start 2P"';
      const tw = bx.measureText(prompt.text).width;
      bx.fillStyle = 'rgba(0,0,0,0.7)';
      bx.fillRect(prompt.x - tw/2 - 4, prompt.y - 8, tw + 8, 12);
      bx.fillStyle = '#e0d0f0';
      bx.fillText(prompt.text, prompt.x - tw/2, prompt.y);
    }
  }

  // Dialog box
  if (state.dialogActive) {
    const dbH = 52, dbY = H - dbH - 8, dbX = 12, dbW = W - 24;
    bx.fillStyle = 'rgba(8,6,16,0.92)'; bx.fillRect(dbX, dbY, dbW, dbH);
    bx.strokeStyle = m.bars; bx.lineWidth = 2; bx.strokeRect(dbX, dbY, dbW, dbH);

    if (state.dialogSpeaker) {
      bx.fillStyle = '#b89cff'; bx.font = '8px "Press Start 2P"';
      bx.fillText(state.dialogSpeaker, dbX+8, dbY+12);
    }

    bx.fillStyle = '#d8d0c8'; bx.font = '8px "Press Start 2P"';
    const startY = state.dialogSpeaker ? dbY + 26 : dbY + 16;
    state.dialogText.split('\n').forEach((line, i) => { bx.fillText(line, dbX+8, startY + i*12); });

    if (state.dialogCharIdx >= state.dialogFullText.length) {
      if (Math.sin(state.time * 5) > 0) {
        bx.fillStyle = '#b89cff'; bx.fillText('▼', dbX + dbW - 18, dbY + dbH - 8);
      }
    }
  }

  // HUD
  const hudX = 8, hudY = 10;
  bx.fillStyle = 'rgba(0,0,0,0.5)'; bx.fillRect(hudX-1, hudY-1, 52, 10);
  bx.font = '6px "Press Start 2P"';
  bx.fillStyle = 'rgba(200,200,200,0.35)'; bx.fillText('♥', hudX+1, hudY+7);
  bx.fillStyle = '#222'; bx.fillRect(hudX+10, hudY+1, 40, 6);
  const barCol = state.social > 0.6 ? '#b89cff' : state.social > 0.3 ? '#6a6a78' : '#3a3a48';
  bx.fillStyle = barCol; bx.fillRect(hudX+10, hudY+1, state.social*40, 6);

  // Scale
  ctxMain.clearRect(0, 0, canvas.width, canvas.height);
  ctxMain.drawImage(buf, 0, 0, W, H, 0, 0, canvas.width, canvas.height);
}

// ══════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════
let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

} // end init
</script>
</body>
</html>
